<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Đơn Hàng Ghép Xe</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #f5f6f5; 
            color: #2c3e50; 
            min-height: 100vh; 
            overflow-x: hidden; 
            transition: background 0.3s, color 0.3s; 
            width: 100vw; 
        }
        body.dark-mode { 
            background: #1a1a1a; 
            color: #d9e1e8; 
        }
        
        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #003087;
            color: #FFFFFF;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            z-index: 999;
            box-shadow: 4px 4px 8px rgba(0, 48, 135, 0.6), -4px -4px 8px rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        body.dark-mode header {
            background: #00205B;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.4), -4px -4px 8px rgba(255, 255, 255, 0.5);
        }
        
        /* Slidebar */
        .slidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 140px;
            height: 100vh;
            background: #003087;
            padding: 15px;
            padding-top: 40px; /* Adjusted for header height */
            transition: width 0.3s ease;
            z-index: 1000; 
            box-shadow: 4px 0 8px rgba(0, 48, 135, 0.6), -2px 0 8px rgba(255, 255, 255, 0.1);
        }
        .slidebar.collapsed { width: 50px; }
        body.dark-mode .slidebar {
            background: #00205B;
            box-shadow: 4px 0 8px rgba(0, 0, 0, 0.4), -2px 0 8px rgba(255, 255, 255, 0.5);
        }
        .slidebar .logo h1 { 
            font-size: 16px; 
            color: #FFFFFF; 
            font-weight: 600; 
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 20px; 
            transition: opacity 0.3s ease; 
        }
        .slidebar.collapsed .logo h1 { opacity: 0; }
        .slidebar .tabs { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            overflow-y: auto; 
            max-height: calc(100vh - 100px); 
        }
        .slidebar .tabs a { 
            padding: 10px 12px; 
            text-decoration: none; 
            color: #FFFFFF; 
            font-size: 13px; 
            font-weight: 500; 
            border-radius: 8px; 
            background: rgba(255, 255, 255, 0.1); 
            transition: all 0.3s ease; 
            text-align: left; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
            display: flex; 
            align-items: center; 
        }
        .slidebar .tabs a i { 
            margin-right: 8px;
            transition: margin-right 0.3s ease;
        }
        .slidebar.collapsed .tabs a { 
            padding: 10px; 
            text-align: center; 
            justify-content: center; 
        }
        .slidebar.collapsed .tabs a i {
            margin-right: 0;
        }
        .slidebar .tabs a span { transition: opacity 0.3s ease, width 0.3s ease; }
        .slidebar.collapsed .tabs a span { opacity: 0; width: 0; overflow: hidden; }
        .slidebar .tabs a:hover { 
            background: rgba(255, 255, 255, 0.2); 
            box-shadow: inset 3px 3px 6px rgba(0, 48, 135, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.2); 
        }
        .slidebar .tabs a.active { 
            color: #FFFFFF; 
            background: rgba(255, 255, 255, 0.3); 
            box-shadow: inset 3px 3px 6px rgba(0, 48, 135, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.2); 
            font-weight: 600; 
        }
        body.dark-mode .slidebar .tabs a { 
            background: rgba(255, 255, 255, 0.05); 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .toggle-btn { 
            position: absolute; 
            top: 15px; 
            right: -12px; 
            width: 24px; 
            height: 24px; 
            background: #003087; 
            border: none; 
            border-radius: 50%; 
            color: #FFFFFF; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover { 
            box-shadow: inset 3px 3px 6px rgba(0, 48, 135, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.2); 
        }
        body.dark-mode .toggle-btn { 
            background: #00205B; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        
        /* Navbar controls */
        .navbar-controls { 
            position: fixed; 
            top: 8px; 
            right: 15px; 
            display: flex; 
            gap: 8px; 
            z-index: 1001; 
        }
        .nav-btn, .theme-toggle { 
            padding: 6px; 
            border: none; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.2); 
            color: #FFFFFF; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 28px; 
            height: 28px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2), -1px -1px 3px rgba(255,255,255,0.3);
        }
        .nav-btn:hover, .theme-toggle:hover { 
             background: rgba(255,255,255,0.3);
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2), inset -1px -1px 3px rgba(255,255,255,0.3);
        }
        .nav-btn[data-tooltip]::after, .theme-toggle[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -25px; 
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #ffffff;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 1002; 
        }
        .nav-btn[data-tooltip]:hover::after, .theme-toggle[data-tooltip]:hover::after {
            opacity: 1;
        }
        
        /* Main container */
        .main-container { 
            background: #f5f6f5; 
            margin-left: 140px; 
            padding: 15px; 
            margin-top: 40px; 
            height: calc(100vh - 60px); 
            transition: margin-left 0.3s ease; 
            display: flex; 
            gap: 10px; 
            width: calc(100vw - 140px); 
        }
        .main-container.collapsed { 
            margin-left: 50px; 
            width: calc(100vw - 50px); 
        }
        body.dark-mode .main-container {
            background: #1a1a1a;
        }
        .grid-container { 
            flex: 1; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 100%; 
        }
        body.dark-mode .grid-container { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        
        /* Filter section */
        .filter-section { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            align-items: center; 
            justify-content: space-between; 
            padding-bottom: 8px; 
            width: 100%; 
        }
        .filter-section input { 
            padding: 6px 10px; 
            border: none; 
            border-radius: 8px; 
            font-size: 12px; 
            background: #FFFFFF; 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
            width: 180px; 
            color: #2c3e50; 
        }
        .filter-section input:focus { outline: none; }
        body.dark-mode .filter-section input { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.4), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .filter-section .button-group { 
            display: flex; 
            gap: 8px; 
            justify-content: flex-end; 
        }
        .export-btn { 
            padding: 6px; 
            border: none; 
            border-radius: 50%; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .export-btn:hover { 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .refresh-btn { 
            color: #00a550; 
        }
        body.dark-mode .export-btn { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .refresh-btn { color: #00a550; }
        
        /* Tables section */
        .tables-section { 
            display: flex; 
            gap: 10px; 
            flex: 1; 
            min-height: 360px; 
            width: 100%; 
        }
        .table-container { 
            flex: 0 0 80%; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            overflow-x: auto; 
            overflow-y: auto; 
            max-height: calc(100vh - 200px); 
            position: relative; 
        }
        body.dark-mode .table-container { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #f5f6f5; }
        .table-container::-webkit-scrollbar-thumb { 
            background: #d9e1e8; 
            border-radius: 3px; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .table-container::-webkit-scrollbar-track { background: #1a1a1a; }
        body.dark-mode .table-container::-webkit-scrollbar-thumb { 
            background: #555; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        table { 
            width: 120%; 
            border-collapse: collapse; 
            font-size: 11px; 
            table-layout: fixed; 
        }
        th, td { 
            padding: 8px 10px; 
            text-align: left; 
            border-bottom: 1px solid rgba(163, 177, 198, 0.3); 
            white-space: normal; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        th { 
            font-weight: 600; 
            background: #003087; 
            color: #FFFFFF; 
            position: sticky; 
            top: 0; 
            z-index: 2; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
        }
        body.dark-mode th { 
            background: #00205B; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        td { color: #2c3e50; }
        body.dark-mode td { color: #d9e1e8; border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        tbody tr:hover { 
            background: #f0f0f0; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode tbody tr:hover { 
            background: #3a3a3a; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        .vin-highlight { font-weight: 600; color: #00a550; }
        
        /* START: Updated Column widths */
        .chua-ghep col:nth-child(1) { width: 4%; }  /* SỐ TT */
        .chua-ghep col:nth-child(2) { width: 15%; } /* TƯ VẤN BÁN HÀNG */
        .chua-ghep col:nth-child(3) { width: 20%; } /* TÊN KHÁCH HÀNG */
        .chua-ghep col:nth-child(4) { width: 10%; } /* DÒNG XE */
        .chua-ghep col:nth-child(5) { width: 12%; } /* PHIÊN BẢN */
        .chua-ghep col:nth-child(6) { width: 20%; } /* NGOẠI THẤT */
        .chua-ghep col:nth-child(7) { width: 8%; }  /* NỘI THẤT */
        .chua-ghep col:nth-child(8) { width: 11%; } /* SỐ ĐƠN HÀNG */

        .da-ghep col:nth-child(1) { width: 3%; }   /* SỐ TT */
        .da-ghep col:nth-child(2) { width: 10%; }  /* TƯ VẤN BÁN HÀNG */
        .da-ghep col:nth-child(3) { width: 13%; }  /* TÊN KHÁCH HÀNG */
        .da-ghep col:nth-child(4) { width: 6%; }   /* DÒNG XE */
        .da-ghep col:nth-child(5) { width: 6%; }   /* PHIÊN BẢN */
        .da-ghep col:nth-child(6) { width: 11%; }  /* NGOẠI THẤT */
        .da-ghep col:nth-child(7) { width: 6%; }   /* NỘI THẤT */
        .da-ghep col:nth-child(8) { width: 13%; }  /* SỐ ĐƠN HÀNG */
        .da-ghep col:nth-child(9) { width: 11%; }  /* SỐ VIN */
        .da-ghep col:nth-child(10) { width: 7%; }  /* NGÀY GHÉP */
        .da-ghep col:nth-child(11) { width: 5%; }  /* SỐ NGÀY */
        .da-ghep col:nth-child(12) { width: 9%; }  /* NGÀY XUẤT HÓA ĐƠN */
        /* END: Updated Column widths */

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            border-radius: 12px; 
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #003087;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        body.dark-mode .loading-overlay {
            background: rgba(44, 44, 44, 0.8); 
        }
        body.dark-mode .loading-spinner {
            border-top: 4px solid #005eb8; 
        }
        
        /* Detail panel */
        .detail-panel { 
            flex: 0 0 20%; 
            min-width: 200px; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            overflow-y: auto; 
            max-height: calc(100vh - 200px); 
        }
        body.dark-mode .detail-panel { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        .detail-panel::-webkit-scrollbar { width: 6px; }
        .detail-panel::-webkit-scrollbar-track { background: #f5f6f5; }
        .detail-panel::-webkit-scrollbar-thumb { 
            background: #d9e1e8; 
            border-radius: 3px; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .detail-panel::-webkit-scrollbar-track { background: #1a1a1a; }
        body.dark-mode .detail-panel::-webkit-scrollbar-thumb { 
            background: #555; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        .detail-panel h3 { 
            font-size: 14px; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            font-weight: 600; 
            text-align: center;
            border-bottom: 1px solid rgba(163, 177, 198, 0.3);
            padding-bottom: 8px;
        }
        body.dark-mode .detail-panel h3 { 
            color: #d9e1e8; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .detail-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 11px; 
        }
        .detail-table th, .detail-table td { 
            padding: 8px 10px; 
            text-align: left; 
            border-bottom: 1px solid rgba(163, 177, 198, 0.3); 
            white-space: normal; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        .detail-table th { 
            color: #2c3e50; 
            font-weight: 500; 
            width: 40%; 
            background: #f0f0f0; 
            box-shadow: inset 1px 1px 2px rgba(163, 177, 198, 0.4), inset -1px -1px 2px rgba(255, 255, 255, 0.3); 
        }
        body.dark-mode .detail-table th { 
            color: #d9e1e8; 
            background: #3a3a3a; 
            box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.3), inset -1px -1px 2px rgba(255, 255, 255, 0.3); 
        }
        .detail-table td { color: #2c3e50; }
        body.dark-mode .detail-table td { color: #d9e1e8; border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        
        /* Pagination */
        .pagination { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 10px; 
            width: 100%; 
        }
        .pagination button { 
            padding: 6px 12px; 
            border: none; 
            border-radius: 8px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .pagination button:hover:not(:disabled) { 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        body.dark-mode .pagination button { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .pagination span { 
            padding: 6px 12px; 
            font-size: 12px; 
            color: #2c3e50; 
            display: flex;
            align-items: center;
        }
        body.dark-mode .pagination span { color: #d9e1e8; }
        
        /* Footer */
        footer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #003087; 
            color: #FFFFFF; 
            text-align: center; 
            padding: 8px 0; 
            font-size: 10px; 
            box-shadow: 4px -4px 8px rgba(0, 48, 135, 0.6), -4px 4px 8px rgba(255, 255, 255, 0.1); 
            z-index: 999; 
        }
        body.dark-mode footer { 
            background: #00205B; 
            box-shadow: 4px -4px 8px rgba(0, 0, 0, 0.4), -4px 4px 8px rgba(255, 255, 255, 0.5); 
        }
        
        /* Notification */
        #notification { 
            position: fixed; 
            top: 50px; 
            right: 15px; 
            padding: 8px 15px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            border-radius: 8px; 
            display: none; 
            z-index: 10001; 
            font-size: 12px; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode #notification { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }

        /* Responsive */
        @media (max-width: 768px) {
            .slidebar {
                width: 50px;
                padding: 10px;
                padding-top: 50px; 
            }
            .slidebar .logo h1 { display: none; }
            .slidebar .tabs a span { display: none; }
            .slidebar .tabs a { justify-content: center; }
            .slidebar .tabs a i { margin-right: 0; }

            .main-container {
                margin-left: 50px;
                width: calc(100vw - 50px);
                padding: 10px;
                margin-top: 40px; 
                height: calc(100vh - 60px); 
            }
            .navbar-controls {
                top: 6px; 
                right: 10px;
                gap: 5px;
            }
            .nav-btn, .theme-toggle {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .filter-section {
                flex-direction: column;
                align-items: stretch; 
            }
            .filter-section input {
                width: 100%;
                margin-bottom: 10px;
            }
            .filter-section .button-group {
                justify-content: flex-start; 
                width: 100%;
            }
            .tables-section {
                flex-direction: column;
                width: 100%;
                min-height: 0; 
            }
            .table-container {
                flex: 1; 
                width: 100%;
                max-height: 45vh; 
            }
            .detail-panel {
                flex: 1; 
                width: 100%;
                min-width: 0;
                max-height: 30vh; 
            }
            #notification {
                top: 50px; 
                right: 10px;
                font-size: 10px;
                padding: 6px 10px;
            }
            header { font-size: 12px; padding: 10px 0; }
            footer { font-size: 10px; padding: 8px 0; }
        }
    </style>
</head>
<body>
    <header>DANH SÁCH ĐƠN HÀNG GHÉP XE VINFAST THUẬN AN</header>
    <div class="slidebar" id="slidebar">
        <div class="logo">
            <h1>VinFast</h1> </div>
        <div class="tabs">
            <a href="#" onclick="switchTab('daghep', this)" class="active" data-tooltip="Đã Ghép"><i class="fas fa-check-circle"></i><span>Đã Ghép</span></a>
            <a href="#" onclick="switchTab('chuaghep', this)" data-tooltip="Chưa Ghép"><i class="fas fa-hourglass-half"></i><span>Chưa Ghép</span></a>
        </div>
        <button class="toggle-btn" onclick="toggleSlidebar()" id="sidebar-toggle-btn"><i class="fas fa-bars"></i></button>
    </div>
    <div class="navbar-controls">
        <button class="theme-toggle" onclick="toggleTheme()" data-tooltip="Sáng/Tối"><i class="fas fa-moon"></i></button>
        <button class="nav-btn" onclick="goBack()" data-tooltip="Quay lại"><i class="fas fa-arrow-left"></i></button>
        <button class="nav-btn" onclick="logout()" data-tooltip="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <div class="main-container" id="main-container">
        <div class="grid-container">
            <div class="filter-section">
                <div>
                    <input type="text" id="search-input" placeholder="Tìm kiếm trong bảng hiện tại...">
                </div>
                <div class="button-group">
                    <button class="export-btn refresh-btn" onclick="refreshData()" data-tooltip="Làm mới"><i class="fas fa-sync-alt"></i></button>
                    <button class="export-btn" onclick="exportToExcel()" data-tooltip="Xuất Excel"><i class="fas fa-file-excel"></i></button>
                    <button class="export-btn" onclick="printTable()" data-tooltip="In"><i class="fas fa-print"></i></button>
                </div>
            </div>
            <div class="tables-section">
                <div class="table-container">
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="loading-spinner"></div>
                        <span style="margin-left: 10px; font-size: 14px; color: #2c3e50;">Đang tải dữ liệu...</span>
                    </div>
                    <table id="data-table">
                        <colgroup id="table-colgroup">
                            </colgroup>
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div class="detail-panel" id="detail-panel">
                    <h3>Chi Tiết Đơn Hàng</h3>
                    <table id="detail-body" class="detail-table">
                        <tbody>
                            <tr><td colspan="2" style="text-align:center; padding-top: 20px;">Chọn một đơn hàng để xem chi tiết.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="pagination" id="pagination">
                <button onclick="changePage(-1)" id="prev-btn" disabled>Trước</button>
                <span id="page-info">Trang 1 / 1</span>
                <button onclick="changePage(1)" id="next-btn" disabled>Sau</button>
            </div>
        </div>
    </div>
    <footer>© 2025 VinFast Minh Đạo Thuận An</footer>
    <div id="notification"></div>

    <script>
        // Stores the full unfiltered data from API/sessionStorage
        let globalApiData = { daghep: [], chuaghep: [] }; 
        // Stores data for the current tab after role and search filtering (used for rendering and pagination)
        let currentDisplayData = []; 
        
        let currentSheet = 'daghep'; // Default tab
        let currentPage = 1;
        const rowsPerPage = 20;
        let isDataFullyLoaded = false; // Flag to indicate initial data load completion

        const ADMIN_USER = "PHẠM THÀNH NHÂN"; // Admin user name

        document.addEventListener("DOMContentLoaded", function () {
            if (sessionStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "index.html"; // Redirect if not logged in
                return;
            }
            
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
            } else {
                document.body.classList.remove('dark-mode');
                 document.querySelector('.theme-toggle i').classList.replace('fa-sun', 'fa-moon');
            }
            
            updateTableHeader(currentSheet); 
            loadInitialData(); 
            setupSearch();
            updateSidebarToggleIcon(); 
        });

        function showLoading() {
            document.getElementById("loading-overlay").classList.add("active");
        }

        function hideLoading() {
            document.getElementById("loading-overlay").classList.remove("active");
        }

        async function loadInitialData() {
            showLoading();
            const apiURL = "https://script.google.com/macros/s/AKfycby3HoOoC-EPX_SKPC9XqqusIo__gnXuVQZ3mzldBZgR_dUCuo-1IAphkeqj_dvkHySBGA/exec";
            
            const storedDaghep = sessionStorage.getItem('daghep');
            const storedChuaghep = sessionStorage.getItem('chuaghep');
            let loadedFromCache = false;

            if (storedDaghep && storedChuaghep) {
                try {
                    globalApiData.daghep = JSON.parse(storedDaghep);
                    globalApiData.chuaghep = JSON.parse(storedChuaghep);
                    if (!Array.isArray(globalApiData.daghep) || !Array.isArray(globalApiData.chuaghep)) {
                        throw new Error("Dữ liệu trong sessionStorage không hợp lệ.");
                    }
                    console.log("Dữ liệu đã tải từ sessionStorage.");
                    isDataFullyLoaded = true;
                    applyFiltersAndRenderCurrentTab();
                    loadedFromCache = true; 
                } catch (error) {
                    console.error("Lỗi khi parse dữ liệu từ sessionStorage:", error);
                    sessionStorage.removeItem('daghep'); 
                    sessionStorage.removeItem('chuaghep');
                    globalApiData = { daghep: [], chuaghep: [] }; 
                }
            }

            try {
                const response = await axios.get(apiURL);
                console.log("Dữ liệu từ API:", response.data);
                globalApiData.daghep = Array.isArray(response.data.daghep) ? response.data.daghep : [];
                globalApiData.chuaghep = Array.isArray(response.data.chuaghep) ? response.data.chuaghep : [];
                
                sessionStorage.setItem('daghep', JSON.stringify(globalApiData.daghep));
                sessionStorage.setItem('chuaghep', JSON.stringify(globalApiData.chuaghep));
                
                console.log("globalApiData sau khi cập nhật từ API:", globalApiData);
                isDataFullyLoaded = true;
                applyFiltersAndRenderCurrentTab(); 
                if (!loadedFromCache) { 
                    showNotification("Dữ liệu đã được tải thành công!", 2000);
                }
            } catch (error) {
                const errorMsg = error.response ? `Lỗi API: ${error.response.status} - ${error.response.data || error.message}` : `Lỗi mạng: ${error.message}`;
                console.error("Lỗi khi tải dữ liệu từ API:", errorMsg);
                if (!loadedFromCache) { 
                     document.getElementById("table-body").innerHTML = `<tr><td colspan="${currentSheet === 'daghep' ? 12 : 8}" style="text-align:center;">⚠️ ${errorMsg}</td></tr>`;
                    showNotification(errorMsg, 5000);
                }
            } finally {
                hideLoading();
            }
        }
        
        function applyFiltersAndRenderCurrentTab() {
            if (!isDataFullyLoaded) {
                return; 
            }

            let dataForSheet = globalApiData[currentSheet] ? [...globalApiData[currentSheet]] : []; 

            const currentConsultant = sessionStorage.getItem("currentConsultant");
            const isAdmin = currentConsultant === ADMIN_USER;

            if (!isAdmin && currentConsultant) {
                dataForSheet = dataForSheet.filter(row => row["Tên tư vấn bán hàng"] === currentConsultant);
            }

            const searchValue = document.getElementById("search-input").value.trim().toLowerCase();
            if (searchValue) {
                dataForSheet = dataForSheet.filter(row =>
                    Object.values(row).some(cell => cell?.toString().toLowerCase().includes(searchValue))
                );
            }
            
            currentDisplayData = dataForSheet; 
            renderTable(currentDisplayData, currentPage); 
        }


        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        function goBack() {
            window.location.href = "index.html";
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const themeIcon = document.querySelector('.theme-toggle i');
            if (body.classList.contains('dark-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }
        
        function updateSidebarToggleIcon() {
            const slidebar = document.getElementById("slidebar");
            const toggleIcon = document.querySelector("#sidebar-toggle-btn i");
            if (slidebar.classList.contains("collapsed")) {
                toggleIcon.classList.remove("fa-times");
                toggleIcon.classList.add("fa-bars");
            } else {
                toggleIcon.classList.remove("fa-bars");
                toggleIcon.classList.add("fa-times");
            }
        }

        function toggleSlidebar() {
            document.getElementById("slidebar").classList.toggle("collapsed");
            document.getElementById("main-container").classList.toggle("collapsed");
            updateSidebarToggleIcon();
        }

        function switchTab(sheetName, element) {
            if (!isDataFullyLoaded) {
                showNotification("Dữ liệu đang được tải, vui lòng chờ một lát.", 2000);
                return;
            }
            document.querySelectorAll('.tabs a').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            currentSheet = sheetName;
            currentPage = 1; 
            document.getElementById("search-input").value = ""; 

            updateTableHeader(currentSheet); 
            applyFiltersAndRenderCurrentTab(); 
        }

        function updateTableHeader(sheetName) {
            const thead = document.getElementById("table-head");
            const colgroup = document.getElementById("table-colgroup");
            colgroup.innerHTML = ""; // Clear existing cols
            colgroup.className = ""; 

            if (sheetName === 'daghep') {
                colgroup.classList.add('da-ghep');
                // Add col elements for 'da-ghep'
                ['3%', '12%', '14%', '6%', '6%', '11%', '6%', '13%', '11%', '7%', '4%', '7%'].forEach(width => {
                    const col = document.createElement('col');
                    col.style.width = width;
                    colgroup.appendChild(col);
                });
                thead.innerHTML = `
                    <tr>
                        <th>SỐ TT</th>
                        <th>TƯ VẤN BÁN HÀNG</th>
                        <th>TÊN KHÁCH HÀNG</th>
                        <th>DÒNG XE</th>
                        <th>PHIÊN BẢN</th>
                        <th>NGOẠI THẤT</th>
                        <th>NỘI THẤT</th>
                        <th>SỐ ĐƠN HÀNG</th>
                        <th>SỐ VIN</th>
                        <th>NGÀY GHÉP</th>
                        <th>SỐ NGÀY</th>
                        <th>NGÀY XUẤT HÓA ĐƠN</th>
                    </tr>
                `;
            } else { 
                colgroup.classList.add('chua-ghep');
                // Add col elements for 'chua-ghep'
                 ['4%', '15%', '20%', '10%', '12%', '20%', '8%', '11%'].forEach(width => {
                    const col = document.createElement('col');
                    col.style.width = width;
                    colgroup.appendChild(col);
                });
                thead.innerHTML = `
                    <tr>
                        <th>SỐ TT</th>
                        <th>TƯ VẤN BÁN HÀNG</th>
                        <th>TÊN KHÁCH HÀNG</th>
                        <th>DÒNG XE</th>
                        <th>PHIÊN BẢN</th>
                        <th>NGOẠI THẤT</th>
                        <th>NỘI THẤT</th>
                        <th>SỐ ĐƠN HÀNG</th>
                    </tr>
                `;
            }
        }

        function renderTable(dataToDisplay, page = 1) {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = ""; 

            if (!Array.isArray(dataToDisplay) || dataToDisplay.length === 0) {
                const colspan = currentSheet === 'daghep' ? 12 : 8;
                tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align:center; padding: 20px;">Không có dữ liệu phù hợp.</td></tr>`;
                updatePagination(dataToDisplay || []); 
                document.getElementById("detail-body").innerHTML = "<tr><td colspan='2' style='text-align:center; padding-top: 20px;'>Không có chi tiết để hiển thị.</td></tr>";
                return;
            }

            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedData = dataToDisplay.slice(start, end);

            paginatedData.forEach((row, index) => {
                const tr = document.createElement("tr");
                let cellsHTML = "";
                const globalIndex = start + index + 1; 

                const formatDate = (dateString) => {
                    if (!dateString) return "";
                    const date = new Date(dateString);
                    return !isNaN(date) ? date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' }) : dateString;
                };

                if (currentSheet === 'daghep') {
                    cellsHTML = `
                        <td>${globalIndex}</td>
                        <td>${row["Tên tư vấn bán hàng"] || ""}</td>
                        <td>${row["Tên khách hàng"] || ""}</td>
                        <td>${row["Dòng xe"] || ""}</td>
                        <td>${row["Phiên bản"] || ""}</td>
                        <td>${row["Ngoại thất"] || ""}</td>
                        <td>${row["Nội thất"] || ""}</td>
                        <td>${row["Số đơn hàng"] || ""}</td>
                        <td class="${(row["VIN"] || "").trim() ? 'vin-highlight' : ''}">${row["VIN"] || ""}</td>
                        <td>${formatDate(row["Thời gian ghép"])}</td>
                        <td>${row["Số ngày ghép"] || ""}</td>
                        <td>${formatDate(row["Ngày xuất hóa đơn"])}</td>
                    `;
                } else { 
                    cellsHTML = `
                        <td>${globalIndex}</td>
                        <td>${row["Tên tư vấn bán hàng"] || ""}</td>
                        <td>${row["Tên khách hàng"] || ""}</td>
                        <td>${row["Dòng xe"] || ""}</td>
                        <td>${row["Phiên bản"] || ""}</td>
                        <td>${row["Ngoại thất"] || ""}</td>
                        <td>${row["Nội thất"] || ""}</td>
                        <td>${row["Số đơn hàng"] || ""}</td>
                    `;
                }
                tr.innerHTML = cellsHTML;
                tr.onclick = () => showDetail(row); 
                tbody.appendChild(tr);
            });

            updatePagination(dataToDisplay); 
            // No need to call highlightVinNumbers here as it's done via class in cellsHTML

            if (paginatedData.length > 0) {
                showDetail(paginatedData[0]);
            } else {
                 document.getElementById("detail-body").innerHTML = "<tr><td colspan='2' style='text-align:center; padding-top: 20px;'>Không có chi tiết để hiển thị.</td></tr>";
            }
        }


        function updatePagination(data) { 
            const totalPages = Math.ceil(data.length / rowsPerPage) || 1;
            document.getElementById("page-info").textContent = `Trang ${currentPage} / ${totalPages}`;
            document.getElementById("prev-btn").disabled = currentPage === 1;
            document.getElementById("next-btn").disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            if (!isDataFullyLoaded) {
                showNotification("Dữ liệu chưa tải xong, vui lòng chờ.", 2000);
                return;
            }
            const totalPages = Math.ceil(currentDisplayData.length / rowsPerPage) || 1;
            const newPage = currentPage + delta;

            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderTable(currentDisplayData, currentPage); 
                document.querySelector('.table-container').scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function highlightVinNumbers() { // This function might be redundant if class is applied directly in renderTable
            const tableRows = document.querySelectorAll("#table-body tr");
            tableRows.forEach(row => {
                if (currentSheet === 'daghep' && row.cells.length > 8) { 
                    const vinCell = row.cells[8]; 
                    if (vinCell && vinCell.textContent.trim() !== "") {
                        vinCell.classList.add("vin-highlight");
                    } else if (vinCell) {
                        vinCell.classList.remove("vin-highlight");
                    }
                }
            });
        }
        
        function showDetail(row) { 
            const detailBody = document.querySelector("#detail-body tbody");
            if (!row) {
                detailBody.innerHTML = "<tr><td colspan='2' style='text-align:center; padding-top: 20px;'>Không có dữ liệu chi tiết.</td></tr>";
                return;
            }

            const headersMap = {
                "Tên tư vấn bán hàng": "Tên tư vấn bán hàng",
                "Tên khách hàng": "Tên khách hàng",
                "Dòng xe": "Dòng xe",
                "Phiên bản": "Phiên bản",
                "Ngoại thất": "Ngoại thất",
                "Nội thất": "Nội thất",
                "Số đơn hàng": "Số đơn hàng",
                "VIN": "VIN", 
                "Thời gian ghép": "Ngày Ghép", 
                "Số ngày ghép": "Số Ngày", 
                "Ngày xuất hóa đơn": "Ngày Xuất HĐ" 
            };

            let htmlContent = "";
            const relevantHeaders = currentSheet === 'daghep' 
                ? ["Tên tư vấn bán hàng", "Tên khách hàng", "Dòng xe", "Phiên bản", "Ngoại thất", "Nội thất", "Số đơn hàng", "VIN", "Thời gian ghép", "Số ngày ghép", "Ngày xuất hóa đơn"]
                : ["Tên tư vấn bán hàng", "Tên khách hàng", "Dòng xe", "Phiên bản", "Ngoại thất", "Nội thất", "Số đơn hàng"];

            relevantHeaders.forEach(dataKey => {
                const displayHeader = headersMap[dataKey] || dataKey;
                let cellValue = row[dataKey] || "";

                if ((dataKey === "Thời gian ghép" || dataKey === "Ngày xuất hóa đơn") && cellValue) {
                    const parsedDate = new Date(cellValue);
                    cellValue = !isNaN(parsedDate) 
                        ? parsedDate.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' }) 
                        : cellValue; 
                }
                const isVin = dataKey === "VIN" && cellValue;
                htmlContent += `
                    <tr>
                        <th>${displayHeader}</th>
                        <td${isVin ? ' class="vin-highlight"' : ''}>${cellValue}</td>
                    </tr>`;
            });
            
            detailBody.innerHTML = htmlContent;
        }


        function exportToExcel() {
            if (!isDataFullyLoaded) {
                showNotification("Dữ liệu chưa tải xong để xuất.", 2000);
                return;
            }
            if (!currentDisplayData || currentDisplayData.length === 0) {
                showNotification("Không có dữ liệu để xuất.", 2000);
                return;
            }

            if (confirm(`Bạn có muốn xuất ${currentDisplayData.length} dòng của bảng "${currentSheet === 'daghep' ? 'Đã Ghép' : 'Chưa Ghép'}" sang Excel không?`)) {
                const headers = currentSheet === 'daghep' 
                    ? ["SỐ TT", "TƯ VẤN BÁN HÀNG", "TÊN KHÁCH HÀNG", "DÒNG XE", "PHIÊN BẢN", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG", "SỐ VIN", "NGÀY GHÉP", "SỐ NGÀY", "NGÀY XUẤT HÓA ĐƠN"]
                    : ["SỐ TT", "TƯ VẤN BÁN HÀNG", "TÊN KHÁCH HÀNG", "DÒNG XE", "PHIÊN BẢN", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG"];
                
                const dataKeyMap = currentSheet === 'daghep'
                    ? ["STT", "Tên tư vấn bán hàng", "Tên khách hàng", "Dòng xe", "Phiên bản", "Ngoại thất", "Nội thất", "Số đơn hàng", "VIN", "Thời gian ghép", "Số ngày ghép", "Ngày xuất hóa đơn"]
                    : ["STT", "Tên tư vấn bán hàng", "Tên khách hàng", "Dòng xe", "Phiên bản", "Ngoại thất", "Nội thất", "Số đơn hàng"];

                const wsData = currentDisplayData.map((row, index) => {
                    const rowData = {};
                    headers.forEach((header, i) => {
                        if (dataKeyMap[i] === "STT") {
                            rowData[header] = index + 1;
                        } else {
                            let value = row[dataKeyMap[i]] || "";
                            if ((dataKeyMap[i] === "Thời gian ghép" || dataKeyMap[i] === "Ngày xuất hóa đơn") && value) {
                                const date = new Date(value);
                                if (!isNaN(date)) value = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
                            }
                            rowData[header] = value;
                        }
                    });
                    return rowData;
                });

                const ws = XLSX.utils.json_to_sheet(wsData, { header: headers }); 
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, currentSheet === 'daghep' ? 'Đã Ghép' : 'Chưa Ghép');
                XLSX.writeFile(wb, `VinFast_Don_Hang_${currentSheet === 'daghep' ? 'Da_Ghep' : 'Chua_Ghep'}_${new Date().toLocaleDateString('vi-VN').replace(/\//g, '-')}.xlsx`);
                showNotification("Đã xuất file Excel thành công!", 2000);
            }
        }

        function printTable() {
            if (!isDataFullyLoaded) {
                showNotification("Dữ liệu chưa tải xong để in.", 2000);
                return;
            }
             if (!currentDisplayData || currentDisplayData.length === 0) {
                showNotification("Không có dữ liệu để in.", 2000);
                return;
            }

            const tableToPrint = document.createElement('table');
            tableToPrint.style.width = "100%";
            tableToPrint.style.borderCollapse = "collapse";
            tableToPrint.style.tableLayout = "fixed";

            const colgroupElement = document.createElement('colgroup');
            const printColWidths = currentSheet === 'daghep' 
                ? ['30px', '80px', '105px', '45px', '45px', '90px', '50px', '110px', '90px', '55px', '40px', '70px']
                : ['30px', '110px', '150px', '75px', '90px', '150px', '60px', '85px'];
            
            printColWidths.forEach(width => {
                const col = document.createElement('col');
                col.style.width = width;
                colgroupElement.appendChild(col);
            });
            tableToPrint.appendChild(colgroupElement);


            const thead = document.getElementById("table-head").cloneNode(true);
            tableToPrint.appendChild(thead);
            
            const tbody = document.createElement('tbody');
            const formatDate = (dateString) => {
                if (!dateString) return "";
                const date = new Date(dateString);
                return !isNaN(date) ? date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' }) : dateString;
            };

            currentDisplayData.forEach((row, index) => {
                const tr = document.createElement("tr");
                let cellsContent = [];
                 if (currentSheet === 'daghep') {
                    cellsContent = [
                        index + 1,
                        row["Tên tư vấn bán hàng"] || "",
                        row["Tên khách hàng"] || "",
                        row["Dòng xe"] || "",
                        row["Phiên bản"] || "",
                        row["Ngoại thất"] || "",
                        row["Nội thất"] || "",
                        row["Số đơn hàng"] || "",
                        row["VIN"] || "",
                        formatDate(row["Thời gian ghép"]),
                        row["Số ngày ghép"] || "",
                        formatDate(row["Ngày xuất hóa đơn"])
                    ];
                } else { 
                    cellsContent = [
                        index + 1,
                        row["Tên tư vấn bán hàng"] || "",
                        row["Tên khách hàng"] || "",
                        row["Dòng xe"] || "",
                        row["Phiên bản"] || "",
                        row["Ngoại thất"] || "",
                        row["Nội thất"] || "",
                        row["Số đơn hàng"] || ""
                    ];
                }
                cellsContent.forEach((cellData, cellIndex) => {
                    const td = document.createElement('td');
                    td.textContent = cellData;
                    if (currentSheet === 'daghep' && cellIndex === 8 && cellData) { 
                        td.style.fontWeight = '600';
                        td.style.color = '#00a550';
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            tableToPrint.appendChild(tbody);

            const now = new Date().toLocaleString('vi-VN');
            const printContent = `
                <div style="text-align:center;">
                    <h2 style="color: #2c3e50; margin-bottom: 5px;">VINFAST MINH ĐẠO THUẬN AN</h2>
                    <p style="margin: 2px 0;">Hotline: 1900 232389</p>
                    <p style="margin: 2px 0;">Bảng: ${currentSheet === 'daghep' ? 'ĐƠN HÀNG ĐÃ GHÉP' : 'ĐƠN HÀNG CHƯA GHÉP'}</p>
                    <p style="margin: 2px 0;">In lúc: ${now}</p>
                </div>
                ${tableToPrint.outerHTML}
            `;
            const win = window.open('', '', 'width=1123,height=794'); // A4 Landscape approx
            win.document.write(`
                <html>
                <head>
                    <title>In Danh Sách - ${currentSheet === 'daghep' ? 'Đã Ghép' : 'Chưa Ghép'}</title>
                    <style>
                        body { font-family: 'Roboto', sans-serif; margin: 20px; font-size: 9pt; } /* Smaller font for print */
                        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 15px; }
                        th, td { border: 1px solid #333; padding: 4px 6px; text-align: left; white-space: normal; word-wrap: break-word; overflow-wrap: break-word; }
                        th { background: #e0e0e0; color: #000; font-weight: bold; }
                        /* Column widths for print are now set by colgroup in JS */
                        @page { size: A4 landscape; margin: 1cm; } 
                    </style>
                </head>
                <body>${printContent}</body>
                </html>
            `);
            win.document.close();
            setTimeout(() => {
                win.print();
                win.close();
            }, 500);
        }


        async function refreshData() {
            showLoading();
            document.getElementById("search-input").value = ""; 
            currentPage = 1; 
            const apiURL = "https://script.google.com/macros/s/AKfycby3HoOoC-EPX_SKPC9XqqusIo__gnXuVQZ3mzldBZgR_dUCuo-1IAphkeqj_dvkHySBGA/exec";
            try {
                const response = await axios.get(apiURL);
                globalApiData.daghep = Array.isArray(response.data.daghep) ? response.data.daghep : [];
                globalApiData.chuaghep = Array.isArray(response.data.chuaghep) ? response.data.chuaghep : [];
                
                sessionStorage.setItem('daghep', JSON.stringify(globalApiData.daghep));
                sessionStorage.setItem('chuaghep', JSON.stringify(globalApiData.chuaghep));
                
                console.log("globalApiData sau khi làm mới:", globalApiData);
                isDataFullyLoaded = true; 
                applyFiltersAndRenderCurrentTab(); 
                showNotification("Dữ liệu đã được làm mới thành công!", 2000);
            } catch (error) {
                const errorMsg = error.response ? `Lỗi API: ${error.response.status}` : `Lỗi mạng: ${error.message}`;
                document.getElementById("table-body").innerHTML = `<tr><td colspan="${currentSheet === 'daghep' ? 12 : 8}" style="text-align:center;">⚠️ ${errorMsg}</td></tr>`;
                showNotification(errorMsg, 5000);
            } finally {
                hideLoading();
            }
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function setupSearch() {
            document.getElementById("search-input").addEventListener("input", debounce(function () {
                if (!isDataFullyLoaded) {
                    return; 
                }
                currentPage = 1; 
                applyFiltersAndRenderCurrentTab();
            }, 300));
        }

        function showNotification(message, duration = 2000) {
            const notif = document.getElementById("notification");
            if (!notif) return;
            notif.textContent = message;
            notif.style.display = "block";
            if (notif.timeoutId) {
                clearTimeout(notif.timeoutId);
            }
            notif.timeoutId = setTimeout(() => {
                notif.style.display = "none";
            }, duration);
        }
    </script>
</body>
</html>
