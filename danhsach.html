<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Đơn Hàng Ghép Xe</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #f5f6f5; /* Màu nền sáng mặc định */
            color: #2c3e50; 
            min-height: 100vh; 
            overflow-x: hidden; 
            transition: background 0.3s, color 0.3s; 
            width: 100vw; 
        }
        body.dark-mode { 
            background: #1a1a1a; /* Màu nền tối */
            color: #d9e1e8; 
        }
        
        /* Header với màu VinFast */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #003087;
            color: #FFFFFF;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            z-index: 999;
            box-shadow: 4px 4px 8px rgba(0, 48, 135, 0.6), -4px -4px 8px rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        body.dark-mode header {
            background: #00205B;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.4), -4px -4px 8px rgba(255, 255, 255, 0.5);
        }
        
        /* Slidebar với màu VinFast */
        .slidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 150px;
            height: 100vh;
            background: #003087;
            padding: 15px;
            padding-top: 40px;
            transition: width 0.3s ease;
            z-index: 1000;
            box-shadow: 4px 0 8px rgba(0, 48, 135, 0.6), -2px 0 8px rgba(255, 255, 255, 0.1);
        }
        .slidebar.collapsed { width: 50px; }
        body.dark-mode .slidebar {
            background: #00205B;
            box-shadow: 4px 0 8px rgba(0, 0, 0, 0.4), -2px 0 8px rgba(255, 255, 255, 0.5);
        }
        .slidebar .logo h1 { 
            font-size: 16px; 
            color: #FFFFFF; 
            font-weight: 600; 
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 20px; 
            transition: opacity 0.3s ease; 
        }
        body.dark-mode .slidebar .logo h1 { color: #FFFFFF; }
        .slidebar.collapsed .logo h1 { opacity: 0; }
        .slidebar .tabs { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            overflow-y: auto; 
            max-height: calc(100vh - 100px); 
        }
        .slidebar .tabs a { 
            padding: 10px 12px; 
            text-decoration: none; 
            color: #FFFFFF; 
            font-size: 13px; 
            font-weight: 500; 
            border-radius: 8px; 
            background: rgba(255, 255, 255, 0.1); 
            transition: all 0.3s ease; 
            text-align: left; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
        }
        .slidebar.collapsed .tabs a { padding: 10px; text-align: center; }
        .slidebar .tabs a span { transition: opacity 0.3s ease; }
        .slidebar.collapsed .tabs a span { opacity: 0; width: 0; }
        .slidebar .tabs a:hover { 
            background: rgba(255, 255, 255, 0.2); 
            box-shadow: inset 3px 3px 6px rgba(0, 48, 135, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.2); 
        }
        .slidebar .tabs a.active { 
            color: #FFFFFF; 
            background: rgba(255, 255, 255, 0.3); 
            box-shadow: inset 3px 3px 6px rgba(0, 48, 135, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.2); 
            font-weight: 600; 
        }
        body.dark-mode .slidebar .tabs a { 
            background: rgba(255, 255, 255, 0.05); 
            color: #FFFFFF; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .slidebar .tabs a:hover, 
        body.dark-mode .slidebar .tabs a.active { 
            background: rgba(255, 255, 255, 0.15); 
            box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.4), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .toggle-btn { 
            position: absolute; 
            top: 15px; 
            right: -12px; 
            width: 24px; 
            height: 24px; 
            background: #003087; 
            border: none; 
            border-radius: 50%; 
            color: #FFFFFF; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
        }
        .toggle-btn:hover { 
            box-shadow: inset 3px 3px 6px rgba(0, 48, 135, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.2); 
        }
        body.dark-mode .toggle-btn { 
            background: #00205B; 
            color: #FFFFFF; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        
        /* Navbar controls */
        .navbar-controls { 
            position: fixed; 
            top: 15px; 
            right: 15px; 
            display: flex; 
            gap: 8px; 
            z-index: 1001; 
        }
        .nav-btn, .theme-toggle { 
            padding: 6px; 
            border: none; 
            border-radius: 50%; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
            position: relative; 
        }
        .nav-btn:hover, .theme-toggle:hover { 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .nav-btn, body.dark-mode .theme-toggle { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .nav-btn:hover::after, .theme-toggle:hover::after { 
            content: attr(data-tooltip); 
            position: absolute; 
            top: 40px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 12px; 
            white-space: nowrap; 
            z-index: 10; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .nav-btn:hover::after, body.dark-mode .theme-toggle:hover::after { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        
        /* Main container */
        .main-container { 
            background: #f5f6f5; /* Màu nền sáng */
            margin-left: 135px; 
            padding: 15px; 
            margin-top: 40px; 
            height: calc(100vh - 60px); 
            transition: margin-left 0.3s ease; 
            display: flex; 
            gap: 10px; 
            width: calc(100vw - 160px); 
        }
        .main-container.collapsed { 
            margin-left: 50px; 
            width: calc(100vw - 50px); 
        }
        .grid-container { 
            flex: 1; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 100%; 
        }
        body.dark-mode .grid-container { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        
        /* Filter section */
        .filter-section { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            align-items: center; 
            justify-content: space-between; 
            padding-bottom: 8px; 
            width: 100%; 
        }
        .filter-section input { 
            padding: 6px 10px; 
            border: none; 
            border-radius: 8px; 
            font-size: 12px; 
            background: #FFFFFF; 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
            width: 180px; 
            color: #2c3e50; 
        }
        .filter-section input:focus { outline: none; }
        body.dark-mode .filter-section input { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.4), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .filter-section .button-group { 
            display: flex; 
            gap: 8px; 
            justify-content: flex-end; 
        }
        .export-btn { 
            padding: 6px; 
            border: none; 
            border-radius: 50%; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
            position: relative; 
        }
        .export-btn:hover { 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .refresh-btn { 
            background: #FFFFFF; 
            color: #00a550; 
        }
        body.dark-mode .export-btn, body.dark-mode .refresh-btn { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .refresh-btn { color: #00a550; }
        .export-btn:hover::after { 
            content: attr(data-tooltip); 
            position: absolute; 
            top: 40px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 12px; 
            white-space: nowrap; 
            z-index: 10; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .export-btn:hover::after { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        
        /* Tables section */
        .tables-section { 
            display: flex; 
            gap: 10px; 
            flex: 1; 
            min-height: 360px; 
            width: 105%; 
        }
        .table-container { 
            flex: 0 0 75%; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            overflow-x: auto; 
            overflow-y: auto; 
            max-height: calc(100vh - 150px); 
            position: relative; 
        }
        body.dark-mode .table-container { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #f5f6f5; }
        .table-container::-webkit-scrollbar-thumb { 
            background: #d9e1e8; 
            border-radius: 3px; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .table-container::-webkit-scrollbar-track { background: #1a1a1a; }
        body.dark-mode .table-container::-webkit-scrollbar-thumb { 
            background: #555; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 11px; 
            table-layout: fixed; 
        }
        th, td { 
            padding: 8px 10px; 
            text-align: left; 
            border-bottom: 1px solid rgba(163, 177, 198, 0.3); 
            white-space: normal; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        th { 
            font-weight: 600; 
            background: #003087; 
            color: #FFFFFF; 
            position: sticky; 
            top: 0; 
            z-index: 2; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
        }
        body.dark-mode th { 
            background: #00205B; 
            color: #FFFFFF; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        td { color: #2c3e50; }
        body.dark-mode td { color: #d9e1e8; border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        tbody tr:hover { 
            background: #f0f0f0; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode tbody tr:hover { 
            background: #3a3a3a; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        .vin-highlight { font-weight: 600; color: #00a550; }
        
        /* Điều chỉnh chiều rộng cột cho tab Chưa Ghép */
        .chua-ghep col:nth-child(1) { width: 5%; }
        .chua-ghep col:nth-child(2) { width: 15%; }
        .chua-ghep col:nth-child(3) { width: 10%; }
        .chua-ghep col:nth-child(4) { width: 10%; }
        .chua-ghep col:nth-child(5) { width: 15%; }
        .chua-ghep col:nth-child(6) { width: 15%; }
        .chua-ghep col:nth-child(7) { width: 15%; }
        .chua-ghep col:nth-child(8) { width: 25%; }
        .chua-ghep col:nth-child(n+9) { width: 0; display: none; }
        
        /* Điều chỉnh chiều rộng cột cho tab Đã Ghép */
        .da-ghep col:nth-child(1) { width: 4%; }
        .da-ghep col:nth-child(2) { width: 10%; }
        .da-ghep col:nth-child(3) { width: 7%; }
        .da-ghep col:nth-child(4) { width: 7%; }
        .da-ghep col:nth-child(5) { width: 10%; }
        .da-ghep col:nth-child(6) { width: 8%; }
        .da-ghep col:nth-child(7) { width: 10%; }
        .da-ghep col:nth-child(8) { width: 15%; }
        .da-ghep col:nth-child(9) { width: 15%; }
        .da-ghep col:nth-child(10) { width: 9%; }
        .da-ghep col:nth-child(11) { width: 7%; }
        .da-ghep col:nth-child(12) { width: 8%; }
        
        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #003087;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        body.dark-mode .loading-spinner {
            border-top: 4px solid #00205B;
        }
        
        /* Detail panel */
        .detail-panel { 
            flex: 0 0 22%; 
            min-width: 200px; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            overflow-y: auto; 
        }
        body.dark-mode .detail-panel { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        .detail-panel::-webkit-scrollbar { width: 6px; }
        .detail-panel::-webkit-scrollbar-track { background: #f5f6f5; }
        .detail-panel::-webkit-scrollbar-thumb { 
            background: #d9e1e8; 
            border-radius: 3px; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .detail-panel::-webkit-scrollbar-track { background: #1a1a1a; }
        body.dark-mode .detail-panel::-webkit-scrollbar-thumb { 
            background: #555; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        .detail-panel h3 { 
            font-size: 14px; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            font-weight: 600; 
        }
        body.dark-mode .detail-panel h3 { color: #d9e1e8; }
        .detail-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 11px; 
        }
        .detail-table th, .detail-table td { 
            padding: 8px 10px; 
            text-align: left; 
            border-bottom: 1px solid rgba(163, 177, 198, 0.3); 
            white-space: normal; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        .detail-table th { 
            color: #2c3e50; 
            font-weight: 400; 
            width: 50%; 
            background: #f0f0f0; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .detail-table th { 
            color: #d9e1e8; 
            background: #3a3a3a; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        .detail-table td { color: #2c3e50; }
        body.dark-mode .detail-table td { color: #d9e1e8; border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        
        /* Pagination */
        .pagination { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 10px; 
            width: 100%; 
        }
        .pagination button { 
            padding: 6px 12px; 
            border: none; 
            border-radius: 8px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .pagination button:hover { 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .pagination button { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .pagination span { 
            padding: 6px 12px; 
            font-size: 12px; 
            color: #2c3e50; 
        }
        body.dark-mode .pagination span { color: #d9e1e8; }
        
        /* Footer với màu VinFast */
        footer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #003087; 
            color: #FFFFFF; 
            text-align: center; 
            padding: 8px 0; 
            font-size: 10px; 
            box-shadow: 4px -4px 8px rgba(0, 48, 135, 0.6), -4px 4px 8px rgba(255, 255, 255, 0.1); 
        }
        body.dark-mode footer { 
            background: #00205B; 
            box-shadow: 4px -4px 8px rgba(0, 0, 0, 0.4), -4px 4px 8px rgba(255, 255, 255, 0.5); 
        }
        
        /* Notification */
        #notification { 
            position: fixed; 
            top: 50px; 
            right: 80px; 
            padding: 8px 15px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            border-radius: 8px; 
            display: none; 
            z-index: 10001; 
            font-size: 12px; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode #notification { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }

        /* Responsive cho điện thoại */
        @media (max-width: 768px) {
            .slidebar {
                width: 50px;
                padding: 10px;
            }
            .slidebar .logo h1, .slidebar .tabs a span { opacity: 0; }
            .main-container {
                margin-left: 50px;
                width: calc(100vw - 50px);
                padding: 10px;
            }
            .navbar-controls {
                top: 10px;
                right: 10px;
                gap: 5px;
            }
            .nav-btn, .theme-toggle {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .filter-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .filter-section input {
                width: 100%;
                margin-bottom: 10px;
            }
            .filter-section .button-group {
                justify-content: flex-start;
                width: 100%;
            }
            .tables-section {
                flex-direction: column;
                width: 100%;
            }
            .table-container {
                flex: 1;
                width: 100%;
                max-height: 50vh;
            }
            .detail-panel {
                flex: 1;
                width: 100%;
                min-width: 0;
                max-height: 30vh;
            }
            #notification {
                top: 60px;
                right: 10px;
                font-size: 10px;
                padding: 6px 10px;
            }
            header, footer {
                font-size: 12px;
                padding: 8px 0;
            }
        }
    </style>
</head>
<body>
    <header>DANH SÁCH ĐƠN HÀNG GHÉP XE VINFAST THUẬN AN</header>
    <div class="slidebar" id="slidebar">
        <div class="logo">
            <h1>VinFast Thuận An</h1>
        </div>
        <div class="tabs">
            <a href="#" onclick="switchTab('Đã Ghép', this)" class="active"><span>Đã Ghép</span></a>
            <a href="#" onclick="switchTab('Chưa Ghép', this)"><span>Chưa Ghép</span></a>
        </div>
        <button class="toggle-btn" onclick="toggleSlidebar()"><i class="fas fa-bars"></i></button>
    </div>
    <div class="navbar-controls">
        <button class="theme-toggle" onclick="toggleTheme()" data-tooltip="Chuyển đổi giao diện"><i class="fas fa-moon"></i></button>
        <button class="nav-btn" onclick="goBack()" data-tooltip="Quay lại"><i class="fas fa-arrow-left"></i></button>
        <button class="nav-btn" onclick="logout()" data-tooltip="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
    </div>
    <div class="main-container" id="main-container">
        <div class="grid-container">
            <div class="filter-section">
                <div>
                    <input type="text" id="search-input" placeholder="Tìm kiếm...">
                </div>
                <div class="button-group">
                    <button class="export-btn refresh-btn" onclick="refreshData()" data-tooltip="Làm mới"><i class="fas fa-sync-alt"></i></button>
                    <button class="export-btn" onclick="exportToExcel()" data-tooltip="Xuất Excel"><i class="fas fa-file-excel"></i></button>
                    <button class="export-btn" onclick="printTable()" data-tooltip="In"><i class="fas fa-print"></i></button>
                </div>
            </div>
            <div class="tables-section">
                <div class="table-container">
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="loading-spinner"></div>
                        <span style="margin-left: 10px; font-size: 14px; color: #2c3e50;">Đang tải dữ liệu...</span>
                    </div>
                    <table id="data-table">
                        <colgroup id="table-colgroup">
                            <col><col><col><col><col><col><col><col><col><col><col><col>
                        </colgroup>
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div class="detail-panel" id="detail-panel">
                    <h3>Chi Tiết Đơn Hàng</h3>
                    <table id="detail-body" class="detail-table">
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="pagination" id="pagination">
                <button onclick="changePage(-1)" id="prev-btn">Trước</button>
                <span id="page-info">Trang 1</span>
                <button onclick="changePage(1)" id="next-btn">Sau</button>
            </div>
        </div>
    </div>
    <footer>© 2025 VinFast Minh Đạo Thuận An</footer>
    <div id="notification"></div>

    <script>
        let tableData = {};
        let currentSheet = 'Đã Ghép';
        let currentPage = 1;
        const rowsPerPage = 20;

        document.addEventListener("DOMContentLoaded", function () {
            if (sessionStorage.getItem("isLoggedIn") !== "true") {
                window.location.href = "index.html";
            } else {
                loadInitialData();
                setupSearch();
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
                }
            }
        });

        function showLoading() {
            document.getElementById("loading-overlay").classList.add("active");
        }

        function hideLoading() {
            document.getElementById("loading-overlay").classList.remove("active");
        }

        async function loadInitialData() {
            const apiURL = "https://script.google.com/macros/s/AKfycbymGID5EShR1NmVoG3h69qGbFrwRF0qAVEJEllnU65NFHOXKIVPkdcc4j9lKI_9E0q7fA/exec";
            showLoading();
            try {
                const response = await axios.get(apiURL);
                tableData['Đã Ghép'] = response.data.Sheet1 ? response.data.Sheet1.map(row => Object.values(row)) : [];
                tableData['Chưa Ghép'] = response.data.Sheet2 ? response.data.Sheet2.map(row => Object.values(row)) : [];
                sessionStorage.setItem('Đã Ghép', JSON.stringify(tableData['Đã Ghép']));
                sessionStorage.setItem('Chưa Ghép', JSON.stringify(tableData['Chưa Ghép']));
                renderTable(tableData[currentSheet]);
                highlightVinNumbers();
                showNotification("Dữ liệu đã được tải thành công!", 2000);
            } catch (error) {
                const errorMsg = error.response ? `Lỗi API: ${error.response.status}` : `Lỗi mạng: ${error.message}`;
                document.getElementById("table-body").innerHTML = `<tr><td colspan="12">⚠️ ${errorMsg}</td></tr>`;
                showNotification(errorMsg, 3000);
            } finally {
                hideLoading();
            }
            updateTableHeader(currentSheet);
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
            showNotification("Đã đăng xuất!", 2000);
        }

        function goBack() {
            window.location.href = "index.html";
            showNotification("Đã quay lại trang chủ!", 2000);
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const themeIcon = document.querySelector('.theme-toggle i');
            if (body.classList.contains('dark-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        function toggleSlidebar() {
            document.getElementById("slidebar").classList.toggle("collapsed");
            document.getElementById("main-container").classList.toggle("collapsed");
        }

        function switchTab(sheetName, element) {
            document.querySelectorAll('.tabs a').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentSheet = sheetName;
            currentPage = 1;

            if (tableData[sheetName] && tableData[sheetName].length > 0) {
                renderTable(tableData[sheetName]);
                highlightVinNumbers();
                updateTableHeader(sheetName);
            } else {
                document.getElementById("table-body").innerHTML = `<tr><td colspan="${sheetName === 'Đã Ghép' ? 12 : 8}">Không có dữ liệu cho ${sheetName}</td></tr>`;
                showNotification(`Không có dữ liệu cho ${sheetName}`, 2000);
            }
        }

        function updateTableHeader(sheetName) {
            const thead = document.getElementById("table-head");
            const colgroup = document.getElementById("table-colgroup");
            colgroup.className = "";
            if (sheetName === 'Đã Ghép') {
                colgroup.classList.add('da-ghep');
                thead.innerHTML = `
                    <tr>
                        <th>SỐ TT</th>
                        <th>TƯ VẤN BH</th>
                        <th>DÒNG XE</th>
                        <th>MODEL</th>
                        <th>NGOẠI THẤT</th>
                        <th>NỘI THẤT</th>
                        <th>SỐ ĐƠN HÀNG (VSO)</th>
                        <th>TÊN KHÁCH HÀNG</th>
                        <th>SỐ VIN</th>
                        <th>NGÀY GHÉP</th>
                        <th>SỐ NGÀY</th>
                        <th>VỊ TRÍ XE</th>
                    </tr>
                `;
            } else {
                colgroup.classList.add('chua-ghep');
                thead.innerHTML = `
                    <tr>
                        <th>SỐ TT</th>
                        <th>TƯ VẤN BH</th>
                        <th>DÒNG XE</th>
                        <th>MODEL</th>
                        <th>NGOẠI THẤT</th>
                        <th>NỘI THẤT</th>
                        <th>SỐ ĐƠN HÀNG (VSO)</th>
                        <th>TÊN KHÁCH HÀNG</th>
                    </tr>
                `;
            }
        }

        function renderTable(data, page = currentPage) {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            const start = (page - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedData = data.slice(start, end);

            paginatedData.forEach((row, index) => {
                const globalIndex = start + index + 1;
                const tr = document.createElement("tr");
                let cells = [`<td>${globalIndex}</td>`];
                
                const maxColumns = currentSheet === 'Đã Ghép' ? 11 : 7;
                for (let i = 0; i < maxColumns; i++) {
                    let value = row[i] || "";
                    if (currentSheet === 'Đã Ghép' && i === 8 && value) {
                        const date = new Date(value);
                        if (!isNaN(date)) {
                            value = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
                        }
                    } else if (currentSheet === 'Đã Ghép' && i === 9 && value) {
                        value = Math.floor(parseFloat(value)).toString();
                    }
                    cells.push(`<td>${value}</td>`);
                }
                
                tr.innerHTML = cells.join("");
                tr.onclick = () => showDetail(row, globalIndex);
                tbody.appendChild(tr);
            });

            updatePagination(data);
            if (data.length > 0) {
                showDetail(data[0], start + 1);
            } else {
                document.getElementById("detail-body").innerHTML = "<tr><td colspan='2'>Không có dữ liệu để hiển thị.</td></tr>";
            }
        }

        function updatePagination(data) {
            document.getElementById("page-info").textContent = `Trang ${currentPage} / ${Math.ceil(data.length / rowsPerPage) || 1}`;
            document.getElementById("prev-btn").disabled = currentPage === 1;
            document.getElementById("next-btn").disabled = currentPage === Math.ceil(data.length / rowsPerPage) || data.length === 0;
        }

        function changePage(delta) {
            currentPage = Math.min(Math.max(1, currentPage + delta), Math.ceil(tableData[currentSheet].length / rowsPerPage));
            const searchValue = document.getElementById("search-input").value.trim().toLowerCase();
            const filteredData = tableData[currentSheet].filter(row =>
                row.some(cell => cell?.toString().toLowerCase().includes(searchValue))
            );
            renderTable(filteredData);
            highlightVinNumbers();
            document.querySelector('.table-container').scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById("detail-panel").scrollTo({ top: 0, behavior: 'smooth' });
        }

        function highlightVinNumbers() {
            const tableRows = document.querySelectorAll("#table-body tr");
            tableRows.forEach(row => {
                const vinCell = currentSheet === 'Đã Ghép' ? row.cells[8] : null;
                if (vinCell && vinCell.textContent.trim() !== "") {
                    vinCell.classList.add("vin-highlight");
                }
            });
        }

        function showDetail(row, index) {
            const detailBody = document.querySelector("#detail-body tbody");
            let headers = currentSheet === 'Đã Ghép' 
                ? ["TƯ VẤN BH", "DÒNG XE", "MODEL", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG (VSO)", "TÊN KHÁCH HÀNG", "SỐ VIN", "NGÀY GHÉP", "SỐ NGÀY", "VỊ TRÍ XE"]
                : ["TƯ VẤN BH", "DÒNG XE", "MODEL", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG (VSO)", "TÊN KHÁCH HÀNG"];
            let html = "";
            
            headers.forEach((header, i) => {
                let value = row[i] || "";
                if (currentSheet === 'Đã Ghép' && i === 7 && value) {
                    const cellClass = ' class="vin-highlight"';
                    html += `<tr><th>${header}</th><td${cellClass}>${value}</td></tr>`;
                } else if (currentSheet === 'Đã Ghép' && i === 8 && value) {
                    const date = new Date(value);
                    if (!isNaN(date)) value = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    html += `<tr><th>${header}</th><td>${value}</td></tr>`;
                } else if (currentSheet === 'Đã Ghép' && i === 9 && value) {
                    value = Math.floor(parseFloat(value)).toString();
                    html += `<tr><th>${header}</th><td>${value}</td></tr>`;
                } else {
                    html += `<tr><th>${header}</th><td>${value}</td></tr>`;
                }
            });
            
            detailBody.innerHTML = html;
        }

        function exportToExcel() {
            if (confirm("Bạn có muốn xuất danh sách này sang Excel không?")) {
                const headers = currentSheet === 'Đã Ghép' 
                    ? ["SỐ TT", "TƯ VẤN BH", "DÒNG XE", "MODEL", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG (VSO)", "TÊN KHÁCH HÀNG", "SỐ VIN", "NGÀY GHÉP", "SỐ NGÀY", "VỊ TRÍ XE"]
                    : ["SỐ TT", "TƯ VẤN BH", "DÒNG XE", "MODEL", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG (VSO)", "TÊN KHÁCH HÀNG"];
                const wsData = tableData[currentSheet].map((row, index) => {
                    const rowData = { "SỐ TT": index + 1 };
                    const maxColumns = currentSheet === 'Đã Ghép' ? 11 : 7;
                    for (let i = 0; i < maxColumns; i++) {
                        let value = row[i] || "";
                        if (currentSheet === 'Đã Ghép' && i === 8 && value) {
                            const date = new Date(value);
                            if (!isNaN(date)) value = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
                        } else if (currentSheet === 'Đã Ghép' && i === 9 && value) {
                            value = Math.floor(parseFloat(value)).toString();
                        }
                        rowData[headers[i + 1]] = value;
                    }
                    return rowData;
                });
                const ws = XLSX.utils.json_to_sheet(wsData, { header: headers });
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, currentSheet);
                XLSX.writeFile(wb, `VinFast_Don_Hang_${currentSheet}_${new Date().toLocaleDateString('vi-VN')}.xlsx`);
                showNotification("Đã xuất file thành công!", 2000);
            }
        }

        function printTable() {
            const now = new Date().toLocaleString('vi-VN');
            const printContent = `
                <h2 style="color: #2c3e50;">VINFAST MĐ AN PHÚ</h2>
                <p>Hotline: 1900 232389</p>
                <p>In lúc: ${now}</p>
                ${document.getElementById("data-table").outerHTML}
            `;
            const win = window.open('', '', 'width=800,height=600');
            win.document.write(`
                <html>
                <head>
                    <title>In danh sách VinFast - ${currentSheet}</title>
                    <style>
                        body { font-family: 'Montserrat', sans-serif; margin: 20px; }
                        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
                        th, td { border: 1px solid #ddd; padding: 8px 10px; font-size: 11px; white-space: normal; word-wrap: break-word; overflow-wrap: break-word; }
                        th { background: #003087; color: #FFFFFF; }
                        .vin-highlight { font-weight: 600; color: #00a550; }
                        ${currentSheet === 'Đã Ghép' ? `
                            colgroup col:nth-child(1) { width: 50px; }
                            colgroup col:nth-child(2) { width: 100px; }
                            colgroup col:nth-child(3) { width: 80px; }
                            colgroup col:nth-child(4) { width: 80px; }
                            colgroup col:nth-child(5) { width: 100px; }
                            colgroup col:nth-child(6) { width: 100px; }
                            colgroup col:nth-child(7) { width: 120px; }
                            colgroup col:nth-child(8) { width: 120px; }
                            colgroup col:nth-child(9) { width: 100px; }
                            colgroup col:nth-child(10) { width: 80px; }
                            colgroup col:nth-child(11) { width: 60px; }
                            colgroup col:nth-child(12) { width: 80px; }
                        ` : `
                            colgroup col:nth-child(1) { width: 50px; }
                            colgroup col:nth-child(2) { width: 120px; }
                            colgroup col:nth-child(3) { width: 80px; }
                            colgroup col:nth-child(4) { width: 80px; }
                            colgroup col:nth-child(5) { width: 120px; }
                            colgroup col:nth-child(6) { width: 120px; }
                            colgroup col:nth-child(7) { width: 120px; }
                            colgroup col:nth-child(8) { width: 180px; }
                            colgroup col:nth-child(n+9) { width: 0; display: none; }
                        `}
                    </style>
                </head>
                <body>${printContent}</body>
                </html>
            `);
            win.document.close();
            win.print();
        }

        async function refreshData() {
            document.getElementById("search-input").value = "";
            currentPage = 1;
            const apiURL = "https://script.google.com/macros/s/AKfycbxCxV0E71ziqx8bl3J_TTjtGYnNB00dDy1v7OnaaCOuotS72G_9DV9U26xYPw7wsrCvuA/exec";
            showLoading();
            try {
                const response = await axios.get(apiURL);
                tableData['Đã Ghép'] = response.data.Sheet1 ? response.data.Sheet1.map(row => Object.values(row)) : [];
                tableData['Chưa Ghép'] = response.data.Sheet2 ? response.data.Sheet2.map(row => Object.values(row)) : [];
                sessionStorage.setItem('Đã Ghép', JSON.stringify(tableData['Đã Ghép']));
                sessionStorage.setItem('Chưa Ghép', JSON.stringify(tableData['Chưa Ghép']));
                renderTable(tableData[currentSheet]);
                highlightVinNumbers();
                showNotification("Dữ liệu đã được làm mới!", 2000);
            } catch (error) {
                const errorMsg = error.response ? `Lỗi API: ${error.response.status}` : `Lỗi mạng: ${error.message}`;
                document.getElementById("table-body").innerHTML = `<tr><td colspan="12">⚠️ ${errorMsg}</td></tr>`;
                showNotification(errorMsg, 3000);
            } finally {
                hideLoading();
            }
            updateTableHeader(currentSheet);
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function setupSearch() {
            document.getElementById("search-input").addEventListener("input", debounce(function () {
                const searchValue = this.value.trim().toLowerCase();
                const filteredData = tableData[currentSheet].filter(row =>
                    row.some(cell => cell?.toString().toLowerCase().includes(searchValue))
                );
                currentPage = 1;
                renderTable(filteredData);
                highlightVinNumbers();
            }, 300));
        }

        function showNotification(message, duration = 2000) {
            const notif = document.getElementById("notification");
            notif.textContent = message;
            notif.style.display = "block";
            clearTimeout(notif.timeout);
            notif.timeout = setTimeout(() => notif.style.display = "none", duration);
        }
    </script>
</body>
</html>
