<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VinFast - Danh Sách Đơn Hàng Bán Xe</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* CSS giữ nguyên từ file thứ hai, chỉ điều chỉnh một số phần cần thiết */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        body.dark-mode {
            background: #1a1a1a;
            color: #ffffff;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #003087, #005eb8);
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .navbar .logo h1 {
            font-size: 20px;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        .navbar .tabs {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            flex-grow: 1;
            margin-left: 10px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .navbar .tabs::-webkit-scrollbar {
            display: none;
        }

        .navbar .tabs a {
            position: relative;
            padding: 10px 15px;
            text-decoration: none;
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .navbar .tabs a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 94, 184, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
            z-index: -1;
        }

        .navbar .tabs a:hover::before, .navbar .tabs a.active::before {
            width: 200px;
            height: 200px;
        }

        .navbar .tabs a:hover {
            background: #005eb8;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 94, 184, 0.8);
        }

        .navbar .tabs a.active {
            background: #005eb8;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(0, 94, 184, 1);
            animation: glowPulse 2s infinite ease-in-out;
        }

        .theme-toggle {
            margin-left: 10px;
            padding: 8px;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 94, 184, 0.8); }
            50% { box-shadow: 0 0 30px rgba(0, 94, 184, 1); }
        }

        .main-container {
            display: flex;
            margin-top: 60px;
            padding: 15px;
            gap: 15px;
            height: calc(100vh - 80px);
        }

        .grid-container {
            flex: 2;
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: background 0.3s;
        }

        body.dark-mode .grid-container {
            background: #2a2a2a;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-container input {
            padding: 10px 15px;
            width: 100%;
            max-width: 250px;
            border: 1px solid #a9a9a9;
            border-radius: 10px;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        body.dark-mode .search-container input {
            background: #333;
            color: #ffffff;
            border-color: #555;
        }

        .search-container input:focus {
            border-color: #005eb8;
            box-shadow: 0 0 10px rgba(0, 94, 184, 0.3);
            outline: none;
        }

        .export-btn-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .total-count-container {
            text-align: center;
            font-size: 12px;
            color: #1a1a1a;
        }

        body.dark-mode .total-count-container {
            color: #ffffff;
        }

        .export-btn {
            position: relative;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #005eb8;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .export-btn:hover {
            background: #003087;
            box-shadow: 0 0 15px rgba(0, 94, 184, 0.5);
        }

        .refresh-btn {
            background: #28a745;
        }

        .refresh-btn:hover {
            background: #218838;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.5);
        }

        .export-btn[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #ffffff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .export-btn[data-tooltip]::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: #333;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .export-btn:hover::after, .export-btn:hover::before {
            opacity: 1;
        }

        body.dark-mode .export-btn[data-tooltip]::after {
            background: #66b0ff;
        }

        body.dark-mode .export-btn[data-tooltip]::before {
            border-top-color: #66b0ff;
        }

        .table-container {
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            overflow-x: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #005eb8;
            border-radius: 10px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: #003087;
        }

        body.dark-mode .table-container::-webkit-scrollbar-track {
            background: #333;
        }

        body.dark-mode .table-container::-webkit-scrollbar-thumb {
            background: #66b0ff;
        }

        body.dark-mode .table-container::-webkit-scrollbar-thumb:hover {
            background: #4a90e2;
        }

        table {
            width: 100%;
            min-width: 600px;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            padding: 6px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #003087;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            background: #ffffff;
            color: #1a1a1a;
        }

        body.dark-mode th {
            background: #0044cc;
        }

        body.dark-mode td {
            background: #333;
            color: #ffffff;
            border-bottom: 1px solid #555;
        }

        .vin-highlight {
            background: #e6f0ff;
            font-weight: 700;
            color: #003087;
        }

        body.dark-mode .vin-highlight {
            background: #4a6fa5;
            color: #ffffff;
        }

        tbody tr:hover {
            background: #f0f8ff;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        body.dark-mode tbody tr:hover {
            background: #444;
        }

        tbody tr.selected {
            background: #cce5ff;
            font-weight: 700;
        }

        body.dark-mode tbody tr.selected {
            background: #5a7fb5;
        }

        .detail-panel {
            flex: 1;
            background: #ffffff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #005eb8;
            transition: all 0.3s ease;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .detail-panel::-webkit-scrollbar {
            width: 8px;
        }

        .detail-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .detail-panel::-webkit-scrollbar-thumb {
            background: #005eb8;
            border-radius: 10px;
        }

        .detail-panel::-webkit-scrollbar-thumb:hover {
            background: #003087;
        }

        body.dark-mode .detail-panel::-webkit-scrollbar-track {
            background: #333;
        }

        body.dark-mode .detail-panel::-webkit-scrollbar-thumb {
            background: #66b0ff;
        }

        body.dark-mode .detail-panel::-webkit-scrollbar-thumb:hover {
            background: #4a90e2;
        }

        body.dark-mode .detail-panel {
            background: #2a2a2a;
            border-left: 4px solid #66b0ff;
        }

        .detail-panel h3 {
            font-size: 18px;
            color: #003087;
            margin-bottom: 15px;
            font-weight: 700;
            position: sticky;
            top: 0;
            background: #ffffff;
            z-index: 10;
        }

        body.dark-mode .detail-panel h3 {
            color: #66b0ff;
            background: #2a2a2a;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .detail-table th {
            background: #f9f9f9;
            color: #1a1a1a;
            text-align: left;
            padding: 10px;
            font-weight: 400;
        }

        body.dark-mode .detail-table th {
            background: #333;
            color: #ffffff;
        }

        .detail-table td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        body.dark-mode .detail-table td {
            border-bottom: 1px solid #555;
            color: #ffffff;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #003087;
            color: #ffffff;
            text-align: center;
            padding: 8px 0;
            font-size: 10px;
        }

        body.dark-mode footer {
            background: #0044cc;
        }

        .loading-spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .loading-spinner .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #a9a9a9;
            border-top: 4px solid #005eb8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        body.dark-mode .loading-spinner .spinner {
            border: 4px solid #555;
            border-top: 4px solid #66b0ff;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #notification {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 8px 15px;
            background: #005eb8;
            color: #ffffff;
            border-radius: 10px;
            display: none;
            z-index: 10001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 12px;
        }

        body.dark-mode #notification {
            background: #66b0ff;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 10px;
                height: 50px;
            }
            .navbar .logo h1 {
                font-size: 16px;
            }
            .navbar .tabs a {
                padding: 8px 10px;
                font-size: 10px;
            }
            .theme-toggle {
                font-size: 14px;
                padding: 5px;
            }
            .main-container {
                flex-direction: column;
                padding: 10px;
                margin-top: 50px;
                height: calc(100vh - 70px);
            }
            .grid-container {
                padding: 10px;
            }
            .controls {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .search-container input {
                max-width: 100%;
                font-size: 11px;
                padding: 8px 12px;
            }
            .export-btn-container {
                align-items: center;
                width: 100%;
            }
            .button-group {
                gap: 10px;
            }
            .export-btn {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .export-btn[data-tooltip]::after {
                font-size: 10px;
                top: -30px;
                padding: 4px 8px;
            }
            .export-btn[data-tooltip]::before {
                top: -6px;
                border-width: 3px;
            }
            .total-count-container {
                font-size: 11px;
            }
            .table-container {
                max-height: calc(100vh - 220px);
            }
            table {
                font-size: 11px;
            }
            th, td {
                padding: 5px;
            }
            .detail-panel {
                margin-top: 15px;
                border-left: none;
                border-top: 4px solid #005eb8;
                max-height: calc(100vh - 220px);
                padding: 10px;
            }
            body.dark-mode .detail-panel {
                border-top: 4px solid #66b0ff;
            }
            .detail-panel h3 {
                font-size: 16px;
            }
            .detail-table {
                font-size: 11px;
            }
            .detail-table th, .detail-table td {
                padding: 8px;
            }
            footer {
                font-size: 9px;
                padding: 6px 0;
            }
            #notification {
                top: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <h1>VinFast MĐ An Phú</h1>
        </div>
        <div class="tabs">
            <a href="#" onclick="fetchSheetData('Đã Ghép', this)" class="active">Đã Ghép</a>
            <a href="#" onclick="fetchSheetData('Chưa Ghép', this)">Chưa Ghép</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
    </div>

    <div class="main-container">
        <div class="grid-container">
            <div class="controls">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Tìm kiếm...">
                </div>
                <div class="export-btn-container">
                    <div class="button-group">
                        <button class="export-btn refresh-btn" onclick="refreshData()" data-tooltip="Làm mới"><i class="fas fa-sync-alt"></i></button>
                        <button class="export-btn" onclick="exportToExcel()" data-tooltip="Xuất Excel"><i class="fas fa-file-excel"></i></button>
                        <button class="export-btn" onclick="printTable()" data-tooltip="In"><i class="fas fa-print"></i></button>
                    </div>
                    <div class="total-count-container">
                        Tổng số lượng: <span id="total-count">0</span>
                    </div>
                </div>
            </div>
            <div class="table-container">
                <table id="data-table">
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div class="detail-panel" id="detail-panel">
            <h3>Chi Tiết Đơn Hàng</h3>
            <div id="detail-body"></div>
        </div>
    </div>

    <footer>
        © 2025 VinFast Minh Đạo An Phú
    </footer>

    <div class="loading-spinner">
        <div class="spinner"></div>
    </div>

    <div id="notification"></div>

    <script>
        let tableData = {};
        let currentSheet = 'Đã Ghép';

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const themeIcon = document.querySelector('.theme-toggle i');
            if (document.body.classList.contains('dark-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('.theme-toggle i').classList.remove('fa-moon');
            document.querySelector('.theme-toggle i').classList.add('fa-sun');
        }

        async function fetchSheetData(sheetName, element) {
            document.querySelectorAll('.tabs a').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentSheet = sheetName;

            const spinner = document.querySelector('.loading-spinner');
            if (!tableData[sheetName]) spinner.style.display = 'block';

            const apiURL = "https://script.google.com/macros/s/AKfycbymGID5EShR1NmVoG3h69qGbFrwRF0qAVEJEllnU65NFHOXKIVPkdcc4j9lKI_9E0q7fA/exec";
            try {
                if (!tableData[sheetName]) {
                    const response = await axios.get(apiURL);
                    tableData['Đã Ghép'] = response.data.Sheet1 ? response.data.Sheet1.map(row => Object.values(row)) : [];
                    tableData['Chưa Ghép'] = response.data.Sheet2 ? response.data.Sheet2.map(row => Object.values(row)) : [];
                }
                renderTable(tableData[sheetName]);
                highlightVinNumbers();
                showNotification(`Dữ liệu ${sheetName} đã được cập nhật! (${tableData[sheetName].length} đơn hàng)`, 2000);
            } catch (error) {
                document.getElementById("table-body").innerHTML = `<tr><td colspan="12" style="color: red;">⚠️ Error loading data: ${error.message}</td></tr>`;
                showNotification("Lỗi tải dữ liệu!", 3000);
            }
            spinner.style.display = 'none';

            updateTableHeader(sheetName);
        }

        function updateTableHeader(sheetName) {
            const thead = document.getElementById("table-head");
            if (sheetName === 'Đã Ghép') {
                thead.innerHTML = `
                    <tr>
                        <th>SỐ TT</th>
                        <th>TƯ VẤN BH</th>
                        <th>DÒNG XE</th>
                        <th>MODEL</th>
                        <th>NGOẠI THẤT</th>
                        <th>NỘI THẤT</th>
                        <th>SỐ ĐƠN HÀNG (VSO)</th>
                        <th>TÊN KHÁCH HÀNG</th>
                        <th>SỐ VIN</th>
                        <th>NGÀY GHÉP</th>
                        <th>SỐ NGÀY</th>
                        <th>VỊ TRÍ XE</th>
                    </tr>
                `;
            } else {
                thead.innerHTML = `
                    <tr>
                        <th>SỐ TT</th>
                        <th>TƯ VẤN BH</th>
                        <th>DÒNG XE</th>
                        <th>MODEL</th>
                        <th>NGOẠI THẤT</th>
                        <th>NỘI THẤT</th>
                        <th>SỐ ĐƠN HÀNG (VSO)</th>
                        <th>TÊN KHÁCH HÀNG</th>
                    </tr>
                `;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            data.forEach((row, index) => {
                const tr = document.createElement("tr");
                let cells = [`<td>${index + 1}</td>`];
                
                row.forEach((cell, i) => {
                    let value = cell || "";
                    if (currentSheet === 'Đã Ghép' && i === 8 && value) {
                        const date = new Date(value);
                        if (!isNaN(date)) {
                            value = date.toLocaleDateString('vi-VN', {
                                day: '2-digit',
                                month: '2-digit',
                                year: 'numeric'
                            });
                        }
                    } else if (currentSheet === 'Đã Ghép' && i === 9 && value) {
                        value = Math.floor(parseFloat(value)).toString();
                    }
                    cells.push(`<td>${value}</td>`);
                });
                
                tr.innerHTML = cells.join("");
                tr.onclick = () => showDetail(row, index + 1);
                tbody.appendChild(tr);
            });
            document.getElementById("total-count").textContent = data.length;

            // Hiển thị chi tiết của đơn hàng đầu tiên (nếu có)
            if (data.length > 0) {
                showDetail(data[0], 1);
            } else {
                document.getElementById("detail-body").innerHTML = "<p>Không có dữ liệu để hiển thị.</p>";
            }
        }

        function highlightVinNumbers() {
            const tableRows = document.querySelectorAll("#table-body tr");
            tableRows.forEach(row => {
                const vinCell = row.cells[8];
                if (vinCell && vinCell.textContent.trim() !== "") vinCell.classList.add("vin-highlight");
            });
        }

        function showDetail(row, index) {
            const detailBody = document.getElementById("detail-body");
            let headers = currentSheet === 'Đã Ghép' 
                ? ["SỐ TT", "TƯ VẤN BH", "DÒNG XE", "MODEL", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG (VSO)", "TÊN KHÁCH HÀNG", "SỐ VIN", "NGÀY GHÉP", "SỐ NGÀY", "VỊ TRÍ XE"]
                : ["SỐ TT", "TƯ VẤN BH", "DÒNG XE", "MODEL", "NGOẠI THẤT", "NỘI THẤT", "SỐ ĐƠN HÀNG (VSO)", "TÊN KHÁCH HÀNG"];
            let html = "<table class='detail-table'>";
            
            // Thêm số thứ tự
            html += `<tr><th>${headers[0]}</th><td>${index}</td></tr>`;
            
            // Thêm các cột còn lại
            row.forEach((cell, i) => {
                let value = cell || "";
                if (currentSheet === 'Đã Ghép' && i === 8 && value) {
                    const date = new Date(value);
                    if (!isNaN(date)) {
                        value = date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    }
                } else if (currentSheet === 'Đã Ghép' && i === 9 && value) {
                    value = Math.floor(parseFloat(value)).toString();
                }
                const cellClass = (currentSheet === 'Đã Ghép' && i === 8) ? ' class="vin-highlight"' : '';
                html += `<tr><th>${headers[i + 1]}</th><td${cellClass}>${value}</td></tr>`;
            });
            
            html += "</table>";
            detailBody.innerHTML = html;

            // Đánh dấu hàng được chọn
            const rows = document.querySelectorAll("#table-body tr");
            rows.forEach(row => row.classList.remove("selected"));
            rows[index - 1].classList.add("selected");
        }

        function exportToExcel() {
            if (confirm("Bạn có muốn xuất danh sách này sang Excel không?")) {
                const table = document.getElementById("data-table");
                const tableHTML = table.outerHTML.replace(/ /g, '%20');
                const dataType = 'application/vnd.ms-excel';
                const downloadLink = document.createElement("a");
                document.body.appendChild(downloadLink);

                const filename = `VinFast_Don_Hang_${currentSheet}.xls`;
                if (navigator.msSaveOrOpenBlob) {
                    const blob = new Blob(['\ufeff', tableHTML], { type: dataType });
                    navigator.msSaveOrOpenBlob(blob, filename);
                } else {
                    downloadLink.href = 'data:' + dataType + ', ' + tableHTML;
                    downloadLink.download = filename;
                    downloadLink.click();
                }
                document.body.removeChild(downloadLink);
                showNotification("Đã xuất file thành công!", 2000);
            }
        }

        function printTable() {
            const now = new Date();
            const printDateTime = now.toLocaleString('vi-VN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const table = document.getElementById("data-table");
            const printContent = `
                <div style="text-align: center;">
                    <h2 style="color: #003087;">VINFAST MĐ AN PHÚ</h2>
                    <p>Hotline: 1900 232389</p>
                    <p>In lúc: ${printDateTime}</p>
                </div>
                ${table.outerHTML}
            `;

            const win = window.open('', '', 'width=800,height=600');
            win.document.write(`
                <html>
                <head>
                    <title>In danh sách VinFast - ${currentSheet}</title>
                    <style>
                        body { font-family: 'Montserrat', sans-serif; margin: 20px; }
                        table { width: 100%; border-collapse: collapse; }
                        th, td { border: 1px solid #000; padding: 8px; }
                        th { background: #003087; color: #fff; }
                        .vin-highlight { background: #e6f0ff; font-weight: 700; color: #003087; }
                        .selected { background: #cce5ff; font-weight: 700; }
                        @media print {
                            body { margin: 0; }
                            table { page-break-inside: auto; }
                            tr { page-break-inside: avoid; page-break-after: auto; }
                        }
                    </style>
                </head>
                <body>${printContent}</body>
                </html>
            `);
            win.document.close();
            win.print();
        }

        function refreshData() {
            fetchSheetData(currentSheet, document.querySelector('.tabs a.active'));
            document.getElementById("search-input").value = "";
            showNotification("Dữ liệu đã được làm mới!", 2000);
        }

        function setupSearch() {
            document.getElementById("search-input").addEventListener("input", function () {
                const searchValue = this.value.trim().toLowerCase();
                const filteredData = tableData[currentSheet].filter(row =>
                    row.some(cell => cell?.toString().toLowerCase().includes(searchValue))
                );
                renderTable(filteredData);
                highlightVinNumbers();
                document.getElementById("total-count").textContent = filteredData.length;
            });
        }

        function showNotification(message, duration = 3000) {
            const notif = document.getElementById("notification");
            notif.textContent = message;
            notif.style.display = "block";
            setTimeout(() => notif.style.display = "none", duration);
        }

        document.addEventListener("DOMContentLoaded", function () {
            fetchSheetData('Đã Ghép', document.querySelector('.tabs a:first-child'));
            setupSearch();
        });
    </script>
</body>
</html>
