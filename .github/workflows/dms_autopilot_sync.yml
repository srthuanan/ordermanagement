name: DMS VinFast Autopilot Sync 24/7

on:
  schedule:
    # Chạy mỗi 30 phút để quét GPS xe (0, 30 phút mỗi giờ)
    - cron: '0,30 * * * *'
    # Chạy đồng bộ toàn diện Đơn hàng & Kho xe mỗi 4 tiếng (vào phút thứ 5 của các khung giờ 0, 4, 8, 12, 16, 20)
    - cron: '5 */4 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công từ giao diện GitHub bất cứ lúc nào

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v3

    - name: Thiết lập Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # Tự động cache các thư viện để chạy nhanh hơn

    - name: Cài đặt thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Xác định chế độ chạy (Mode)
      id: set-mode
      run: |
        # Nếu chạy do lịch trình cron 30 phút, chỉ chạy quét GPS
        # Nếu chạy thủ công hoặc lịch trình cron 4 tiếng, chạy đồng bộ toàn diện (full)
        if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0,30 * * * *" ]; then
          echo "mode=gps_only" >> $GITHUB_OUTPUT
        else
          echo "mode=full" >> $GITHUB_OUTPUT
        fi

    - name: Chạy Robot đồng bộ Autopilot
      env:
        DMS_USERNAME: ${{ secrets.DMS_USERNAME }}
        DMS_PASSWORD: ${{ secrets.DMS_PASSWORD }}
        DMS_SESSION_COOKIE: ${{ secrets.DMS_SESSION_COOKIE }}
        DMS_BEARER_TOKEN: ${{ secrets.DMS_BEARER_TOKEN }}
      run: |
        python scripts/cloud_dms_sync_radar.py ${{ steps.set-mode.outputs.mode }}
