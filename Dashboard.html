<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Autopilot Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.15);
            --bg: #09090b;
            --card-bg: rgba(20, 20, 25, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.04) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-dot {
            width: 12px;
            height: 12px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: pulse 1.8s infinite ease-in-out;
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
        }
        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }
        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            background: #e4e4e7;
            transform: scale(1.02);
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 15px 4px rgba(16, 185, 129, 0.8); }
            100% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header, .footer-info {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            .logo-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-section">
                <div class="logo-dot"></div>
                <h1>DMS AUTOPILOT MONITOR</h1>
            </div>
            <div class="status-badge">Hoạt động</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📍 Định vị xe Live (GPS)</div>
                <div class="stat-value">70</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📋 Đơn hàng đã đồng bộ</div>
                <div class="stat-value">986</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🏢 Xe chưa bán trong kho</div>
                <div class="stat-value">500</div>
            </div>
        </div>
        
        <div class="footer-info">
            <div>Cập nhật cuối: <strong style="color: #ffffff;">2026-05-07 22:29:06</strong></div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <a href="https://srthuanan.github.io/ordermanagement" class="btn" target="_blank" style="background: var(--primary); color: #000000;">🗺️ MỞ BẢN ĐỒ LIVE (WEB)</a>
                <a href="http://localhost:5173" class="btn" target="_blank" style="background: rgba(255,255,255,0.05); color: #ffffff; border: 1px solid var(--border);">💻 Mở Local (Vite)</a>
            </div>
        </div>
    </div>
</body>
</html>
