<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quản Lý Ghép Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
                if (sessionStorage.getItem('loggedIn') !== 'true') {
            window.location.href = "index.html";
        }

        function logout() {
            sessionStorage.removeItem('loggedIn');
            window.location.href = 'index.html';
        }

        function loadPage(page) {
            fetch(page)
                .then(response => response.text())
                .then(html => {
                    document.getElementById("content-container").innerHTML = html;
                })
                .catch(error => {
                    console.error("Lỗi tải trang:", error);
                    document.getElementById("content-container").innerHTML = `<p class="text-red-500">Không thể tải trang. Vui lòng thử lại!</p>`;
                });
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll(".sidebar a").forEach(link => {
                link.addEventListener("click", function (event) {
                    event.preventDefault();
                    const page = this.getAttribute("href");
                    if (page !== "#customers" && page !== "#settings") {
                        loadPage(page);
                    }
                });
            });
        });
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            background: url('https://vinfast-vn.vn/wp-content/uploads/2023/10/vinfast-vf8-1-1.png') no-repeat center center/cover;
            backdrop-filter: blur(5px);
        }
        .sidebar {
            width: 240px;
            background: #1a1a1a;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 5px 0px 10px rgba(0, 0, 0, 0.2);
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 15px;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            transition: 0.3s;
        }
        .sidebar a i {
            margin-right: 10px;
        }
        .sidebar a:hover {
            background: #1abc9c;
            transform: scale(1.05);
        }
        .content {
            flex-grow: 1;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            margin: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .dashboard-header {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .info-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            margin-top: 20px;
        }
        .info-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 2px 4px 15px rgba(0, 0, 0, 0.15);
            text-align: left;
            overflow: auto;
            max-height: 450px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .info-box:hover {
            transform: scale(1.02);
            box-shadow: 3px 6px 20px rgba(0, 0, 0, 0.25);
        }
        .info-box h3 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1abc9c;
        }
        #content-container {
            width: 100%;
            padding: 20px;
            text-align: left;
        }
        .logout-btn {
            background: red;
            text-align: center;
            padding: 12px;
            border-radius: 5px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <h2>🚗 Dashboard</h2>
            <a href="KPI.html"><i>📊</i> Tổng Quan</a>
            <a href="yeucaughepxe.html"><i>🚘</i> Yêu Cầu Ghép Xe</a>
            <a href="danhsach.html"><i>📋</i> Đơn Hàng</a>
            <a href="#customers"><i>👥</i> Khách Hàng</a>
            <a href="#settings"><i>⚙️</i> Cài Đặt</a>
        </div>
        <div>
            <div class="logout-btn" onclick="logout()">🚪 Đăng Xuất</div>
        </div>
    </div>
    <div class="content">
        <div class="dashboard-header">🚀 Quản Lý Ghép Xe</div>
        <p>Chọn một mục trong menu để quản lý hệ thống.</p>
        <div class="info-container">
            <div class="info-box">
                <h3>🚘 Yêu Cầu Ghép Xe Mới Nhất</h3>
                <div id="requests-container">Đang tải...</div>
            </div>
            <div class="info-box">
                <h3>📋 Đơn Hàng Ghép Xe Mới Nhất</h3>
                <div id="orders-container">Đang tải...</div>
            </div>
        </div>
        <div id="content-container">
            <!-- Nội dung động sẽ được tải vào đây -->
        </div>
    </div>
</body>
</html>
