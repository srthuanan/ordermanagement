<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Thao Tác Nhân Viên - VinFast Nội Bộ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }
        body.dark-mode { background: #1a1a1a; color: #ffffff; }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #003087, #005eb8);
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }
        .navbar .logo-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .navbar .logo-text span { color: #ffffff; }
        .navbar .menu {
            display: none;
            flex-grow: 1;
            justify-content: center;
            list-style: none;
            margin-left: 20px;
        }
        .navbar .menu.active { display: flex; }
        .navbar .menu li a {
            padding: 10px 15px;
            text-decoration: none;
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
            border-radius: 5px;
        }
        .navbar .menu li a:hover {
            background: #005eb8;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 94, 184, 0.5);
        }
        .navbar .menu li a.active {
            background: #005eb8;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 94, 184, 0.8);
            animation: highlight 1.5s infinite ease-in-out;
        }
        @keyframes highlight {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 94, 184, 0.5); }
            50% { box-shadow: 0 0 25px rgba(0, 94, 184, 1); }
        }
        .logout-btn {
            padding: 6px 12px;
            background: #004aad;
            color: #fff;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            margin-left: 10px;
        }
        .logout-btn:hover {
            background: #003087;
            box-shadow: 0 4px 10px rgba(0, 48, 135, 0.4);
        }
        .dark-mode-btn, .language-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
        }
        .user-info {
            color: #ffffff;
            font-size: 12px;
            margin-left: 10px;
            display: none;
        }
        .session-time {
            color: #ffffff;
            font-size: 12px;
            margin-left: 10px;
            display: none;
        }
        .online-status {
            width: 10px;
            height: 10px;
            background: #28a745;
            border-radius: 50%;
            display: none;
            margin-left: 10px;
        }
        .hamburger { display: none; font-size: 24px; color: #ffffff; cursor: pointer; }
        .hero {
            height: 50vh;
            background: url('https://file3.qdnd.vn/data/images/0/2025/01/11/upload_2085/a1.jpg') no-repeat center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            margin-top: 60px;
        }
        .hero h2 { font-size: 36px; font-weight: 700; }
        .hero p { font-size: 18px; }
        .management-section {
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
            background: #f9f9f9;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        body.dark-mode .management-section { background: #2a2a2a; }
        .management-section h3 {
            font-size: 24px;
            color: #003087;
            font-weight: 700;
            margin-bottom: 20px;
        }
        body.dark-mode .management-section h3 { color: #66b0ff; }
        .management-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .management-card {
            flex: 1;
            min-width: 300px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        body.dark-mode .management-card { background: #333; }
        .management-card h4 {
            font-size: 18px;
            color: #003087;
            margin-bottom: 15px;
        }
        body.dark-mode .management-card h4 { color: #66b0ff; }
        .search-bar input {
            padding: 10px;
            width: 100%;
            max-width: 300px;
            border: 1px solid #a9a9a9;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 20px;
        }
        body.dark-mode .search-bar input {
            background: #333;
            color: #fff;
            border-color: #555;
        }
        .activity-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .activity-item {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark-mode .activity-item { border-bottom: 1px solid #555; }
        .activity-item span {
            font-size: 14px;
            color: #555;
        }
        body.dark-mode .activity-item span { color: #cccccc; }
        @media (max-width: 768px) {
            .navbar { padding: 0 10px; height: 50px; }
            .navbar .logo-text { font-size: 14px; }
            .navbar .menu {
                display: none;
                position: absolute;
                top: 50px;
                left: 0;
                width: 100%;
                background: #003087;
                padding: 10px;
                flex-direction: column;
                align-items: flex-start;
            }
            .navbar .menu.active { display: flex; }
            .hamburger { display: block; }
            .hero { margin-top: 50px; }
            .hero h2 { font-size: 24px; }
            .hero p { font-size: 14px; }
            .management-section { padding: 20px 10px; }
            .management-content { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo-text">VINFAST <span>AN PHÚ</span></div>
        <ul class="menu" id="navMenu"></ul>
        <span class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></span>
        <span class="user-info" id="userInfo"></span>
        <span class="session-time" id="sessionTime"></span>
        <div class="online-status" id="onlineStatus"></div>
        <div class="logout-btn" onclick="logout()" id="logoutBtn">Đăng Xuất</div>
        <button class="language-btn" onclick="toggleLanguage()" id="languageBtn">EN</button>
        <button class="dark-mode-btn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
    </nav>

    <!-- Hero Section -->
    <section class="hero" data-aos="fade-up">
        <h2 data-lang="hero-title">Hệ Thống Nội Bộ VinFast</h2>
        <p data-lang="hero-subtitle">Showroom Thuận An</p>
    </section>

    <!-- Management Section -->
    <section class="management-section" id="managementSection" data-aos="fade-up">
        <h3 data-lang="management-title">Quản Lý Thao Tác Nhân Viên</h3>
        <div class="management-content">
            <div class="management-card">
                <h4 data-lang="activity-log-title">Lịch Sử Thao Tác</h4>
                <div class="search-bar">
                    <input type="text" id="activitySearch" placeholder="Tìm kiếm lịch sử..." oninput="filterActivities()" data-lang-placeholder="search-activities">
                </div>
                <div class="activity-list" id="activityList"></div>
            </div>
        </div>
    </section>

    <!-- Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1500, easing: 'ease-out-bounce' });
        let isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        let currentUser = localStorage.getItem('currentUser') || '';
        let userRole = localStorage.getItem('userRole') || 'employee';
        const sessionTimeout = 15 * 60 * 1000; // 15 phút
        let activityLog = JSON.parse(localStorage.getItem('activityLog')) || [];
        let language = localStorage.getItem('language') || 'vi';

        const translations = {
            vi: {
                "hero-title": "Hệ Thống Nội Bộ VinFast",
                "hero-subtitle": "Showroom Thuận An",
                "management-title": "Quản Lý Thao Tác Nhân Viên",
                "activity-log-title": "Lịch Sử Thao Tác",
                "search-activities": "Tìm kiếm lịch sử..."
            },
            en: {
                "hero-title": "VinFast Internal System",
                "hero-subtitle": "Thuan An Showroom",
                "management-title": "Employee Activity Management",
                "activity-log-title": "Activity Log",
                "search-activities": "Search activity log..."
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            updateUI();
            updateLanguage();
            if (isLoggedIn) {
                startSessionTimer();
                updateSessionTime();
                if (userRole === 'manager') loadActivities();
                else window.location.href = 'index.html'; // Chuyển hướng nếu không phải manager
            } else {
                window.location.href = 'index.html'; // Chuyển hướng nếu chưa đăng nhập
            }
        });

        function updateUI() {
            const menu = document.getElementById('navMenu');
            const logoutBtn = document.getElementById('logoutBtn');
            const userInfo = document.getElementById('userInfo');
            const sessionTime = document.getElementById('sessionTime');
            const onlineStatus = document.getElementById('onlineStatus');

            logoutBtn.style.display = isLoggedIn ? 'block' : 'none';
            onlineStatus.style.display = isLoggedIn ? 'inline-block' : 'none';
            userInfo.style.display = isLoggedIn ? 'inline' : 'none';
            sessionTime.style.display = isLoggedIn ? 'inline' : 'none';

            if (isLoggedIn) {
                menu.classList.add('active');
                userInfo.textContent = `${language === 'vi' ? 'Xin chào' : 'Hello'}, ${currentUser} (${userRole === 'manager' ? (language === 'vi' ? 'Quản lý' : 'Manager') : (language === 'vi' ? 'Nhân viên' : 'Employee')})`;
                updateMenu();
            } else {
                menu.classList.remove('active');
                menu.innerHTML = '';
            }
        }

        function updateMenu() {
            const menu = document.getElementById('navMenu');
            const commonLinks = `
                <li><a href="kpi.html">${language === 'vi' ? 'Kết Quả Kinh Doanh' : 'Business Results'}</a></li>
                <li><a href="yeucaughepxe.html">${language === 'vi' ? 'Yêu Cầu Ghép Xe' : 'Vehicle Pairing Request'}</a></li>
                <li><a href="danhsach.html">${language === 'vi' ? 'Danh Sách Đơn Hàng' : 'Order List'}</a></li>
                <li><a href="xedaban.html">${language === 'vi' ? 'Danh Sách Xe Đã Bán' : 'Sold Vehicles List'}</a></li>
            `;
            const managerLinks = userRole === 'manager' ? `
                <li><a href="manage.html">${language === 'vi' ? 'Quản Lý Nhân Viên' : 'Employee Management'}</a></li>
            ` : '';
            menu.innerHTML = commonLinks + managerLinks;

            // Highlight menu item
            const menuLinks = document.querySelectorAll('.navbar .menu li a');
            menuLinks.forEach(link => {
                if (link.href.includes('manage.html')) {
                    link.classList.add('active');
                }
            });
        }

        function logout() {
            logActivity(language === 'vi' ? 'Đăng xuất' : 'Logout');
            isLoggedIn = false;
            currentUser = '';
            userRole = 'employee';
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('userRole');
            localStorage.removeItem('loginTime');
            clearTimeout(sessionTimer);
            clearInterval(sessionInterval);
            window.location.href = 'index.html';
        }

        let sessionTimer, sessionInterval;
        function startSessionTimer() {
            const loginTime = parseInt(localStorage.getItem('loginTime')) || Date.now();
            const timeElapsed = Date.now() - loginTime;
            if (timeElapsed >= sessionTimeout) {
                logout();
            } else {
                sessionTimer = setTimeout(() => {
                    logout();
                }, sessionTimeout - timeElapsed);
                sessionInterval = setInterval(updateSessionTime, 1000);
            }
        }

        function updateSessionTime() {
            const loginTime = parseInt(localStorage.getItem('loginTime')) || Date.now();
            const timeLeft = sessionTimeout - (Date.now() - loginTime);
            if (timeLeft <= 0) return;
            const minutes = Math.floor(timeLeft / 60000);
            const seconds = Math.floor((timeLeft % 60000) / 1000);
            document.getElementById('sessionTime').textContent = `${language === 'vi' ? 'Phiên' : 'Session'}: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function toggleMenu() { 
            const menu = document.querySelector('.menu');
            if (isLoggedIn) menu.classList.toggle('active'); 
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('.dark-mode-btn i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('.dark-mode-btn i').classList.remove('fa-moon');
            document.querySelector('.dark-mode-btn i').classList.add('fa-sun');
        }

        function toggleLanguage() {
            language = language === 'vi' ? 'en' : 'vi';
            localStorage.setItem('language', language);
            document.getElementById('languageBtn').textContent = language === 'vi' ? 'EN' : 'VI';
            updateLanguage();
            updateUI();
        }

        function updateLanguage() {
            document.querySelectorAll('[data-lang]').forEach(element => {
                const key = element.getAttribute('data-lang');
                element.textContent = translations[language][key];
            });
            document.querySelectorAll('[data-lang-placeholder]').forEach(element => {
                const key = element.getAttribute('data-lang-placeholder');
                element.placeholder = translations[language][key];
            });
        }

        function loadActivities() {
            const list = document.getElementById('activityList');
            list.innerHTML = '';
            activityLog.forEach(log => {
                list.innerHTML += `
                    <div class="activity-item" data-text="${log.action.toLowerCase()} ${log.user.toLowerCase()} ${log.details.toLowerCase()}">
                        <span>${log.timestamp}: ${log.user} - ${log.action}${log.details ? ` (${log.details})` : ''}</span>
                    </div>`;
            });
        }

        function filterActivities() {
            const query = document.getElementById('activitySearch').value.toLowerCase();
            document.querySelectorAll('.activity-item').forEach(item => {
                item.style.display = item.dataset.text.includes(query) ? 'flex' : 'none';
            });
        }

        function logActivity(action, details = '') {
            const timestamp = new Date().toLocaleString(language === 'vi' ? 'vi-VN' : 'en-US');
            const log = {
                id: activityLog.length + 1,
                user: currentUser || 'Unknown',
                action,
                details,
                timestamp
            };
            activityLog.push(log);
            localStorage.setItem('activityLog', JSON.stringify(activityLog));
            if (isLoggedIn && userRole === 'manager') loadActivities();
        }
    </script>
</body>
</html>
