<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Thuận An</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
document.addEventListener("DOMContentLoaded", function () {
    if (!sessionStorage.getItem('loggedIn')) {
        window.location.href = "index.html";
    }
    document.body.style.opacity = "1"; // Kích hoạt hiệu ứng fade-in
});

        function logout() {
            sessionStorage.removeItem('loggedIn');
            window.location.href = 'index.html';
        }

    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
        }
        .sidebar {
            width: 260px;
            background: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 5px 0px 15px rgba(0, 0, 0, 0.3);
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        .sidebar h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
            color: #1abc9c;
            font-weight: bold;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: 0.3s;
            font-weight: 500;
        }
        .sidebar a:hover {
            background: #1abc9c;
            transform: scale(1.05);
        }
        .logout-btn {
            background: red;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .logout-btn:hover {
            background: darkred;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            margin: 20px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: #333;
        }
        .dashboard-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .car-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .car-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            font-size: 14px;
        }
        .car-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }
        .car-item h3 {
            font-size: 16px;
            margin: 8px 0;
            color: #1a1a1a;
        }
        .car-item p {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Never Give Up</h2>
        <a href="kpi.html">Kết Quả Kinh Doanh</a>
        <a href="yeucaughepxe.html">Yêu Cầu Ghép Xe</a>
        <a href="danhsach.html">Danh Sách Đơn Hàng</a>
        <a href="#customers">Danh Sách Xe Đã Bán</a>
        <a href="#settings">⚙Cài Đặt</a>
        <div class="logout-btn" onclick="logout()">Log Out</div>
    </div>
    <div class="content">
        <div class="dashboard-header">🚀 Thông tin các dòng xe VinFast</div>
        <div class="car-list">
           <div class="car-item">
                <img src="https://vinfastphutho.vn/wp-content/uploads/2024/09/vf3-rose-pink.png" alt="VinFast VF3">
                <h3>VinFast VF3</h3>
                <p>Mini SUV</p>
            </div>
            <div class="car-item">
                <img src="https://vinfast-vn.vn/wp-content/uploads/2023/10/vinfast-vf5-white.png" alt="VinFast VF5">
                <h3>VinFast VF5</h3>
                <p>SUV hạng A</p>
            </div>
            <div class="car-item">
                <img src="https://vnvinfast.com/data/upload/media/vinfast-vf6.png" alt="VinFast VF6">
                <h3>VinFast VF6</h3>
                <p>SUV hạng B</p>
            </div>
            <div class="car-item">
                <img src="https://vinfastotovinh.vn/wp-content/uploads/2013/06/vinfast-vf7-mau-den-2048x1152.jpg" alt="VinFast VF7">
                <h3>VinFast VF7</h3>
                <p>SUV hạng C</p>
            </div>
            <div class="car-item">
                <img src="https://vinfastautothaibinh.com/wp-content/uploads/2021/08/vf8-plus-1.png" alt="VF8">
                <h3>VinFast VF8</h3>
                <p>SUV hạng D</p>
            </div>
            <div class="car-item">
                <img src="https://vinfastauto.us/themes/custom/vinfast_v2/images/v3/vf-9/vf9-plus.webp" alt="VinFast VF9">
                <h3>VinFast VF9</h3>
                <p>SUV hạng E</p>
            </div>
        </div>
    </div>
</body>
</html>
