<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPIs Tháng 3</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            max-height: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            font-size: 16px;
        }
        th {
            background-color: #34495e;
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 2; /* Đảm bảo tiêu đề luôn ở trên */
        }
        tfoot {
            background-color: #2c3e50;
            color: white;
            font-weight: bold;
        }
        tr:hover {
            background-color: #ecf0f1;
            transition: 0.3s;
        }
        .button-container {
            margin-bottom: 15px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            margin: 5px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var username = sessionStorage.getItem('username');
        var loggedIn = sessionStorage.getItem('loggedIn');
        var allowedUsers = ["SRTHUANAN", "admin"];

        if (!loggedIn || !allowedUsers.includes(username)) {
            alert("Bạn không có quyền truy cập vào trang này!");
            window.location.href = "index.html";
            return;
        }

        if (username === "admin") {
            document.querySelectorAll('td[contenteditable]')
                .forEach(td => td.contentEditable = true);
            document.getElementById("saveBtn").style.display = "inline-block";
        }
    });
