<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chi Tiết Doanh Số TVBH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            /* === BIẾN MÀU NGOẠI THẤT === */
            --exterior-orange-text: #f39c12;
            --exterior-blue-text: #2980b9;
            --exterior-yellow-text: #b8860b;
            --exterior-pink-text: #d354aa;
            --exterior-green-text: #27ae60;
            --exterior-grey-text: #7f8c8d;
            --exterior-white-text: #2c3e50;
            --exterior-red-text: #c0392b;
            --exterior-bronze-text: #a1794b;
            
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --background-light: #f8f9fa;
            --card-bg-light: #ffffff;
            --text-light: #212529;
            --text-muted-light: #6c757d;
            --border-light: #e9ecef;
            --gradient-start: #4f46e5;
            --gradient-end: #14b8a6;
            --gradient: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-glow-light: 0 0 0 4px rgb(79 70 229 / 0.1);
            --transition-fast: 0.2s;
            --transition-medium: 0.3s;
            --transition-slow: 0.5s;
            --color-success: #28a745;
            --color-danger: #dc3545;
            --color-info: #17a2b8;
            --color-warning: #ffc107;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--background-light);
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden; 
            transition: background var(--transition-medium) ease, color var(--transition-medium) ease;
            font-size: 14px;
            display: flex;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        
        .navbar {
            position: fixed; top: 0; height: 50px;
            background-color: rgba(255, 255, 255, 0.75);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            padding: 0 20px; z-index: 1000; box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--border-light);
            transition: all var(--transition-medium) ease;
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar .logo-title {
            font-size: 16px; color: var(--text-light); font-weight: 700;
            position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap;
        }
        .navbar-left-controls, .navbar-controls { display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            border: none; border-radius: 50%; background: var(--card-bg-light);
            color: var(--text-muted-light); transition: all var(--transition-medium) ease;
            width: 38px; height: 38px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; border: 1px solid var(--border-light);
            font-size: 16px;
        }
        .nav-btn:hover { color: var(--text-light); transform: translateY(-2px); box-shadow: var(--shadow-md); }
        
        .sidebar {
            position: fixed; top: 0; left: 0; width: 220px; height: 100vh;
            background-color: rgba(255, 255, 255, 0.75);
            -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
            padding: 15px; padding-top: 80px; 
            transition: width var(--transition-medium) ease, transform var(--transition-medium) ease;
            z-index: 999; border-right: 1px solid var(--border-light);
            display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: 70px; }
        .sidebar .logo { text-align: center; margin-bottom: 30px; }
        .sidebar .logo h1 { font-size: 18px; font-weight: 800; background: var(--gradient); color: transparent; -webkit-background-clip: text; background-clip: text; transition: opacity var(--transition-medium) ease; }
        .sidebar.collapsed .logo h1 { opacity: 0; }
        .sidebar .menu { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .sidebar .menu a { padding: 10px 12px; text-decoration: none; color: var(--text-muted-light); font-size: 14px; font-weight: 600; border-radius: 8px; transition: all var(--transition-fast) ease-out; display: flex; align-items: center; gap: 12px; }
        .sidebar .menu a i { font-size: 16px; width: 24px; text-align: center; }
        .sidebar .menu a span { transition: opacity 0.2s ease, max-width var(--transition-medium) ease; white-space: nowrap; overflow: hidden; max-width: 100px; }
        .sidebar.collapsed .menu a { justify-content: center; }
        .sidebar.collapsed .menu a span { opacity: 0; max-width: 0; }
        .sidebar .menu a:hover { color: var(--text-light); background: var(--background-light); }
        .sidebar .menu a.active { background: var(--gradient); color: white; box-shadow: var(--shadow-md); }
        .toggle-btn-sidebar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: var(--background-light); border: 1px solid var(--border-light); border-radius: 12px; color: var(--text-muted-light); font-size: 16px; cursor: pointer; transition: all var(--transition-medium) ease; display: flex; align-items: center; justify-content: center; }
        .sidebar.collapsed .toggle-btn-sidebar { width: 40px; }
        .toggle-btn-sidebar:hover { border-color: var(--gradient-start); color: var(--gradient-start); }
        .toggle-btn-sidebar i { transition: transform var(--transition-slow) cubic-bezier(0.19, 1, 0.22, 1); }
        .sidebar.collapsed .toggle-btn-sidebar i { transform: rotate(180deg); }
        .mobile-menu-btn { display: none; background: var(--card-bg-light); color: var(--text-light); border: 1px solid var(--border-light); border-radius: 50%; width: 38px; height: 38px; font-size: 16px; cursor: pointer; box-shadow: var(--shadow-sm); align-items: center; justify-content: center; }
        
        .content-wrapper {
            flex-grow: 1; display: flex; flex-direction: column;
            margin-left: 220px;
            transition: margin-left var(--transition-medium) ease;
            height: 100vh;
        }
        .content-wrapper.collapsed { margin-left: 70px; }

        .main-container {
            padding: 25px; padding-top: 75px; 
            flex-grow: 1; 
            display: flex; flex-direction: column;
            min-height: 0;
        }
       
        footer {
            padding: 10px 0; text-align: center;
            font-size: 13px; font-weight: 500; color: var(--text-muted-light);
            border-top: 1px solid var(--border-light); background: var(--card-bg-light);
            transition: all var(--transition-medium) ease;
            position: relative;
            flex-shrink: 0; 
        }

        [data-tooltip] { position: relative; }
        [data-tooltip]::after { content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%) translateY(5px); background-color: #212529; color: #fff; padding: 5px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; opacity: 0; visibility: hidden; transition: all var(--transition-fast) ease; z-index: 10000; pointer-events: none; }
        [data-tooltip]:hover::after { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .table-card {
            background: var(--card-bg-light); border-radius: 16px;
            box-shadow: var(--shadow-md); border: 1px solid transparent;
            display: flex; flex-direction: column;
            overflow: hidden; padding: 25px;
            flex-grow: 1;
            min-height: 0;
        }

        .table-header {
            display: flex; justify-content: space-between; align-items: center;
            gap: 15px; margin-bottom: 20px; flex-wrap: wrap;
            flex-shrink: 0;
        }
        #search-input {
            padding: 10px 15px; border: 1px solid var(--border-light);
            border-radius: 10px; font-size: 14px; background: var(--background-light);
            color: var(--text-light); transition: all var(--transition-medium) ease;
            flex-grow: 1; min-width: 250px;
        }
        #search-input:focus { outline: none; border-color: var(--gradient-start); box-shadow: var(--shadow-glow-light); }
        .action-buttons { display: flex; gap: 10px; }
        .action-btn { padding: 10px 15px; border: 1px solid var(--border-light); border-radius: 10px; background: var(--card-bg-light); color: var(--text-muted-light); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all var(--transition-medium) ease; font-weight: 600; }
        .action-btn:hover { color: var(--gradient-start); border-color: var(--gradient-start); transform: translateY(-2px); }
        
        .table-wrapper { overflow-y: auto; overflow-x: hidden; flex-grow: 1; }

        #sales-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 12px; 
            border: 1px solid var(--border-light);
            table-layout: fixed;
        }
        #sales-table th, #sales-table td { 
            padding: 14px 10px;
            text-align: left; 
            border: 1px solid var(--border-light); 
            white-space: normal; 
            word-break: break-word;
        }

        #sales-table th { background: var(--border-light); color: var(--text-light); font-weight: 700; position: sticky; top: 0; z-index: 2; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; cursor: pointer; user-select: none; }
        #sales-table th .sort-icon { margin-left: 8px; opacity: 0.6; }
        #sales-table tbody tr:hover { background-color: #f8f9fa; }
        
        /* Phân chia chiều rộng cho từng cột */
        #sales-table th:nth-child(1), #sales-table td:nth-child(1) { width: 5%; text-align: center; } /* STT */
        #sales-table th:nth-child(2), #sales-table td:nth-child(2) { width: 18%; } /* Tên Khách Hàng */
        #sales-table th:nth-child(3), #sales-table td:nth-child(3) { width: 12%; } /* Số Đơn Hàng */
        #sales-table th:nth-child(4), #sales-table td:nth-child(4) { width: 8%; }  /* Dòng Xe */
        #sales-table th:nth-child(5), #sales-table td:nth-child(5) { width: 10%; } /* Phiên Bản */
        #sales-table th:nth-child(6), #sales-table td:nth-child(6) { width: 12%; } /* Ngoại Thất */
        #sales-table th:nth-child(7), #sales-table td:nth-child(7) { width: 9%; }  /* Nội Thất */
        #sales-table th:nth-child(8), #sales-table td:nth-child(8) { width: 13%; } /* VIN */
        #sales-table th:nth-child(9), #sales-table td:nth-child(9) { width: 13%; } /* Chính Sách */

        .highlight { background-color: rgba(255, 193, 7, 0.3); color: inherit; padding: 2px 4px; border-radius: 3px; font-weight: bold; }

        .pagination-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 20px; flex-wrap: wrap; gap: 15px;
            flex-shrink: 0;
        }
        .rows-per-page { display: flex; align-items: center; gap: 8px; }
        .rows-per-page select { padding: 8px 12px; border: 1px solid var(--border-light); border-radius: 10px; font-size: 14px; background: var(--background-light); color: var(--text-light); }
        .pagination-controls { display: flex; align-items: center; gap: 10px; }
        .pagination-controls button { border: 1px solid var(--border-light); border-radius: 10px; background: var(--card-bg-light); color: var(--text-muted-light); font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition-medium) ease; padding: 8px 15px; }
        .pagination-controls button:hover:not(:disabled) { color: var(--gradient-start); border-color: var(--gradient-start); }
        .pagination-controls button:disabled { cursor: not-allowed; opacity: 0.6; }
        .pagination-controls span { font-size: 14px; color: var(--text-light); }
        
        .loading-state, .empty-state { text-align: center; padding: 50px 20px; font-size: 1.1em; color: var(--text-muted-light); }
        .loading-state i, .empty-state i { font-size: 2.5em; margin-bottom: 15px; color: var(--gradient-start); display: block; }
        .loading-state i { animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1005; display: flex; flex-direction: column; gap: 10px; }
        .toast { background-color: var(--card-bg-light); color: var(--text-light); padding: 12px 18px; border-radius: 8px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; opacity: 0; transform: translateX(100%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid var(--border-light); }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast i { font-size: 18px; }
        .toast.success i { color: var(--color-success); }
        .toast.error i { color: var(--color-danger); }
        .toast.info i { color: var(--color-info); }
        .toast.warning i { color: var(--color-warning); }
        
        @media (max-width: 900px) {
            body { overflow: auto; }
            .content-wrapper { height: auto; }
            .sidebar { transform: translateX(-100%); width: 250px; z-index: 1001; }
            .sidebar.open { transform: translateX(0); }
            .sidebar.collapsed { transform: translateX(-100%); }
            .content-wrapper, .content-wrapper.collapsed { margin-left: 0; }
            .navbar { width: 100% !important; left: 0 !important; }
            .toggle-btn-sidebar { display: none; }
            .mobile-menu-btn { display: flex; }
            .navbar .logo-title { position: relative; transform: none; left: auto; margin: 0 10px; flex: 1; text-align: center; }
        }

        @media (max-width: 767px) {
            .main-container { padding: 15px; padding-top: 75px; }
            .table-card { padding: 15px; }
            .table-header { flex-direction: column; align-items: stretch; }
            .pagination-footer { flex-direction: column; align-items: center; }
            .table-wrapper { overflow: visible; }

            #sales-table { border: none; }
            #sales-table thead { display: none; }
            #sales-table tbody, #sales-table tr, #sales-table td { display: block; width: 100% !important; }
            #sales-table tr { background: var(--card-bg-light); box-shadow: var(--shadow-md); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border-light); }
            #sales-table td { display: flex; justify-content: space-between; align-items: center; text-align: right; padding: 10px 5px; border: none; border-bottom: 1px dashed var(--border-light); white-space: normal; }
            #sales-table tr td:last-child { border-bottom: none; }
            #sales-table td::before { content: attr(data-label); font-weight: 600; color: var(--text-muted-light); text-align: left; padding-right: 15px; }
            #sales-table td[data-label="STT"] { display: none; }
            #sales-table td[data-label="Tên Khách Hàng"] { font-size: 1.1em; font-weight: 700; color: var(--gradient-start); padding-top: 0; padding-bottom: 12px; margin-bottom: 5px; border-bottom: 2px solid var(--border-light); }
            #sales-table td[data-label="Tên Khách Hàng"]::before { display: none; }
            #sales-table td[data-label="Tên Khách Hàng"] span { margin-left: auto; }
        }

    </style>
</head>
<body>

    <div class="content-wrapper" id="content-wrapper">
        <div class="navbar" id="page-navbar"> 
            <div class="navbar-left-controls">
                <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="Mở menu sidebar" data-tooltip="Mở/Đóng menu sidebar">

        <div class="main-container" id="main-container">
            <div class="table-card">
                <div class="table-header">
                    <input type="search" id="search-input" placeholder="Tìm kiếm trong bảng..." aria-label="Tìm kiếm trong bảng">
                    <div class="action-buttons">
                        <button class="action-btn" id="reset-view-btn" onclick="resetView()" data-tooltip="Thiết lập lại bảng">
                            <i class="fas fa-undo"></i> Đặt lại
                        </button>
                        <button class="action-btn" onclick="exportToExcel()" aria-label="Xuất Excel" data-tooltip="Xuất ra Excel">
                            <i class="fas fa-file-excel"></i> Xuất Excel
                        </button>
                    </div>
                </div>

                <div class="table-wrapper" id="table-wrapper">

                    </table>

                </div>

                    <div class="rows-per-page">
                        <label for="rows-per-page">Số dòng/trang:</label>
                        <select id="rows-per-page" aria-label="Chọn số dòng mỗi trang">
                            <option value="10">10</option>
                            <option value="25" selected>25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="0">Tất cả</option>
                        </select>
                    </div>
                    <div class="pagination-controls" id="pagination-controls">
                        <button onclick="changePage(-1)" id="prev-btn" aria-label="Trang trước">Trước</button>
                        <span id="page-info">Trang 1 / 1</span>

        </div>

        <footer>VinFast Thuận An - Dĩ An</footer>
    </div>
    
    <div class="toast-container" id="toast-container"></div>

    <script>
    // --- Authentication & Data Retrieval ---
    if (sessionStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = 'index.html';
    }

    // --- Global Variables & Configuration ---
    let allSalesData = [];
    let displayedData = []; 
    let currentPage = 1;
    let rowsPerPage = 25; 

    const columnConfig = [
        { dataKey: "stt", header: "STT", isIndex: true, sortable: false },
        { dataKey: 0, header: "Tên Khách Hàng", sortable: true },
        { dataKey: 2, header: "Số Đơn Hàng", sortable: true },
        { dataKey: 3, header: "Dòng Xe", sortable: true },
        { dataKey: 4, header: "Phiên Bản", sortable: true },
        { dataKey: 5, header: "Ngoại Thất", sortable: true },
        { dataKey: 6, header: "Nội Thất", sortable: true },
        { dataKey: 8, header: "VIN", sortable: true },
        { dataKey: 9, header: "Chính Sách", sortable: true },
    ];

    let currentSortKey = null;
    let currentSortDirection = 'asc';
    let currentFilterQuery = '';

    // --- DOMContentLoaded ---
    document.addEventListener("DOMContentLoaded", () => {
        updateLayout();
        setActiveSidebarLink();

        const salespersonName = sessionStorage.getItem('bestSalespersonName');
        const navbarTitle = document.getElementById('navbar-title');
        
        if (salespersonName) {
            document.title = `Doanh Số ${salespersonName}`;
            if(navbarTitle) navbarTitle.textContent = `Doanh Số ${salespersonName}`;
        } else {
            document.title = `Chi Tiết Doanh Số TVBH`;
            if(navbarTitle) navbarTitle.textContent = "Chi Tiết Doanh Số TVBH";
        }

        const rawData = sessionStorage.getItem('bestSalespersonDataForBestSale');
        if (rawData) {
            try {
                allSalesData = JSON.parse(rawData);
                if (Array.isArray(allSalesData) && allSalesData.length > 0) {
                    showStatusMessage('', 'loading', false);
                    document.getElementById("sales-table").style.display = ""; 
                    document.getElementById("pagination-container").style.display = "flex";
                    loadStateAndRefresh();
                } else {
                    showStatusMessage(`Không có dữ liệu bán hàng cho ${salespersonName || 'TVBH này'}.`, "empty");
                }
            } catch (e) {
                showStatusMessage("Lỗi khi tải dữ liệu. Vui lòng thử lại.", "error");
            }
        } else {
            showStatusMessage(`Không tìm thấy dữ liệu cho ${salespersonName || 'TVBH này'}. Vui lòng quay lại.`, "empty");
        }
        
        addEventListeners();
    });
    
    function addEventListeners() {
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', debounce(e => {
            currentFilterQuery = e.target.value;
            currentPage = 1; 
            refreshTableDisplay();
            saveState();
        }, 300));

        const rowsPerPageSelect = document.getElementById('rows-per-page');
        rowsPerPageSelect.addEventListener('change', (e) => {
            rowsPerPage = parseInt(e.target.value, 10);
            currentPage = 1;
            refreshTableDisplay();
            saveState();
        });
        
        document.addEventListener('click', (event) => {
            const sidebar = document.getElementById('sidebar');
            const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
            if (window.innerWidth <= 900 && sidebar?.classList.contains('open') && !sidebar.contains(event.target) && !mobileMenuBtn?.contains(event.target)) {
                toggleMobileSidebar();
            }
        });
        
        window.addEventListener('resize', debounce(updateLayout, 200));
    }

    function updateLayout() {
        const sidebar = document.getElementById("sidebar");
        const contentWrapper = document.getElementById("content-wrapper");
        const pageNavbar = document.getElementById("page-navbar");

        if (!sidebar || !contentWrapper || !pageNavbar) return;
        
        let isCollapsed = false;
        if (window.innerWidth > 900) {
            sidebar.classList.remove("open");
            isCollapsed = localStorage.getItem('sidebarState') === 'collapsed';
            sidebar.classList.toggle("collapsed", isCollapsed);
        } else {
            sidebar.classList.remove("collapsed");
            isCollapsed = true; 
        }
        
        contentWrapper.classList.toggle("collapsed", isCollapsed && window.innerWidth > 900);
        
        const sidebarWidth = (isCollapsed && window.innerWidth > 900) ? "70px" : "220px";
        
        if (window.innerWidth > 900) {
            pageNavbar.style.left = sidebarWidth;
            pageNavbar.style.width = `calc(100% - ${sidebarWidth})`;
        } else {
            pageNavbar.style.left = '0px';
            pageNavbar.style.width = '100%';
        }
        
        updateSidebarToggleIcon();
    }

    function setActiveSidebarLink() {
        const navLinks = document.querySelectorAll("#navMenu a");
        const targetPage = "xedaban.html";
        navLinks.forEach(link => {
            link.classList.remove("active");
            if (link.getAttribute('href') === targetPage) {
                link.classList.add("active");
            }
        });
    }

    function updateSidebarToggleIcon() {
        const sidebar = document.getElementById("sidebar");
        const desktopToggleButton = document.querySelector(".toggle-btn-sidebar");
        const mobileMenuButton = document.querySelector(".mobile-menu-btn");
        
        if (!sidebar || !desktopToggleButton || !mobileMenuButton) return;

        if (window.innerWidth <= 900) {
            desktopToggleButton.style.display = 'none';
            mobileMenuButton.style.display = 'flex';
            mobileMenuButton.querySelector("i").className = sidebar.classList.contains("open") ? "fas fa-times" : "fas fa-bars";
        } else {
            desktopToggleButton.style.display = 'flex';
            mobileMenuButton.style.display = 'none';
        }
    }

    function toggleSidebarDesktop() {
        if (window.innerWidth > 900) {
            const isCollapsed = document.getElementById("sidebar").classList.contains("collapsed");
            localStorage.setItem('sidebarState', isCollapsed ? 'expanded' : 'collapsed');
            updateLayout();
        }
    }

    function toggleMobileSidebar() {
        const sidebar = document.getElementById("sidebar");
        if (sidebar) {
            sidebar.classList.toggle("open");
            updateSidebarToggleIcon();
        }
    }

    function saveState() {
        const state = {
            filterQuery: currentFilterQuery,
            sortKey: currentSortKey,
            sortDirection: currentSortDirection,
            currentPage: currentPage,
            rowsPerPage: rowsPerPage
        };
        sessionStorage.setItem('bestSaleTableState', JSON.stringify(state));
    }

    function loadStateAndRefresh() {
        const savedState = sessionStorage.getItem('bestSaleTableState');
        if (savedState) {
            try {
                const state = JSON.parse(savedState);
                currentFilterQuery = state.filterQuery || '';
                currentSortKey = state.sortKey || null;
                currentSortDirection = state.sortDirection || 'asc';
                currentPage = parseInt(state.currentPage, 10) || 1;
                rowsPerPage = parseInt(state.rowsPerPage, 10) || 25;
                document.getElementById('search-input').value = currentFilterQuery;
                document.getElementById('rows-per-page').value = rowsPerPage === 0 ? "0" : String(rowsPerPage);
            } catch (e) { resetStateDefaults(); }
        } else { resetStateDefaults(); }
        refreshTableDisplay();
    }
    
    function resetStateDefaults() {
        currentFilterQuery = ''; currentSortKey = null; currentSortDirection = 'asc';
        currentPage = 1; rowsPerPage = 25;
        document.getElementById('search-input').value = '';
        document.getElementById('rows-per-page').value = '25';
    }

    function resetView() {
        resetStateDefaults();
        refreshTableDisplay();
        showToast("Đã thiết lập lại bảng.", "info");
        sessionStorage.removeItem('bestSaleTableState');
    }

    function refreshTableDisplay() {
        applyFiltersAndSorting();
        renderTableHeader(); 
        renderTable();
        updatePaginationControls();
    }
    
    function applyFiltersAndSorting() {
        let data = [...allSalesData];
        if (currentFilterQuery) {
            const query = currentFilterQuery.toLowerCase().trim();
            data = data.filter(row => row && columnConfig.some(col => {
                if (col.isIndex || !col.dataKey) return false;
                return String(row[col.dataKey] || '').toLowerCase().includes(query);
            }));
        }
        if (currentSortKey !== null) {
            data.sort((a, b) => {
                let valA = a[currentSortKey] || '';
                let valB = b[currentSortKey] || '';
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }
        displayedData = data;
    }

    function renderTableHeader() {
        const headerRow = document.getElementById("table-header-row");
        headerRow.innerHTML = ""; 
        columnConfig.forEach(col => {
            const th = document.createElement("th");
            th.textContent = col.header;
            if (col.sortable) {
                const sortIcon = document.createElement("span");
                sortIcon.classList.add("sort-icon");
                if (col.dataKey === currentSortKey) {
                    sortIcon.innerHTML = currentSortDirection === 'asc' ? ' <i class="fas fa-arrow-up"></i>' : ' <i class="fas fa-arrow-down"></i>';
                } else {
                    sortIcon.innerHTML = ' <i class="fas fa-sort"></i>';
                }
                th.appendChild(sortIcon);
                th.addEventListener('click', () => handleSort(col.dataKey));
            }
            headerRow.appendChild(th);
        });
    }
    
    function handleSort(key) {
        if (currentSortKey === key) {
            currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
        } else { currentSortKey = key; currentSortDirection = 'asc'; }
        currentPage = 1; 
        refreshTableDisplay();
        saveState();
    }

    function renderTable() {
        const tableBody = document.getElementById("table-body");
        tableBody.innerHTML = ""; 
        if (displayedData.length === 0) {
            const message = currentFilterQuery ? `Không tìm thấy kết quả cho "${currentFilterQuery}".` : "Không có dữ liệu để hiển thị.";
            showStatusMessage(message, "empty");
            document.getElementById("sales-table").style.display = 'none';
            document.getElementById("pagination-container").style.display = 'none';
            return;
        }
        
        document.getElementById("sales-table").style.display = ""; 
        document.getElementById("pagination-container").style.display = "flex";
        showStatusMessage('', 'loading', false);

        const actualRowsPerPage = rowsPerPage === 0 ? displayedData.length : rowsPerPage;
        const start = (currentPage - 1) * actualRowsPerPage;
        const end = start + actualRowsPerPage;
        const paginatedData = displayedData.slice(start, end);

        paginatedData.forEach((row, index) => {
            const tr = document.createElement("tr");
            columnConfig.forEach(col => {
                const td = document.createElement("td");
                td.setAttribute('data-label', col.header);
                
                const cellData = (col.isIndex) 
                    ? start + index + 1 
                    : (row && row[col.dataKey] !== undefined && row[col.dataKey] !== null) ? String(row[col.dataKey]) : '';
                
                td.innerHTML = `<span>${highlightText(cellData, currentFilterQuery)}</span>`;
                
                if (col.header === "Ngoại Thất") {
                    const style = getExteriorColorStyle(cellData);
                    if (style) { td.setAttribute('style', style); }
                }
                
                tr.appendChild(td);
            });
            tableBody.appendChild(tr);
        });
    }

    function updatePaginationControls() {
        const pageInfo = document.getElementById("page-info");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const paginationControls = document.getElementById("pagination-controls");

        if (rowsPerPage === 0 || displayedData.length === 0) { 
            paginationControls.style.display = "none";
            return;
        }
        paginationControls.style.display = "flex";
        const totalPages = Math.ceil(displayedData.length / rowsPerPage) || 1;
        pageInfo.textContent = `Trang ${currentPage} / ${totalPages}`;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
    }

    function changePage(delta) {
        const totalPages = rowsPerPage === 0 ? 1 : (Math.ceil(displayedData.length / rowsPerPage) || 1);
        const newPage = currentPage + delta;
        if (newPage >= 1 && newPage <= totalPages) {
            currentPage = newPage;
            renderTable(); 
            updatePaginationControls();
            document.getElementById('table-wrapper').scrollTop = 0;
            saveState();
        }
    }
    
    function goBack() { window.location.href = "xedaban.html"; } 
    
    function exportToExcel() {
        if (displayedData.length === 0) { showToast("Không có dữ liệu để xuất.", 'warning'); return; }
        const salespersonName = sessionStorage.getItem('bestSalespersonName') || "TVBH";
        const headers = columnConfig.map(col => col.header);
        const dataToExport = displayedData.map((row, index) => 
            columnConfig.map(col => {
                if (col.isIndex) return index + 1;
                return (row && row[col.dataKey] !== undefined && row[col.dataKey] !== null) ? row[col.dataKey] : '';
            })
        );
        const ws = XLSX.utils.aoa_to_sheet([headers, ...dataToExport]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "DoanhSo");
        const fileName = `DoanhSo_${salespersonName.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.xlsx`;
        XLSX.writeFile(wb, fileName);
        showToast("Đã xuất file Excel!", 'success');
    }

    function showStatusMessage(message, type = 'empty', show = true) {
        const statusContainer = document.getElementById("status-message");
        if (!show) { statusContainer.innerHTML = ''; statusContainer.style.display = 'none'; return; }
        let iconClass = 'fas fa-folder-open';
        if (type === 'loading') iconClass = 'fas fa-spinner fa-spin';
        if (type === 'error') iconClass = 'fas fa-times-circle';
        statusContainer.className = `${type}-state`;
        statusContainer.innerHTML = `<i class="${iconClass}"></i> <p>${message}</p>`;
        statusContainer.style.display = 'block';
    }

    function highlightText(text, query) {
        if (!query || typeof text !== 'string') return text;
        const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapedQuery})`, 'gi');
        return text.replace(regex, `<span class="highlight">$1</span>`);
    }

    function showToast(message, type = 'info', duration = 3000) {
        const container = document.getElementById("toast-container");
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        let icon = 'fas fa-info-circle';
        if(type === 'success') icon = 'fas fa-check-circle';
        if(type === 'error') icon = 'fas fa-times-circle';
        if(type === 'warning') icon = 'fas fa-exclamation-triangle';
        toast.innerHTML = `<i class="${icon}"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            toast.addEventListener('transitionend', () => toast.remove());
        }, duration);
    }
    
    function debounce(func, delay) {
        let timeout;
        return function(...args) { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), delay); };
    }

    function synchronizeTvbhName(name) {
        if (!name || typeof name !== 'string') return 'N/A';
        return String(name).normalize("NFC").trim().toLowerCase().split(/\s+/).filter(Boolean).map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
    }
    
    function getExteriorColorStyle(exteriorValue) {
        const specificFontWeight = 'font-weight: 700;';
        const outlineStyle = 'text-shadow: 0 0 2px rgba(0,0,0,0.7);'; 

        if (!exteriorValue) return '';

        const lowerExteriorValue = exteriorValue.toLowerCase();
        if (lowerExteriorValue === "brahminy white (ce18)") return `color: white; ${outlineStyle} ${specificFontWeight}`;
        if (lowerExteriorValue.includes("sunset orb (ce1a)")) return `color: var(--exterior-orange-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("crimson red (ce1m)")) return `color: var(--exterior-red-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("vinfast blue (ce1n)")) return `color: var(--exterior-blue-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("neptune grey (ce14)")) return `color: #778899; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("jet black (ce11)")) return `color: black; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("electric blue (ce1j)")) return `color: var(--exterior-blue-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("zenith grey (ce1v)")) return `color: #B0C4DE; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("jet black roof- summer yellow body (111u)")) return `color: var(--exterior-yellow-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("brahminy white roof- aquatic azure body (181y)")) return `color: var(--exterior-blue-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("brahminy white roof- rose pink body (1821)")) return `color: var(--exterior-pink-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("brahminy white roof - iris berry body (181x)")) return `color: var(--exterior-pink-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("urbant mint (ce1w)")) return `color: #3CB371; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("vinbus green (ce2b)")) return `color: var(--exterior-green-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("deep ocean (ce1h)")) return `color: #006400; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("iris berry (ce1x)")) return `color: var(--exterior-pink-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("zenith grey-desat silver roof (171v)")) return `color: var(--exterior-grey-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("urbant mint green - desat silv (171w)")) return `color: var(--exterior-green-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("ivy green-desat silver roof (1722)")) return `color: var(--exterior-green-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("atlantic blue-aquatic azure ro (1y26)")) return `color: var(--exterior-blue-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("jet black-champagne creme roof (2311)")) return `color: black; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("infinity blanc _ silky white r (2418)")) return `color: white; ${outlineStyle} ${specificFontWeight}`;
        if (lowerExteriorValue.includes("champagne creme - matte champa (2523)")) return `color: var(--exterior-yellow-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("jet black - graphite roof (2811)")) return `color: black; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("crimson velvet - mystery bronz (2927)")) return `color: var(--exterior-red-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("ivy_green_gne (ce22)")) return `color: var(--exterior-green-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("champagne_creme_ylg (ce23)")) return `color: var(--exterior-yellow-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("crimson red - jet black roof (111m)")) return `color: var(--exterior-red-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("infinity blanc_zenith grey roof (1v18)")) return `color: white; ${outlineStyle} ${specificFontWeight}`;
        if (lowerExteriorValue.includes("deep ocean_jet black roof (111h)")) return `color: #006400; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("alantic blue_denim blue roof (2a26)")) return `color: var(--exterior-blue-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("jet black_mystery bronze roof (2911)")) return `color: black; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("champagne creme_infinity blanc roof (1823)")) return `color: var(--exterior-yellow-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("de sat silver ind12007 (ce17)")) return `color: var(--exterior-grey-text); ${specificFontWeight}`;

        if (lowerExteriorValue.includes("crimson red") || lowerExteriorValue.includes("crimson velvet")) return `color: var(--exterior-red-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("rose pink") || lowerExteriorValue.includes("iris berry")) return `color: var(--exterior-pink-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("vinfast blue") || lowerExteriorValue.includes("electric blue") || lowerExteriorValue.includes("atlantic blue") || lowerExteriorValue.includes("aquatic azure") || lowerExteriorValue.includes("alantic blue")) return `color: var(--exterior-blue-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("deep ocean")) return `color: #006400; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("sunset orb")) return `color: var(--exterior-orange-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("summer yellow") || lowerExteriorValue.includes("champagne creme") || lowerExteriorValue.includes("champagne_creme_ylg")) return `color: var(--exterior-yellow-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("urbant mint") || lowerExteriorValue.includes("vinbus green") || lowerExteriorValue.includes("ivy green") || lowerExteriorValue.includes("ivy_green_gne")) return `color: var(--exterior-green-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("jet black")) return `color: black; ${specificFontWeight}`;
        if (lowerExteriorValue.includes("brahminy white") || lowerExteriorValue.includes("infinity blanc")) return `color: white; ${outlineStyle} ${specificFontWeight}`;
        if (lowerExteriorValue.includes("neptune grey") || lowerExteriorValue.includes("zenith grey") || lowerExteriorValue.includes("de sat silver") || lowerExteriorValue.includes("graphite")) return `color: var(--exterior-grey-text); ${specificFontWeight}`;
        if (lowerExteriorValue.includes("mystery bronz")) return `color: var(--exterior-bronze-text); ${specificFontWeight}`;

        return '';
    }
