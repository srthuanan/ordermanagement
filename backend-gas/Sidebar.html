<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc; /* Tailwind gray-50 */
      color: #333;
      margin: 0;
      padding: 1rem;
      overflow-y: auto;
    }
    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 1rem;
      background-color: #ffffff;
      border-radius: 0.75rem; /* Tailwind rounded-lg */
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /* Tailwind shadow-md */
    }
    h1 {
      font-size: 1.5rem; /* Tailwind text-2xl */
      font-weight: 700; /* Tailwind font-bold */
      color: #1e3a8a; /* Tailwind blue-800 */
      margin-bottom: 1.5rem; /* Tailwind mb-6 */
      text-align: center;
    }
    label {
      display: block;
      font-weight: 500; /* Tailwind font-medium */
      color: #4a5568; /* Tailwind gray-700 */
      margin-bottom: 0.5rem; /* Tailwind mb-2 */
    }
    select, input[type="text"] {
      width: 100%;
      padding: 0.75rem; /* Tailwind p-3 */
      border: 1px solid #cbd5e0; /* Tailwind border-gray-300 */
      border-radius: 0.5rem; /* Tailwind rounded-md */
      margin-bottom: 1rem; /* Tailwind mb-4 */
      font-size: 1rem; /* Tailwind text-base */
      box-sizing: border-box; /* Ensure padding doesn't increase width */
    }
    button {
      width: 100%;
      padding: 0.75rem; /* Tailwind p-3 */
      background-color: #3b82f6; /* Tailwind blue-500 */
      color: white;
      font-weight: 600; /* Tailwind font-semibold */
      border-radius: 0.5rem; /* Tailwind rounded-md */
      border: none;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
    }
    button:hover {
      background-color: #2563eb; /* Tailwind blue-600 */
    }
    button:disabled {
      background-color: #9ca3af; /* Tailwind gray-400 */
      cursor: not-allowed;
    }
    .message-box {
      padding: 1rem;
      margin-top: 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      text-align: center;
    }
    .message-box.success {
      background-color: #d1fae5; /* Tailwind green-100 */
      color: #065f46; /* Tailwind green-800 */
      border: 1px solid #34d399; /* Tailwind green-400 */
    }
    .message-box.error {
      background-color: #fee2e2; /* Tailwind red-100 */
      color: #991b1b; /* Tailwind red-800 */
      border: 1px solid #f87171; /* Tailwind red-400 */
    }
    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
      display: none; /* Hidden by default */
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .car-details {
      background-color: #f0f4f8;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 1rem;
    }
    .car-details p {
      margin-bottom: 0.5rem;
    }
    .car-details p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ghép Xe Thủ Công</h1>

    <div id="loadingSpinner" class="loading-spinner"></div>
    <div id="messageBox" class="message-box hidden"></div>

    <label for="orderSelect">Chọn Đơn Hàng Chưa Ghép:</label>
    <select id="orderSelect" class="form-select" onchange="updateSelectedOrderDetails()">
      <option value="">-- Chọn đơn hàng --</option>
    </select>

    <div id="orderDetails" class="car-details hidden">
      <p><strong>Tên TVBH:</strong> <span id="orderTVBH"></span></p>
      <p><strong>Tên KH:</strong> <span id="orderKH"></span></p>
      <p><strong>Dòng Xe:</strong> <span id="orderDongXe"></span></p>
      <p><strong>Phiên Bản:</strong> <span id="orderPhienBan"></span></p>
      <p><strong>Ngoại Thất:</strong> <span id="orderNgoaiThat"></span></p>
      <p><strong>Nội Thất:</strong> <span id="orderNoiThat"></span></p>
      <p><strong>Số Đơn Hàng:</strong> <span id="orderSoDonHang"></span></p>
      <p><strong>Ngày Cọc:</strong> <span id="orderNgayCoc"></span></p>
    </div>

    <label for="vinSelect" class="mt-4">Chọn VIN Xe Chưa Ghép:</label>
    <select id="vinSelect" class="form-select" onchange="updateSelectedCarDetails()">
      <option value="">-- Chọn VIN xe --</option>
    </select>

    <div id="carDetails" class="car-details hidden">
      <p><strong>Dòng Xe:</strong> <span id="carDongXe"></span></p>
      <p><strong>Phiên Bản:</strong> <span id="carPhienBan"></span></p>
      <p><strong>Ngoại Thất:</strong> <span id="carNgoaiThat"></span></p>
      <p><strong>Nội Thất:</strong> <span id="carNoiThat"></span></p>
      <p><strong>VIN:</strong> <span id="carVIN"></span></p>
      <p><strong>Trạng Thái:</strong> <span id="carStatus"></span></p>
      <p><strong>Ngày Nhập:</strong> <span id="carNgayNhap"></span></p>
    </div>

    <button id="matchButton" onclick="performManualMatch()" class="mt-6" disabled>Ghép Xe</button>
  </div>

  <script>
    let unpairedOrders = [];
    let availableCars = [];

    document.addEventListener('DOMContentLoaded', function() {
      google.script.run.withSuccessHandler(loadData).withFailureHandler(showError).getUnpairedOrdersAndAvailableCars();
    });

    function showLoading(show) {
      document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
      document.getElementById('matchButton').disabled = show;
      document.getElementById('orderSelect').disabled = show;
      document.getElementById('vinSelect').disabled = show;
    }

    function showMessage(message, type) {
      const messageBox = document.getElementById('messageBox');
      messageBox.textContent = message;
      messageBox.className = `message-box ${type}`;
      messageBox.classList.remove('hidden');
    }

    function hideMessage() {
      document.getElementById('messageBox').classList.add('hidden');
    }

    function loadData(data) {
      showLoading(false);
      if (data.status === "SUCCESS") {
        unpairedOrders = data.unpairedOrders;
        availableCars = data.availableCars;
        populateSelect('orderSelect', unpairedOrders, 'so_don_hang', 'so_don_hang');
        populateSelect('vinSelect', availableCars, 'vin', 'vin'); // Hiển thị tất cả xe ban đầu
        checkMatchButtonStatus();
      } else {
        showError(data.message);
      }
    }

    function populateSelect(selectId, items, valueKey, textKey) {
      const select = document.getElementById(selectId);
      select.innerHTML = `<option value="">-- Chọn ${selectId === 'orderSelect' ? 'đơn hàng' : 'VIN xe'} --</option>`;
      items.forEach(item => {
        const option = document.createElement('option');
        option.value = item[valueKey];
        option.textContent = item[textKey];
        select.appendChild(option);
      });
    }

function updateSelectedOrderDetails() {
  const orderSelect = document.getElementById('orderSelect');
  const selectedOrderNumber = orderSelect.value;
  const orderDetailsDiv = document.getElementById('orderDetails');

  document.getElementById('vinSelect').value = ''; 
  document.getElementById('carDetails').classList.add('hidden'); 

  // Hàm phụ trợ để làm sạch và chuẩn hóa chuỗi cho việc so sánh
  function normalizeStringForComparison(str) {
    if (str === null || str === undefined) {
      return '';
    }
    // Loại bỏ tất cả các loại khoảng trắng, chuyển về chữ thường, và chuẩn hóa Unicode NFC
    return String(str).normalize('NFC').replace(/\s+/g, ' ').trim().toLowerCase();
  }

  if (selectedOrderNumber) {
    const selectedOrder = unpairedOrders.find(order => order.so_don_hang === selectedOrderNumber);
    
    if (selectedOrder) {
      document.getElementById('orderTVBH').textContent = selectedOrder.ten_tu_van_ban_hang || '';
      document.getElementById('orderKH').textContent = selectedOrder.ten_khach_hang || '';
      document.getElementById('orderDongXe').textContent = selectedOrder.dong_xe || '';
      document.getElementById('orderPhienBan').textContent = selectedOrder.phien_ban || '';
      document.getElementById('orderNgoaiThat').textContent = selectedOrder.ngoai_that || '';
      document.getElementById('orderNoiThat').textContent = selectedOrder.noi_that || '';
      document.getElementById('orderSoDonHang').textContent = selectedOrder.so_don_hang || '';
      document.getElementById('orderNgayCoc').textContent = selectedOrder.ngay_coc || '';
      orderDetailsDiv.classList.remove('hidden');
      
      // Chuẩn hóa các tiêu chí lọc từ đơn hàng
      const orderDongXe = normalizeStringForComparison(selectedOrder.dong_xe);
      const orderPhienBan = normalizeStringForComparison(selectedOrder.phien_ban);
      const orderNgoaiThat = normalizeStringForComparison(selectedOrder.ngoai_that);
      const orderNoiThat = normalizeStringForComparison(selectedOrder.noi_that);

      console.log("--- Bắt đầu lọc xe cho đơn hàng (đã chuẩn hóa) ---");
      console.log("Tiêu chí lọc từ đơn hàng (đã chuẩn hóa và trim):");
      console.log(`  Dòng xe (đơn): '${orderDongXe}'`);
      console.log(`  Phiên bản (đơn): '${orderPhienBan}'`);
      console.log(`  Ngoại thất (đơn): '${orderNgoaiThat}'`);
      console.log(`  Nội thất (đơn): '${orderNoiThat}'`);

      const filteredCars = availableCars.filter(car => {
        // Chuẩn hóa các thuộc tính của xe trước khi so sánh
        const carDongXe = normalizeStringForComparison(car.dong_xe);
        const carPhienBan = normalizeStringForComparison(car.phien_ban);
        const carNgoaiThat = normalizeStringForComparison(car.ngoai_that);
        const carNoiThat = normalizeStringForComparison(car.noi_that);

        const matchDongXe = carDongXe === orderDongXe;
        const matchPhienBan = carPhienBan === orderPhienBan;
        const matchNgoaiThat = carNgoaiThat === orderNgoaiThat;
        const matchNoiThat = orderNoiThat.includes(carNoiThat); 

        console.log(`  So sánh xe VIN: ${car.vin}`);
        console.log(`    Dòng xe (xe): '${carDongXe}' vs '${orderDongXe}' -> Khớp: ${matchDongXe}`);
        console.log(`    Phiên bản (xe): '${carPhienBan}' vs '${orderPhienBan}' -> Khớp: ${matchPhienBan}`);
        console.log(`    Ngoại thất (xe): '${carNgoaiThat}' vs '${orderNgoaiThat}' -> Khớp: ${matchNgoaiThat}`);
        console.log(`    Nội thất (xe): '${carNoiThat}' (để kiểm tra trong '${orderNoiThat}') -> Khớp: ${matchNoiThat}`);
        console.log(`    => Kết quả cuối cùng cho xe ${car.vin}: ${matchDongXe && matchPhienBan && matchNgoaiThat && matchNoiThat}`);
            
        return matchDongXe && matchPhienBan && matchNgoaiThat && matchNoiThat;
      });
      
      console.log("Danh sách xe đã lọc:", JSON.stringify(filteredCars));
      console.log("--- Kết thúc lọc xe ---");

      populateSelect('vinSelect', filteredCars, 'vin', 'vin');
    }
  } else {
    orderDetailsDiv.classList.add('hidden');
    populateSelect('vinSelect', availableCars, 'vin', 'vin'); 
  }
  checkMatchButtonStatus();
}

    function updateSelectedCarDetails() {
      const vinSelect = document.getElementById('vinSelect');
      const selectedVin = vinSelect.value;
      const carDetailsDiv = document.getElementById('carDetails');

      if (selectedVin) {
        google.script.run.withSuccessHandler(function(carData) {
          if (carData.status === "SUCCESS" && carData.car) {
            const selectedCar = carData.car;
            document.getElementById('carDongXe').textContent = selectedCar.dong_xe || '';
            document.getElementById('carPhienBan').textContent = selectedCar.phien_ban || '';
            document.getElementById('carNgoaiThat').textContent = selectedCar.ngoai_that || '';
            document.getElementById('carNoiThat').textContent = selectedCar.noi_that || '';
            document.getElementById('carVIN').textContent = selectedCar.vin || '';
            document.getElementById('carStatus').textContent = selectedCar.trang_thai || '';
            document.getElementById('carNgayNhap').textContent = selectedCar.ngay_nhap || '';
            carDetailsDiv.classList.remove('hidden');
          } else {
            showError(carData.message || "Không tìm thấy chi tiết xe.");
            carDetailsDiv.classList.add('hidden');
          }
        }).withFailureHandler(showError).getCarDetailsByVin(selectedVin);
      } else {
        carDetailsDiv.classList.add('hidden');
      }
      checkMatchButtonStatus();
    }

    function checkMatchButtonStatus() {
      const orderSelected = document.getElementById('orderSelect').value !== '';
      const vinSelected = document.getElementById('vinSelect').value !== '';
      document.getElementById('matchButton').disabled = !(orderSelected && vinSelected);
    }

    function performManualMatch() {
      hideMessage();
      const orderNumber = document.getElementById('orderSelect').value;
      const vin = document.getElementById('vinSelect').value;

      if (!orderNumber || !vin) {
        showMessage("Lỗi: Vui lòng chọn cả đơn hàng và VIN xe.", 'error');
        return; 
      }

      showLoading(true);
      google.script.run.withSuccessHandler(function(response) {
        showLoading(false);
        if (response.status === "SUCCESS") {
          showMessage(response.message, 'success');
          google.script.run.withSuccessHandler(loadData).withFailureHandler(showError).getUnpairedOrdersAndAvailableCars();
          document.getElementById('orderSelect').value = '';
          document.getElementById('vinSelect').value = '';
          document.getElementById('orderDetails').classList.add('hidden');
          document.getElementById('carDetails').classList.add('hidden');
          checkMatchButtonStatus();
        } else {
          showError(response.message);
        }
      }).withFailureHandler(showError).manualMatchCar(orderNumber, vin);
    }

    function showError(error) {
      showLoading(false);
      // Hiển thị lỗi cho người dùng
      showMessage(`Lỗi: ${error.message || error}`, 'error');
      // Ghi lỗi ra console để nhà phát triển xem (nếu cần)
      // console.error("Lỗi chi tiết:", error); 
    }
  </script>
</body>
</html>
