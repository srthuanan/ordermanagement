<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Global Styles & Reset */
    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      padding: 14px;
      background-color: #fcfcfc;
      color: #444;
      font-size: 12px;
      line-height: 1.4;
      box-sizing: border-box;
    }

    h3 {
      color: #00509E;
      text-align: center;
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.3px;
      padding-bottom: 5px;
      border-bottom: 1px dashed #eee;
    }

    /* Main suggestions container */
    #suggestions-output {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
    }

    /* Individual suggestion card */
    .suggestion-card {
      background-color: #ffffff;
      border: 1px solid #e9e9e9;
      border-radius: 4px;
      box-shadow: none;
      transition: border-color 0.1s ease-out;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .suggestion-card:hover {
      border-color: #a0c4ff;
    }

    .suggestion-card.active {
      border: 1px solid #00509E;
      background-color: #f7fbff;
    }

    /* Car Info Header */
    .car-info-header {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      font-weight: bold;
      color: #00509E;
      font-size: 13px;
      border-bottom: 1px solid #f9f9f9;
    }
    .car-info-header i {
      font-size: 13px;
      margin-right: 8px;
      color: #00509E;
    }
    .car-info-header span {
      font-size: 13px;
    }

    /* Car Details Body */
    .car-details-body {
      padding: 8px 10px;
      border-bottom: 1px dashed #f0f0f0;
    }
    .car-details-body p {
      margin: 4px 0;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #666;
    }
    .car-details-body i {
      color: #a0a0a0;
      width: 18px;
      text-align: center;
      margin-right: 6px;
      font-size: 11px;
    }
    .car-details-body .vin {
      font-weight: bold;
      color: #333;
    }
    .car-details-body .date {
      font-style: normal;
      color: #888;
    }

    /* Order List Section */
    .order-list-section {
      padding: 8px 10px;
      padding-top: 4px;
    }
    .order-list-section .order-count {
      display: flex;
      align-items: center;
      font-weight: bold;
      margin-bottom: 8px;
      color: #555;
      font-size: 12px;
    }
    .order-list-section .order-count i {
      font-size: 13px;
      margin-right: 8px;
      color: #888;
    }

    /* Updated Order Item Styling */
    .order-item {
      display: flex;
      /* Thay đổi thành flex-direction: row; để chi tiết và nút nằm ngang */
      flex-direction: row; 
      /* Căn chỉnh các mục dọc theo chiều ngang, và phân bổ không gian */
      align-items: center; 
      justify-content: space-between; /* Đẩy nội dung ra hai bên */
      padding: 8px 0;
      border-bottom: 1px dashed #f5f5f5;
      gap: 10px; /* Tăng khoảng cách giữa các phần tử ngang */
    }
    .order-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .order-details-group {
      display: flex;
      flex-direction: column; /* Đảm bảo các chi tiết đơn hàng vẫn xếp chồng */
      flex-grow: 1; /* Cho phép nhóm chi tiết mở rộng để đẩy nút ra xa */
      gap: 2px;
    }
    .order-details-group span {
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #666;
    }
    .order-details-group i {
      color: #b0b0b0;
      width: 18px;
      text-align: center;
      margin-right: 6px;
      font-size: 11px;
    }
    .order-details-group span strong {
      color: #00509E;
      font-weight: bold;
    }

    /* Match Button - Positioned to the end */
    .match-button {
      background-color: #007bff;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-weight: normal;
      transition: background-color 0.1s ease-out;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 60px;
      justify-content: center;
      box-shadow: none;
      /* Không cần margin-left: auto; hay align-self: flex-end; nữa
         vì justify-content: space-between; trên .order-item đã xử lý */
    }
    .match-button i {
      font-size: 11px;
    }
    .match-button:hover {
      background-color: #0056b3;
    }
    .match-button:active {
      background-color: #003f7f;
    }
    .match-button:disabled {
      background-color: #e8e8e8;
      color: #b0b0b0;
      cursor: not-allowed;
    }

    /* No suggestions message */
    .no-suggestions {
      text-align: center;
      color: #888;
      padding: 30px 15px;
      background-color: #ffffff;
      border-radius: 4px;
      border: 1px dashed #ddd;
      font-style: italic;
      font-size: 13px;
      box-shadow: none;
    }
    .no-suggestions i {
      display: block;
      font-size: 32px;
      margin-bottom: 15px;
      color: #c0c0c0;
    }
    .no-suggestions small {
        display: block;
        margin-top: 10px;
        font-size: 11px;
        color: #a0a0a0;
    }
  </style>
</head>
<body>
  <h3>GỢI Ý GHÉP XE</h3>
  <div id="suggestions-output">
    <p class="no-suggestions">
      <i class="fas fa-spinner fa-spin"></i><br> 
      Đang tải gợi ý...
      <br><small>Vui lòng chờ trong giây lát.</small>
    </p>
  </div>

  <script>
    let activeCard = null;

    document.addEventListener('DOMContentLoaded', function() {
      google.script.run.withSuccessHandler(showSuggestions).getMatchSuggestions();
    });

    function showSuggestions(suggestions) {
      const outputDiv = document.getElementById('suggestions-output');
      outputDiv.innerHTML = ''; 

      if (suggestions && suggestions.length > 0) {
        suggestions.forEach((suggestion, index) => {
          const card = document.createElement('div');
          card.className = 'suggestion-card';
          card.dataset.suggestionIndex = index;

          // Car Info Header
          const carInfoHeader = document.createElement('div');
          carInfoHeader.className = 'car-info-header';
          carInfoHeader.innerHTML = `
            <i class="fas fa-car-side"></i>
            <span>${suggestion.car.dong_xe} ${suggestion.car.phien_ban}</span>
          `;
          card.appendChild(carInfoHeader);

          // Car Details Body
          const carDetailsBody = document.createElement('div');
          carDetailsBody.className = 'car-details-body';
          carDetailsBody.innerHTML = `
            <p><i class="fas fa-palette"></i> Màu: ${suggestion.car.ngoai_that} / ${suggestion.car.noi_that}</p>
            <p><i class="fas fa-fingerprint"></i> VIN: <span class="vin">${suggestion.car.vin}</span></p>
            <p><i class="fas fa-calendar-alt"></i> Nhập kho: <span class="date">${suggestion.car.ngay_nhap}</span></p>
          `;
          card.appendChild(carDetailsBody);

          // Order List Section
          const orderListSection = document.createElement('div');
          orderListSection.className = 'order-list-section';
          orderListSection.innerHTML = `
            <div class="order-count">
              <i class="fas fa-users"></i> ${suggestion.orders.length} Đơn hàng phù hợp:
            </div>
          `;

          const orderListContainer = document.createElement('div');
          orderListContainer.className = 'order-list-container';

          suggestion.orders.forEach(order => {
            const orderItem = document.createElement('div');
            orderItem.className = 'order-item'; 
            orderItem.innerHTML = `
              <div class="order-details-group">
                <span><i class="fas fa-file-invoice"></i> ĐH: <strong>${order.so_don_hang}</strong></span>
                <span><i class="fas fa-user"></i> KH: ${order.ten_khach_hang}</span>
                <span><i class="fas fa-user-tie"></i> TVBH: ${order.ten_tu_van}</span>
                <span><i class="fas fa-calendar-check"></i> Cọc: ${order.ngay_coc}</span>
              </div>
              <button class="match-button" onclick="matchCar('${order.so_don_hang}', '${suggestion.car.vin}', event)">
                <i class="fas fa-link"></i> Ghép
              </button>
            `;
            orderListContainer.appendChild(orderItem);
          });
          orderListSection.appendChild(orderListContainer);
          card.appendChild(orderListSection);
          
          // Add click event to card for active state
          card.addEventListener('click', function() {
            if (activeCard) {
              activeCard.classList.remove('active');
            }
            this.classList.add('active');
            activeCard = this;
          });

          outputDiv.appendChild(card);
        });
      } else {
        outputDiv.innerHTML = `
          <p class="no-suggestions">
            <i class="fas fa-box-open"></i><br>
            Không tìm thấy gợi ý ghép xe nào phù hợp vào lúc này.
            <br>
            <small>Vui lòng kiểm tra lại dữ liệu hoặc thêm xe/đơn hàng mới.</small>
          </p>
        `;
      }
    }

    function matchCar(orderNumber, vin, event) {
      const clickedButton = event.target.closest('button');
      clickedButton.disabled = true;
      clickedButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang ghép...';

      google.script.run
        .withSuccessHandler(function(message) { // 'message' is the string returned from Apps Script's manualMatchCar
          google.script.run.showToastOnSheet(message, "Ghép thành công!"); // Call Apps Script to show toast 
          google.script.run.withSuccessHandler(showSuggestions).getMatchSuggestions(); // Refresh sidebar suggestions
        })
        .withFailureHandler(function(error) {
          alert("Lỗi khi ghép xe: " + error.message);
          clickedButton.disabled = false;
          clickedButton.innerHTML = '<i class="fas fa-link"></i> Ghép';
          google.script.run.withSuccessHandler(showSuggestions).getMatchSuggestions(); // Still refresh to update UI potentially
        })
        .manualMatchCar(orderNumber, vin); // Call manualMatchCar on server 
    }
  </script>
</body>
</html>
