<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">
  <style>
    /* ---- CSS tùy chỉnh cho giao diện hiện đại ---- */
    :root {
      --vinfast-blue: #00509E;
      --vinfast-red: #D4222A;
      --gray-text: #5f6368;
      --light-gray-border: #dadce0;
      --background-color: #f8f9fa;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: var(--background-color);
      padding: 24px;
      color: #333;
    }

    .dialog-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .dialog-header {
      text-align: center;
      border-bottom: 1px solid var(--light-gray-border);
      padding-bottom: 16px;
    }

    .dialog-header h3 {
      font-size: 18px;
      font-weight: 500;
      color: var(--vinfast-blue);
      margin: 0;
    }
    
    .dialog-header p {
      font-size: 13px;
      color: var(--gray-text);
      margin-top: 5px;
      margin-bottom: 0;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .input-group .icon {
      width: 18px;
      height: 18px;
      fill: var(--gray-text);
    }

    input[type="text"],
    textarea {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid var(--light-gray-border);
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--vinfast-blue);
      box-shadow: 0 0 0 2px rgba(0, 80, 158, 0.2);
    }
    
    .button-container {
      display: flex;
      flex-direction: column;
      margin-top: 10px;
    }

    /* CSS cho nút bấm chính */
    .button-primary {
      background-color: var(--vinfast-blue);
      color: white;
      border: none;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .button-primary:hover {
      background-color: #003d7a;
    }
    .button-primary:disabled {
      background-color: #a0b4c7;
      cursor: not-allowed;
    }

    /* CSS cho nút bấm phụ */
    .button-secondary {
      background-color: white;
      color: var(--gray-text);
      border: 1px solid var(--light-gray-border);
      transition: background-color 0.2s;
    }
    .button-secondary:hover {
      background-color: #f1f3f4;
    }

    /* CSS cho khu vực trạng thái */
    #status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 20px;
    }
    
    #status.error {
      color: var(--vinfast-red);
      font-weight: 500;
    }
    
    /* Vòng xoay chờ xử lý */
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--vinfast-blue);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .branding-below { display: none; }
  </style>
</head>
<body>
  <div class="dialog-container">
    <div class="dialog-header">
      <h3>Hủy Ghép Đơn Hàng</h3>
      <p>Nhập thông tin để hủy ghép xe khỏi đơn hàng tương ứng.</p>
    </div>

    <form id="cancel-form">
      <div class="input-group">
        <label for="order-number">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/></svg>
          Số Đơn Hàng (*)
        </label>
        <input type="text" id="order-number" name="orderNumber" placeholder="Ví dụ: N31901-VSO-25-02-0045" required>
      </div>

      <div class="input-group">
        <label for="reason">
           <svg class="icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12zM7 9h10v2H7zm4 3h6v2h-6zm0-6h6v2h-6z"/></svg>
          Lý Do Hủy (*)
        </label>
        <textarea id="reason" name="reason" rows="4" placeholder="Nhập chi tiết lý do hủy ghép..." required></textarea>
      </div>

      <div class="button-container">
        <button type="submit" id="submit-btn" class="action button-primary">Xác Nhận Hủy Ghép</button>
        <button type="button" class="button-secondary" onclick="google.script.host.close()">Đóng</button>
      </div>
    </form>
    
    <div id="status"></div>
  </div>

  <script>
    document.getElementById('cancel-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const submitButton = document.getElementById('submit-btn');
      const statusDiv = document.getElementById('status');
      
      submitButton.disabled = true;
      statusDiv.innerHTML = '<div class="spinner"></div><span>Đang xử lý...</span>';
      statusDiv.className = '';

      const formData = {
        orderNumber: document.getElementById('order-number').value,
        reason: document.getElementById('reason').value
      };

      google.script.run
        .withSuccessHandler(function(response) {
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          statusDiv.innerHTML = 'Lỗi: ' + error.message;
          statusDiv.className = 'error';
          submitButton.disabled = false;
        })
        .processCancellationFromDialog(formData);
    });
  </script>
</body>
</html>
