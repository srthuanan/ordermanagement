<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; font-size: 14px; color: #333; margin: 0; padding: 0; }
    .container { padding: 20px; }
    .block { margin-bottom: 18px; }
    label { font-weight: 500; display: block; margin-bottom: 6px; font-size: 13px; color: #555; }
    .input, select {
      width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc;
      border-radius: 4px; background-color: #fff; font-size: 14px;
    }
    .input-group { display: flex; gap: 15px; }
    .input-group > div { flex: 1; }
    button {
      background-color: #4682b4; color: white; padding: 10px 15px; border: none;
      border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; margin-right: 10px;
    }
    button.secondary { background-color: #6c757d; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    #loader-area { text-align: center; padding: 20px 0; display: none; }
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #4682b4; border-radius: 50%;
      width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #results-area { margin-top: 25px; }
    .sheet-results { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; }
    .sheet-header { background-color: #f2f2f2; padding: 10px 12px; font-weight: bold; }
    .results-table { width: 100%; border-collapse: collapse; }
    .results-table th, .results-table td {
      padding: 9px 12px; border-bottom: 1px solid #ddd; text-align: left;
      font-size: 12px; white-space: nowrap;
    }
    .results-table th { background-color: #e8eef7; }
    .results-table tr:nth-child(even) { background-color: #f9f9f9; }
    .no-results { padding: 15px; text-align: center; color: #777; background-color: #fafafa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="block">
      <label>Tìm kiếm trong các sheet:</label>
      <div id="sheet-checkboxes"></div>
    </div>

    <div class="block">
      <label for="keyword">Tìm kiếm (Số đơn, VIN, Tên KH, TVBH)</label>
      <input type="text" id="keyword" class="input" placeholder="Nhập từ khóa...">
    </div>

    <div class="block input-group">
        <div>
            <label for="dong_xe">Dòng xe</label>
            <select id="dong_xe" class="input"></select>
        </div>
        <div>
            <label for="phien_ban">Phiên bản</label>
            <select id="phien_ban" class="input"></select>
        </div>
    </div>

    <div class="block input-group">
        <div>
            <label for="ngoai_that">Ngoại thất</label>
            <select id="ngoai_that" class="input"></select>
        </div>
        <div>
            <label for="status">Trạng thái</label>
            <select id="status" class="input"></select>
        </div>
    </div>
    
    <div class="block">
      <button id="search-button">Tìm Kiếm</button>
      <button id="reset-button" class="secondary">Xóa Bộ Lọc</button>
    </div>

    <div id="loader-area"><div class="loader"></div></div>
    <div id="results-area"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const sheetNames = ['DaGhep', 'ChuaGhep', 'KhoXe', 'HuyGhep', 'Xuathoadon'];
      const sheetCheckboxesContainer = document.getElementById('sheet-checkboxes');
      sheetNames.forEach(name => {
        const div = document.createElement('div');
        div.style.display = 'inline-block';
        div.style.marginRight = '15px';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = `sheet_${name}`;
        checkbox.value = name;
        checkbox.checked = true;
        const label = document.createElement('label');
        label.htmlFor = `sheet_${name}`;
        label.appendChild(document.createTextNode(name));
        label.style.fontWeight = 'normal';
        label.style.display = 'inline';
        label.style.marginLeft = '5px';
        div.appendChild(checkbox);
        div.appendChild(label);
        sheetCheckboxesContainer.appendChild(div);
      });

      google.script.run.withSuccessHandler(populateSelects).getFilterOptions();
      
      document.getElementById('search-button').addEventListener('click', executeSearch);
      document.getElementById('reset-button').addEventListener('click', resetFilters);
    });

    function populateSelects(options) {
      function populate(id, values) {
        const select = document.getElementById(id);
        select.innerHTML = '<option value="">-- Tất cả --</option>';
        if (values) {
          values.forEach(val => {
            if(val) {
              const option = document.createElement('option');
              option.value = val;
              option.textContent = val;
              select.appendChild(option);
            }
          });
        }
      }
      populate('dong_xe', options.dong_xe);
      populate('phien_ban', options.phien_ban);
      populate('ngoai_that', options.ngoai_that);
      populate('status', options.status);
    }

    function executeSearch() {
      const filters = { sheets: [] };
      document.querySelectorAll('#sheet-checkboxes input:checked').forEach(cb => filters.sheets.push(cb.value));

      const fields = ['keyword', 'dong_xe', 'phien_ban', 'ngoai_that', 'status'];
      fields.forEach(id => {
        const element = document.getElementById(id);
        if (element && element.value) filters[id] = element.value;
      });
      
      document.getElementById('loader-area').style.display = 'block';
      document.getElementById('results-area').innerHTML = '';
      document.getElementById('search-button').disabled = true;

      google.script.run
        .withSuccessHandler(displayResults)
        .withFailureHandler(showError)
        .performAdvancedSearch(filters);
    }

    function displayResults(response) {
      document.getElementById('loader-area').style.display = 'none';
      document.getElementById('search-button').disabled = false;
      const resultsArea = document.getElementById('results-area');

      if (response.status === "ERROR") {
        resultsArea.innerHTML = `<div class="no-results" style="color: red;">Lỗi: ${response.message}</div>`;
        return;
      }
      
      const results = response.results;
      if (Object.keys(results).length === 0) {
        resultsArea.innerHTML = '<div class="no-results">Không tìm thấy kết quả phù hợp.</div>';
        return;
      }

      let html = '';
      for (const sheetName in results) {
        const sheetResult = results[sheetName];
        html += `<div class="sheet-results">
                   <div class="sheet-header">Kết quả từ: ${sheetName} (${sheetResult.rows.length})</div>
                   <div style="overflow-x:auto;">
                     <table class="results-table"><thead><tr>`;
        sheetResult.headers.forEach(header => { html += `<th>${header}</th>`; });
        html += `<th>Link</th></tr></thead><tbody>`;

        sheetResult.rows.forEach(row => {
          html += `<tr>`;
          row.data.forEach(cell => { html += `<td>${cell !== null ? cell : ''}</td>`; });
          html += `<td><a href="${row.link}" target="_blank">Đến Dòng</a></td></tr>`;
        });
        html += `</tbody></table></div></div>`;
      }
      resultsArea.innerHTML = html;
    }

    function showError(error) {
      document.getElementById('loader-area').style.display = 'none';
      document.getElementById('search-button').disabled = false;
      document.getElementById('results-area').innerHTML = `<div class="no-results" style="color: red;">Lỗi: ${error.message}</div>`;
    }
    
    function resetFilters() {
      const fields = ['keyword', 'dong_xe', 'phien_ban', 'ngoai_that', 'status'];
      fields.forEach(id => { document.getElementById(id).value = ''; });
      document.getElementById('results-area').innerHTML = '';
    }
  </script>
</body>
</html>
