    <style>
        /* ==========================================================================
           1. Biến màu và thiết lập cơ bản (CSS Variables & Root)
           ========================================================================== */
        :root {
            /* Font */
            --font-main: 'Plus Jakarta Sans', sans-serif;

            /* Colors */
            --gradient-start: #4f46e5;
            --gradient-end: #14b8a6;
            --gradient: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            
            /* Light Mode Palette */
            --bg-light: #f8f9fa;
            --card-bg-light: #ffffff;
            --text-light: #212529;
            --text-muted-light: #6c757d;
            --border-light: #e9ecef;

            /* Dark Mode Palette */
            --bg-dark: #121212;
            --card-bg-dark: #1e1e1e;
            --text-dark: #e9ecef;
            --text-muted-dark: #adb5bd;
            --border-dark: #343a40;
            
            /* Exterior Text Colors */
            --exterior-orange-text: #f39c12;
            --exterior-blue-text: #2980b9;
            --exterior-yellow-text: #b8860b;
            --exterior-pink-text: #d354aa;
            --exterior-green-text: #27ae60;
            --exterior-grey-text: #7f8c8d;
            --exterior-white-text-on-light: #2c3e50;
            --exterior-red-text: #c0392b;
            --exterior-bronze-text: #a1794b;

            /* Status Colors (Light) */
            --status-san-sang-bg-light: #e0f2f1; --status-san-sang-text-light: #00796b;
            --status-da-ghep-bg-light: #e3f2fd; --status-da-ghep-text-light: #1e88e5;
            --status-chua-ghep-bg-light: #fff8e1; --status-chua-ghep-text-light: #f57c00;
            --status-da-ban-bg-light: #f1f2f6; --status-da-ban-text-light: #57606f;
            --status-cho-vbc-bg-light: #e8eaf6; --status-cho-vbc-text-light: #3f51b5;
--status-dang-giu-bg-light: #ede7f6; --status-dang-giu-text-light: #673ab7;
            --status-default-bg-light: #eceff1; --status-default-text-light: #546e7a;

            /* Status Colors (Dark) */
            --status-san-sang-bg-dark: #1a3c3a; --status-san-sang-text-dark: #80cbc4;
            --status-da-ghep-bg-dark: #1c3a56; --status-da-ghep-text-dark: #90caf9;
            --status-chua-ghep-bg-dark: #4b3c1c; --status-chua-ghep-text-dark: #ffe082;
            --status-da-ban-bg-dark: #393e46; --status-da-ban-text-dark: #a6acb3;
            --status-cho-vbc-bg-dark: #2c304d; --status-cho-vbc-text-dark: #b3bcf5;
--status-dang-giu-bg-dark: #2a243d; --status-dang-giu-text-dark: #d1c4e9;
            --status-default-bg-dark: #37474f; --status-default-text-dark: #b0bec5;

            /* Shadows & Effects */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-glow-light: 0 0 0 4px rgb(79 70 229 / 0.1);
            --shadow-glow-dark: 0 0 0 4px rgb(20 184 166 / 0.2);

            /* Transitions */
            --transition-fast: 0.2s;
            --transition-medium: 0.3s;
            --transition-slow: 0.5s;
        }

        /* ==========================================================================
           2. Layout & Global Styles
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition-medium) ease, color var(--transition-medium) ease;
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
            --exterior-orange-text: #f5b041;
            --exterior-blue-text: #5dade2;
            --exterior-yellow-text: #f4d03f;
            --exterior-pink-text: #e573e0;
            --exterior-green-text: #2ecc71;
            --exterior-grey-text: #bdc3c7;
            --exterior-white-text-on-light: #ecf0f1;
            --exterior-red-text: #e74c3c;
            --exterior-bronze-text: #c5a37f;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted-light); }
        body.dark-mode ::-webkit-scrollbar-thumb { background: var(--border-dark); }
        body.dark-mode ::-webkit-scrollbar-thumb:hover { background: var(--text-muted-dark); }
/* === CSS CHO NÚT MENU DI ĐỘNG (GIỐNG HỆT INDEX.HTML) === */
.mobile-menu-btn {
    display: none; /* Mặc định ẩn trên màn hình lớn */
    z-index: 1002;
    background: transparent;
    color: var(--text-light);
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-medium) ease;
}

body.dark-mode .mobile-menu-btn {
    color: var(--text-dark);
}

.mobile-menu-btn:hover {
    background-color: var(--border-light);
}

body.dark-mode .mobile-menu-btn:hover {
    background-color: var(--border-dark);
}
        .navbar {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 40px;
            padding: 0 20px;
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--border-light);
            transition: all var(--transition-medium) ease;
            display: flex;
            align-items: center;
            z-index: 999;
            gap: 15px;
        }
        body.dark-mode .navbar {
            background-color: rgba(30, 30, 30, 0.75);
            border-color: var(--border-dark);
        }

        .navbar .logo-title {
            font-size: 18px; font-weight: 800;
            color: var(--text-light);
            position: absolute; left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        body.dark-mode .navbar .logo-title { color: var(--text-dark); }

        .navbar-controls {
            margin-left: auto;
            display: flex; align-items: center; gap: 10px;
        }

        .nav-btn, .theme-toggle-btn {
            border: 1px solid var(--border-light);
            border-radius: 50%;
            background: var(--card-bg-light);
            color: var(--text-muted-light);
            transition: all var(--transition-medium) ease;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
        }
        .nav-btn:hover, .theme-toggle-btn:hover {
            color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        body.dark-mode .nav-btn, body.dark-mode .theme-toggle-btn {
            background: var(--card-bg-dark);
            color: var(--text-muted-dark);
            border-color: var(--border-dark);
        }
        body.dark-mode .nav-btn:hover, body.dark-mode .theme-toggle-btn:hover { color: var(--text-dark); }

        .mobile-menu-btn { display: none; }

        .sidebar {
            position: fixed; top: 0; left: 0;
            width: 240px; height: 100vh;
            background-color: rgba(248, 249, 250, 0.85);
            backdrop-filter: blur(8px);
            padding: 15px; padding-top: 80px; 
            transition: width var(--transition-medium) ease, transform var(--transition-medium) ease, background-color var(--transition-medium) ease;
            z-index: 999;
            border-right: 1px solid var(--border-light);
            display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: 80px; }
        body.dark-mode .sidebar {
            background-color: rgba(30, 30, 30, 0.85);
            border-right: 1px solid var(--border-dark);
        }

        .sidebar .logo { text-align: center; margin-bottom: 30px; }
        .sidebar .logo h1 {
            font-size: 18px; font-weight: 800;
            background: var(--gradient); color: transparent;
            -webkit-background-clip: text; background-clip: text;
            transition: opacity var(--transition-medium) ease;
        }
        .sidebar.collapsed .logo h1 { opacity: 0; }

        .sidebar .menu {
            display: flex; flex-direction: column; gap: 8px; flex-grow: 1;
        }
        .sidebar .menu a {
            padding: 12px 15px; text-decoration: none;
            color: var(--text-muted-light); font-size: 14px; font-weight: 600;
            border-radius: 10px; transition: all var(--transition-fast) ease-out;
            display: flex; align-items: center; gap: 15px;
        }
        .sidebar .menu a i {
            font-size: 18px;
            width: 24px;
            text-align: center;
            transition: transform var(--transition-medium) ease;
        }
        .sidebar .menu a span { transition: opacity 0.2s ease, max-width var(--transition-medium) ease; white-space: nowrap; overflow: hidden; max-width: 120px; }
        .sidebar.collapsed .menu a { justify-content: center; }
        .sidebar.collapsed .menu a span { opacity: 0; max-width: 0; }
        .sidebar .menu a:hover { color: var(--text-light); background: var(--bg-light); }
        .sidebar .menu a.active { background: var(--gradient); color: white; box-shadow: var(--shadow-md); }
        .sidebar .menu a.active i { transform: scale(1.1); }
        body.dark-mode .sidebar .menu a { color: var(--text-muted-dark); }
        body.dark-mode .sidebar .menu a:hover { color: var(--text-dark); background: var(--bg-dark); }
        body.dark-mode .sidebar .menu a.active { color: white; }

        .toggle-btn {
            margin-top: auto;
            width: 100%; height: 44px;
            background: var(--bg-light); border: 1px solid var(--border-light);
            border-radius: 12px; color: var(--text-muted-light);
            font-size: 16px; cursor: pointer;
            transition: all var(--transition-medium) ease;
            display: flex; align-items: center; justify-content: center;
        }
        .sidebar.collapsed .toggle-btn { width: 44px; margin: auto auto 0; }
        .toggle-btn:hover { border-color: var(--gradient-start); color: var(--gradient-start); transform: scale(1.05); }
        body.dark-mode .toggle-btn { background: var(--bg-dark); border-color: var(--border-dark); color: var(--text-muted-dark); }
        body.dark-mode .toggle-btn:hover { border-color: var(--gradient-end); color: var(--gradient-end); }
        .toggle-btn i { transition: transform var(--transition-slow) cubic-bezier(0.19, 1, 0.22, 1); }
        .sidebar.collapsed .toggle-btn i { transform: rotate(180deg); }

        .main-content {
            margin-left: 240px; padding-top: 30px; padding-bottom: 30px;
            height: 100vh;
            transition: margin-left var(--transition-medium) ease;
            display: flex; flex-direction: column;
        }
        .main-content.collapsed { margin-left: 80px; }

        footer {
            position: fixed; bottom: 0;
            height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 500;
            color: var(--text-muted-light);
            border-top: 1px solid var(--border-light);
            background: var(--bg-light);
            z-index: 998;
            left: 240px; width: calc(100% - 240px);
            transition: all var(--transition-medium) ease;
        }
        body.dark-mode footer { color: var(--text-muted-dark); border-top-color: var(--border-dark); background: var(--bg-dark); }
        .main-content.collapsed + footer { left: 80px; width: calc(100% - 80px); }

        /* ==========================================================================
           3. Components (Filter, Table, Cards, Pagination)
           ========================================================================== */
        .filter-section {
            padding: 25px; margin: 20px; margin-bottom: 0;
            background: var(--card-bg-light);
            border-radius: 16px; box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: all var(--transition-medium) ease;
            flex-shrink: 0;
        }
        body.dark-mode .filter-section { background: var(--card-bg-dark); border-color: var(--border-dark); }

        .filter-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 15px; }
        .search-container { flex: 1 1 300px; position: relative; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted-light); }
        body.dark-mode .search-container i { color: var(--text-muted-dark); }
        #search-input {
            width: 100%; padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-light); border-radius: 10px;
            font-size: 14px; background: var(--bg-light); color: var(--text-light);
            transition: all var(--transition-medium) ease;
        }
        body.dark-mode #search-input { background: var(--bg-dark); color: var(--text-dark); border-color: var(--border-dark); }
        #search-input:focus { outline: none; border-color: var(--gradient-start); box-shadow: var(--shadow-glow-light); }
        body.dark-mode #search-input:focus { border-color: var(--gradient-end); box-shadow: var(--shadow-glow-dark); }

        .filter-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
        .total-vehicles {
            font-size: 14px; font-weight: 500; color: var(--text-muted-light);
            background-color: var(--bg-light); border: 1px solid var(--border-light);
            padding: 10px 15px; border-radius: 10px; white-space: nowrap;
        }
        body.dark-mode .total-vehicles { color: var(--text-muted-dark); background-color: var(--bg-dark); border-color: var(--border-dark); }
        .total-vehicles strong { font-weight: 700; color: var(--text-light); }
        body.dark-mode .total-vehicles strong { color: var(--text-dark); }

        .action-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 15px; border: 1px solid var(--border-light);
            border-radius: 10px; font-size: 14px; font-weight: 600;
            color: var(--text-light); background-color: var(--card-bg-light);
            cursor: pointer; transition: all var(--transition-fast) ease;
            white-space: nowrap;
        }
        body.dark-mode .action-btn { background-color: var(--card-bg-dark); color: var(--text-dark); border-color: var(--border-dark); }
        .action-btn:hover { border-color: var(--gradient-start); color: var(--gradient-start); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        body.dark-mode .action-btn:hover { border-color: var(--gradient-end); color: var(--gradient-end); }
        .action-btn i { transition: transform var(--transition-medium) ease; }
        .action-btn.toggle-filter-btn.active i { transform: rotate(180deg); }

        .collapsible-filters {
            max-height: 0; overflow: hidden;
            transition: max-height var(--transition-medium) ease-out, padding-top var(--transition-medium) ease-out, margin-top var(--transition-medium) ease-out;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; border-top: 1px solid transparent;
        }
        .collapsible-filters.open {
            margin-top: 20px; padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }
        body.dark-mode .collapsible-filters.open { border-top-color: var(--border-dark); }

        .collapsible-filters select {
            width: 100%; padding: 12px 15px;
            border: 1px solid var(--border-light); border-radius: 10px;
            font-size: 14px; background: var(--bg-light); color: var(--text-light);
            transition: all var(--transition-medium) ease;
            -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236c757d' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.8rem center; background-repeat: no-repeat; background-size: 1.25em 1.25em;
            padding-right: 2.8rem;
        }
        body.dark-mode .collapsible-filters select {
            background-color: var(--bg-dark); color: var(--text-dark); border-color: var(--border-dark);
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23adb5bd' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        }
        .collapsible-filters select:focus { outline: none; border-color: var(--gradient-start); box-shadow: var(--shadow-glow-light); }
        body.dark-mode .collapsible-filters select:focus { border-color: var(--gradient-end); box-shadow: var(--shadow-glow-dark); }

        .content-grid {
            flex-grow: 1; min-height: 0;
            margin: 20px;
            display: flex;
        }
        .data-card {
            background: var(--card-bg-light); padding: 25px;
            border-radius: 16px; box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            display: flex; flex-direction: column; gap: 20px;
            width: 100%; height: 100%; min-height: 0;
        }
        body.dark-mode .data-card { background: var(--card-bg-dark); border-color: var(--border-dark); }

        .table-container { flex-grow: 1; overflow: auto; position: relative; min-height: 0; }
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        .data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-light); white-space: nowrap; }
        body.dark-mode .data-table th, body.dark-mode .data-table td { border-bottom-color: var(--border-dark); }
        .data-table th {
            position: sticky; top: 0; z-index: 2;
            background-color: var(--bg-light);
            color: var(--text-light);
            border-bottom: 2px solid var(--border-light);
            text-align: center; text-transform: uppercase;
            font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
            cursor: pointer;
        }
        body.dark-mode .data-table th {
            background-color: var(--bg-dark);
            color: var(--text-dark);
            border-bottom-color: var(--border-dark);
        }
        .data-table tbody tr:hover { background-color: var(--bg-light); }
        body.dark-mode .data-table tbody tr:hover { background-color: var(--bg-dark); }
        .table-placeholder td { text-align: center !important; color: var(--text-muted-light); padding: 40px 0; }
        body.dark-mode .table-placeholder td { color: var(--text-muted-dark); }
        
        .loading-overlay {
            position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.7);
            display: none; justify-content: center; align-items: center;
            z-index: 100; border-radius: 16px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            border: 4px solid var(--border-light); border-top: 4px solid var(--gradient-start); 
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        body.dark-mode .loading-overlay { background: rgba(18, 18, 18, 0.8); }
        body.dark-mode .loading-spinner { border: 4px solid var(--border-dark); border-top: 4px solid var(--gradient-end); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; flex-shrink: 0; }
        .pagination button {
            border: 1px solid var(--border-light);
            background: var(--card-bg-light); color: var(--text-light);
            padding: 8px 12px; font-size: 13px; font-weight: 600;
            border-radius: 8px; cursor: pointer; transition: all var(--transition-fast) ease;
        }
        .pagination button:hover:not(:disabled) { border-color: var(--gradient-start); color: var(--gradient-start); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        body.dark-mode .pagination button { background: var(--card-bg-dark); color: var(--text-dark); border-color: var(--border-dark); }
        body.dark-mode .pagination button:hover:not(:disabled) { border-color: var(--gradient-end); color: var(--gradient-end); }
        .pagination button:disabled { background-color: var(--bg-light); color: var(--text-muted-light); cursor: not-allowed; }
        body.dark-mode .pagination button:disabled { background-color: var(--bg-dark); color: var(--text-muted-dark); }
        .pagination span { font-size: 14px; font-weight: 500; color: var(--text-muted-light); }
        body.dark-mode .pagination span { color: var(--text-muted-dark); }

        /* ===================================================================== */
/* === [THAY THẾ] CSS CHO THẺ TRẠNG THÁI (GIAO DIỆN PRO) === */
/* ===================================================================== */

/* 1. Định dạng cơ bản cho tất cả thẻ trạng thái */
/* THAY THẾ ĐOẠN NÀY */
.status-badge {
    padding: 5px 8px;         /* Giảm đệm viền */
    border-radius: 6px;
    font-size: 10px;          /* Giảm cỡ chữ */
    font-weight: 700;
    text-align: left;
    display: inline-block;
    min-width: 95px;          /* Giảm chiều rộng tối thiểu */
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    background-color: var(--status-color-bg);
    color: var(--status-color-main);
    border-left: 3px solid var(--status-color-main);
}

/* 2. Định nghĩa màu cho từng loại trạng thái */

/* --- Trạng thái: Sẵn Sàng (Màu xanh lá) --- */
.status-san-sang {
    --status-color-main: var(--status-san-sang-text-light);
    --status-color-bg: var(--status-san-sang-bg-light);
}
body.dark-mode .status-san-sang {
    --status-color-main: var(--status-san-sang-text-dark);

/* ======================================================= */
/* === CSS NÚT HÀNH ĐỘNG - PHONG CÁCH GRADIENT XANH ĐEN & THAN CHÌ === */
/* ======================================================= */

/* 1. Kiểu dáng nền tảng cho nút */
.action-cell .hold-btn {
    position: relative; /* Quan trọng để định vị cho span con */
    width: 28px;
    height: 28px;
    border-radius: 40%;
    cursor: pointer;
    border: none;
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 2. Icon và Text */
.action-cell .hold-btn i {
    font-size: 12px;
    flex-shrink: 0;
    z-index: 2; /* Đảm bảo icon luôn ở trên */
}

.action-cell .hold-btn span {
    position: absolute; /* Lấy span ra khỏi luồng layout */
    left: 18px; /* Vị trí bắt đầu của span, ngay cạnh icon */
    top: 50%;
    transform: translateY(-50%) translateX(-10px); /* Dịch sang trái để ẩn */

    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
    height: 28px;
    line-height: 16px;
    padding: 6px 12px 6px 20px;
    border-radius: 10px;
    box-sizing: border-box;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 1; /* Nằm dưới icon một chút */
}

/* 3. Màu sắc cho từng loại nút */
.hold-btn:not(.release-btn) {
    background: linear-gradient(135deg, #10B981 0%, #064E3B 100%);
    box-shadow: 0 4px 15px -5px rgba(16, 185, 129, 0.4);
}
.hold-btn:not(.release-btn) span {
    background: linear-gradient(135deg, #10B981 0%, #064E3B 100%);
}
.release-btn {
    background: linear-gradient(135deg, #4B5565 0%, #1F2937 100%);
    box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.4);
}
.release-btn span {
    background: linear-gradient(135deg, #4B5565 0%, #1F2937 100%);
}

/* 4. HIỆU ỨNG KHI DI CHUỘT (QUAN TRỌNG) */
.hold-btn:hover:not(:disabled) {
    /* KHÔNG THAY ĐỔI width ở đây nữa */
}
.hold-btn:hover:not(:disabled) span {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(-50%) translateX(0); /* Hiện span ra */
}
/* 5. Vô hiệu hóa */
.hold-btn:disabled {
    background: var(--border-light);
    color: var(--text-muted-light);
    cursor: not-allowed;
    box-shadow: none;
    /* Loại bỏ icon và text mặc định của nút */
    font-size: 0;
    position: relative;
    width: 38px; /* Giữ kích thước tròn */
}

/* Thêm icon ổ khóa cho nút bị vô hiệu hóa */
.hold-btn:disabled::before {
    content: '\f023'; /* Mã unicode cho icon ổ khóa của FontAwesome */
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    font-size: 14px; /* Kích thước icon */
    color: var(--text-muted-light);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

body.dark-mode .hold-btn:disabled {
    background: var(--border-dark);
    color: var(--text-muted-dark);
}

body.dark-mode .hold-btn:disabled::before {
    color: var(--text-muted-dark);
}

.hold-info {
    font-size: 10px;          /* Giảm cỡ chữ */
    color: var(--text-muted-light);
    line-height: 1.2;         /* Làm các dòng gần nhau hơn */
}
        body.dark-mode .hold-info {
            color: var(--text-muted-dark);
        }

/* --- 1. Nền Gradient và Bo góc cho Tiêu đề --- */
.data-table thead th {
    background: linear-gradient(280deg, #f0f2f5, #f0f2f5); /* << Nền trắng xám nhẹ */
    color: var(--text-light);                            /* << Chữ màu tối để dễ đọc */
}

/* Bo góc cho cột tiêu đề đầu tiên và cuối cùng */
.data-table thead th:first-child {
    border-top-left-radius: 12px;
}
.data-table thead th:last-child {
    border-top-right-radius: 12px;
    border-right: none; /* Bỏ đường kẻ ở cạnh ngoài cùng */
}

/* --- 2. Đường kẻ và Hiệu ứng cho Dòng dữ liệu --- */
.data-table tbody td {
    border-right: 1px solid var(--border-light);
    transition: background-color var(--transition-fast) ease;
}

/* Bỏ đường kẻ dọc cho cột cuối cùng */
.data-table tbody td:last-child {
    border-right: none;
}

/* Thêm hiệu ứng Zebra-striping (màu nền xen kẽ) cho các dòng chẵn */
.data-table tbody tr:nth-child(even) {
    background-color: var(--bg-light);
}

.data-table tbody tr:hover td:first-child {
    border-top-left-radius: 8px;
    border-bottom-left-radius: 8px;
}
.data-table tbody tr:hover td:last-child {
    border-top-right-radius: 8px;
    border-bottom-right-radius: 8px;
}

/* --- 3. Điều chỉnh cho Giao diện Tối (Dark Mode) --- */
body.dark-mode .data-table tbody td {
    border-right-color: var(--border-dark);
}
body.dark-mode .data-table tbody tr:nth-child(even) {
    background-color: var(--bg-dark);
}
body.dark-mode .data-table tbody tr:hover {
    background-color: #2c2c2c; /* Màu hover cho dark mode */

    border-radius: 13px;

    border-color: var(--border-dark);

    <script>
    document.addEventListener("DOMContentLoaded", function () {
if (sessionStorage.getItem("isLoggedIn") !== "true") {
            // Nếu chưa đăng nhập, chuyển hướng về trang chủ (trang đăng nhập)
            window.location.href = "index.html";
            return; // Dừng thực thi các mã script khác để tránh lỗi
        }
        
        // ==========================================================================
        // 1. Quản lý Trạng thái & Biến Toàn cục
        // ==========================================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbwpS3wpojA3qi5SM5aCdo-f0XRLMjSwf08s5ywG5b2XsUQFaEWfabtA4RIJ0GO5MJJorQ/exec";
        let allCars = [];
        let filteredCars = [];
        let currentPage = 1;
        const ROWS_PER_PAGE = 25;
const HOLD_DURATION_HOURS = 24;
        let sortState = { key: 'dateAdded', direction: 'desc' };

        // ==========================================================================
        // 2. Tham chiếu đến các Phần tử DOM
        // ==========================================================================
        const DOMElements = {
            body: document.body,
            sidebar: document.getElementById('sidebar'),
            mainContent: document.getElementById('main-content'),
            footer: document.getElementById('footer'),
            loadingOverlay: document.getElementById('loading-overlay'),
            tableBody: document.getElementById('table-body'),
            searchInput: document.getElementById('search-input'),
            filterLine: document.getElementById('filter-line'),
            filterVersion: document.getElementById('filter-version'),
            filterExterior: document.getElementById('filter-exterior'),
            filterStatus: document.getElementById('filter-status'),
            totalVehicles: document.getElementById('total-vehicles'),
            pageInfo: document.getElementById('page-info'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
        };

        // ==========================================================================
        // 3. Đối tượng quản lý Giao diện & Tương tác (UIManager)
        // ==========================================================================
        const UIManager = {
            init: function() {
                this.setupEventListeners();
                this.applyInitialSettings();
                AOS.init({ duration: 600, once: true });
            },

            setupEventListeners: function() {
                document.getElementById('theme-toggle-btn')?.addEventListener('click', () => this.toggleDarkMode());
                document.getElementById('sidebar-toggle-btn')?.addEventListener('click', () => this.toggleSidebarDesktop());
                document.getElementById('mobile-menu-btn')?.addEventListener('click', () => this.toggleMobileSidebar());
                document.getElementById('back-btn')?.addEventListener('click', () => window.location.href = "index.html");
                document.getElementById('logout-btn')?.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = "index.html";
                });
                document.getElementById('toggle-filters-btn')?.addEventListener('click', this.toggleCollapsibleFilters);
                DOMElements.searchInput?.addEventListener('input', debounce(App.applyFiltersAndRender, 300));
                [DOMElements.filterLine, DOMElements.filterVersion, DOMElements.filterExterior, DOMElements.filterStatus].forEach(el => {
                    el?.addEventListener('change', App.applyFiltersAndRender);
                });
                document.getElementById('refresh-btn')?.addEventListener('click', () => App.refreshData());
                document.getElementById('export-btn')?.addEventListener('click', () => Exporter.exportToExcel());
                document.getElementById('print-btn')?.addEventListener('click', () => window.print());
                DOMElements.prevBtn?.addEventListener('click', () => App.changePage(-1));
                DOMElements.nextBtn?.addEventListener('click', () => App.changePage(1));
                document.querySelector('#data-table thead')?.addEventListener('click', (e) => {
                    const header = e.target.closest('th');
                    if (header && header.dataset.sortKey) {
                        App.handleSort(header.dataset.sortKey);
                    }
                });
                window.addEventListener('resize', debounce(() => {
                    this.handleResize();
                    App.render();
                }, 200));
                 document.addEventListener('click', (event) => {
                    const sidebar = DOMElements.sidebar;
                    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
                    if (window.innerWidth <= 768 && sidebar?.classList.contains('open')) {
                        if (!sidebar.contains(event.target) && (!mobileMenuBtn || !mobileMenuBtn.contains(event.target))) {
                            this.toggleMobileSidebar();
                        }
                    }
                });
            },

            applyInitialSettings: function() {
                if (localStorage.getItem('theme') === 'dark') {
                    DOMElements.body.classList.add('dark-mode');
                    document.getElementById('theme-icon')?.classList.replace('fa-moon', 'fa-sun');
                }
                if (window.innerWidth > 768 && localStorage.getItem('sidebarState') === 'collapsed') {
                    DOMElements.sidebar?.classList.add('collapsed');
                    DOMElements.mainContent?.classList.add('collapsed');
                    DOMElements.footer?.classList.add('collapsed');
                }
                const currentPageFile = window.location.pathname.split("/").pop() || "index.html";
                document.querySelectorAll("#nav-menu a").forEach(link => {
                    link.classList.remove("active");
                    if (link.getAttribute('href') === currentPageFile) {
                        link.classList.add("active");
                    }
                });
            },

            toggleDarkMode: function() {
                DOMElements.body.classList.toggle('dark-mode');
                const isDark = DOMElements.body.classList.contains('dark-mode');
                document.getElementById('theme-icon')?.classList.toggle('fa-sun', isDark);
                document.getElementById('theme-icon')?.classList.toggle('fa-moon', !isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                App.render();
            },

            toggleSidebarDesktop: function() {
                if (window.innerWidth > 768) {
                    const isCollapsed = DOMElements.sidebar.classList.toggle("collapsed");
                    DOMElements.mainContent.classList.toggle("collapsed");
                    DOMElements.footer.classList.toggle("collapsed");
                    localStorage.setItem('sidebarState', isCollapsed ? 'collapsed' : 'expanded');
                }
            },
            
            toggleMobileSidebar: function() {
                DOMElements.sidebar.classList.toggle("open");
            },

            toggleCollapsibleFilters: function() {
                const btn = document.getElementById('toggle-filters-btn');
                const panel = document.getElementById('collapsible-filters-panel');
                btn.classList.toggle('active');
                panel.classList.toggle('open');
                panel.style.maxHeight = panel.classList.contains('open') ? panel.scrollHeight + "px" : null;
            },

            handleResize: function() {
                if (window.innerWidth > 768) {
                    DOMElements.sidebar.classList.remove('open');
                }
            },
            
            showLoading: function(show) {
                DOMElements.loadingOverlay?.classList.toggle('active', show);
            },

            updateTotalVehicles: function() {
                if (DOMElements.totalVehicles) {
                    DOMElements.totalVehicles.innerHTML = `Tổng: <strong>${filteredCars.length}</strong>`;
                }
            },

            updatePagination: function() {
                const totalPages = Math.ceil(filteredCars.length / ROWS_PER_PAGE) || 1;
                DOMElements.pageInfo.textContent = `Trang ${currentPage} / ${totalPages}`;
                DOMElements.prevBtn.disabled = currentPage === 1;
                DOMElements.nextBtn.disabled = currentPage === totalPages;
            },

            updateSortHeaders: function() {
                document.querySelectorAll("#data-table th").forEach(th => {
                    th.innerHTML = th.textContent.replace(/▲|▼/g, '').trim();
                    if (th.dataset.sortKey === sortState.key) {
                        th.innerHTML += ` <span style="font-size: 10px;">${sortState.direction === 'asc' ? '▲' : '▼'}</span>`;
                    }
                });
            },
            
            // [THAY THẾ TOÀN BỘ HÀM CŨ BẰNG HÀM NÀY]
initializePopovers: function() {
    // Popover xác nhận hành động (giữ nguyên)
    tippy('.hold-btn:not(:disabled)', {
        content(reference) {
            const action = reference.dataset.action;
            const vin = reference.dataset.vin;
            const isHold = action === 'hold';
            const title = isHold ? 'Xác nhận giữ xe?' : 'Xác nhận hủy giữ?';
            const actionFunc = isHold ? `App.holdCar('${vin}')` : `App.releaseCar('${vin}')`;
            const template = document.createElement('div');
            template.className = 'popover-content';
            template.innerHTML = `
                <div class="popover-title">${title}</div>
                <div class="popover-buttons">
                    <button class="popover-btn no">Không</button>
                    <button class="popover-btn yes">Có</button>
                </div>
            `;
            const yesBtn = template.querySelector('.yes');
            const noBtn = template.querySelector('.no');
            yesBtn.addEventListener('click', () => {
                eval(actionFunc);
                reference._tippy.hide();
            });
            noBtn.addEventListener('click', () => {
                reference._tippy.hide();
            });
            return template;
        },
        allowHTML: true,
        interactive: true,
        trigger: 'click',
        placement: 'right',
        theme: 'confirm',
        animation: 'scale-subtle',
    });

    // === THÊM MỚI: Popover hiển thị thông tin khi di chuột ===
    tippy('.has-hold-info', {
        allowHTML: true,
        theme: 'hold-info-popover', // Giao diện mới sẽ được tạo ở CSS
        placement: 'right',
        animation: 'scale-subtle',
        arrow: true,
        trigger: 'mouseenter focus', // Hiện khi di chuột vào hoặc focus
        delay: [100, 0], // Trễ 100ms khi hiện
    });
}
};

        window.App = {
            init: async function() {
                UIManager.init();
                await this.fetchData();
            },

            fetchData: async function() {
                UIManager.showLoading(true);
                const CACHE_KEY = 'khoXeData';
                const cachedData = sessionStorage.getItem(CACHE_KEY);

                // --- BỔ SUNG: Kiểm tra cache trước ---
                if (cachedData) {
                    try {
                        console.log("Đang tải dữ liệu từ cache...");
                        // Chuyển đổi dữ liệu từ chuỗi JSON và khôi phục các đối tượng Date
                        allCars = JSON.parse(cachedData).map(car => ({
                            ...car,
                            dateAdded: car.dateAdded ? new Date(car.dateAdded) : null,
                            expiry: car.expiry ? new Date(car.expiry) : null
                        }));
                        
                        this.populateFilters();
                        this.applyFiltersAndRender();
                        UIManager.showLoading(false);
                        return; // Dừng hàm tại đây vì đã có dữ liệu
                    } catch (e) {
                        console.error("Lỗi đọc cache, sẽ tải lại từ đầu:", e);
                        sessionStorage.removeItem(CACHE_KEY); // Xóa cache lỗi
                    }
                }
                
                // --- Giữ nguyên logic tải dữ liệu gốc nếu không có cache ---
                try {
                    console.log("Đang tải dữ liệu từ API...");
                    const currentUser = sessionStorage.getItem("currentConsultant");
                    const isAdmin = sessionStorage.getItem("isAdmin") === 'true';
                    const response = await axios.get(API_URL, {
                        params: { currentUser: currentUser, isAdmin: isAdmin }
                    });
                    if (!response.data || !Array.isArray(response.data.khoxe)) {
                        throw new Error("Dữ liệu không hợp lệ từ API");
                    }
                    allCars = DataProcessor.parseApiData(response.data.khoxe);
                    
                    // --- BỔ SUNG: Lưu dữ liệu mới vào cache ---
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify(allCars));

                    this.populateFilters();
                    this.applyFiltersAndRender();
                } catch (error) {
                    console.error("Lỗi tải dữ liệu:", error);
                    DOMElements.tableBody.innerHTML = `<tr class="table-placeholder"><td colspan="9">⚠️ Lỗi tải dữ liệu. Vui lòng làm mới trang.</td></tr>`;
                } finally {
                    UIManager.showLoading(false);
                }
            },

            applyFiltersAndRender: function() {
                App.filterData();
                App.sortData();
                currentPage = 1;
                App.render();
            },

            filterData: function() {
                const filters = {
                    search: DOMElements.searchInput.value.trim().toLowerCase(),
                    line: DOMElements.filterLine.value,
                    version: DOMElements.filterVersion.value,
                    exterior: DOMElements.filterExterior.value,
                    status: DOMElements.filterStatus.value,
                };
                filteredCars = allCars.filter(car => {
                    const searchMatch = filters.search === "" || 
                        car.vin.toLowerCase().includes(filters.search) ||
                        car.line.toLowerCase().includes(filters.search) ||
                        car.version.toLowerCase().includes(filters.search);
                    return (filters.line === "" || car.line === filters.line) &&
                           (filters.version === "" || car.version === filters.version) &&
                           (filters.exterior === "" || car.exterior === filters.exterior) &&
                           (filters.status === "" || car.status === filters.status) &&
                           searchMatch;
                });
            },

            sortData: function() {
                const { key, direction } = sortState;
                filteredCars.sort((a, b) => {
                    let valA = a[key] ?? '';
                    let valB = b[key] ?? '';
                    if (key === 'dateAdded') {
                        valA = valA || new Date(0);
                        valB = valB || new Date(0);
                    }
                    let comparison = 0;
                    if (valA > valB) comparison = 1;
                    else if (valA < valB) comparison = -1;
                    return direction === 'asc' ? comparison : -comparison;
                });
            },
            
            handleSort: function(key) {
                if (sortState.key === key) {
                    sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    sortState.key = key;
                    sortState.direction = 'asc';
                }
                this.sortData();
                currentPage = 1;
                this.render();
            },

            populateFilters: function() {
                const createOptions = (items) => items.map(item => `<option value="${item}">${item}</option>`).join('');
                const unique = {
                    line: [...new Set(allCars.map(c => c.line).filter(Boolean))].sort(),
                    version: [...new Set(allCars.map(c => c.version).filter(Boolean))].sort(),
                    exterior: [...new Set(allCars.map(c => c.exterior).filter(Boolean))].sort(),
                    status: [...new Set(allCars.map(c => c.status).filter(Boolean))].sort(),
                };
                DOMElements.filterLine.innerHTML = '<option value="">Tất cả dòng xe</option>' + createOptions(unique.line);
                DOMElements.filterVersion.innerHTML = '<option value="">Tất cả phiên bản</option>' + createOptions(unique.version);
                DOMElements.filterExterior.innerHTML = '<option value="">Tất cả ngoại thất</option>' + createOptions(unique.exterior);
                DOMElements.filterStatus.innerHTML = '<option value="">Tất cả trạng thái</option>' + createOptions(unique.status);
            },

           render: function() {
                DOMElements.tableBody.innerHTML = "";
                const paginatedData = filteredCars.slice((currentPage - 1) * ROWS_PER_PAGE, currentPage * ROWS_PER_PAGE);
                if (paginatedData.length === 0) {
                    DOMElements.tableBody.innerHTML = `<tr class="table-placeholder"><td colspan="9">Không tìm thấy xe nào phù hợp.</td></tr>`;
                } else {
                    const isMobile = window.innerWidth <= 768;
                    if (isMobile) { Renderer.renderCards(paginatedData); } 
                    else { Renderer.renderTableRows(paginatedData); }
                }
                UIManager.updateTotalVehicles();
                UIManager.updatePagination();
                if(window.innerWidth > 768) UIManager.updateSortHeaders();
                UIManager.initializePopovers();
            },
            
            changePage: function(delta) {
                const totalPages = Math.ceil(filteredCars.length / ROWS_PER_PAGE) || 1;
                const newPage = currentPage + delta;
                if (newPage >= 1 && newPage <= totalPages) {
                    currentPage = newPage;
                    this.render();
                }
            },
            
            // === [THAY THẾ] HÀM holdCar ĐỂ CẬP NHẬT UI NGAY LẬP TỨC ===
            // === [THAY THẾ] HÀM holdCar ĐỂ CẬP NHẬT UI NGAY LẬP TỨC ===
holdCar: async function(vin) {
    const button = document.querySelector(`.hold-btn[data-vin="${vin}"]`);
    if (button) button.disabled = true;
    ToastManager.showProcessing('Đang xử lý...');

    try {
        const response = await axios.post(API_URL, null, {
            params: {
                action: 'holdCar',
                vin: vin,
                updatedBy: sessionStorage.getItem("currentConsultant")
            }
        });

        ToastManager.hideProcessing();

        if (response.data.status === "SUCCESS") {
            // **THAY ĐỔI QUAN TRỌNG**: Cập nhật dữ liệu ngay trên client
            const carToUpdate = allCars.find(car => car.vin === vin);
            if (carToUpdate) {
                carToUpdate.holder = sessionStorage.getItem("currentConsultant");
                const expiryTime = new Date();
                expiryTime.setHours(expiryTime.getHours() + HOLD_DURATION_HOURS);
                carToUpdate.expiry = expiryTime;
                carToUpdate.status = "Đang giữ"; // Cập nhật trạng thái mới
            }
            this.applyFiltersAndRender(); // Chỉ vẽ lại bảng với dữ liệu mới
            showToast(response.data.message || 'Giữ xe thành công!', 'success');
            
            // === GỌI HIỆU ỨNG TẠI ĐÂY ===
            triggerConfetti(); 

        } else {
            throw new Error(response.data.message);
        }
    } catch (error) {
        ToastManager.hideProcessing();

            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let iconClass = 'fas fa-info-circle';
            if (type === 'success') iconClass = 'fas fa-check-circle';
            if (type === 'error') iconClass = 'fas fa-times-circle';

            toast.innerHTML = `<i class="${iconClass}"></i> <span class="toast-message">${message}</span>`;
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);

            // Tự động xóa
            setTimeout(() => {
                toast.classList.remove('show');
                toast.addEventListener('transitionend', () => toast.remove());
            }, duration);
        }
const ToastManager = {
            processingToast: null,
            showProcessing: function(message) {
                // Nếu đã có toast xử lý, không làm gì cả
                if (this.processingToast) return;

                const container = document.getElementById('toastContainer');
                if (!container) return;
                
                const toast = document.createElement('div');
                toast.className = 'toast info'; // Luôn là màu info
                toast.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span class="toast-message">${message}</span>`;
                container.appendChild(toast);
                
                setTimeout(() => toast.classList.add('show'), 10);
                
                // Lưu lại tham chiếu đến toast này
                this.processingToast = toast;
            },
            hideProcessing: function() {
        if (this.processingToast) {
            // Lưu tham chiếu của toast vào một biến tạm thời
            const toastToRemove = this.processingToast;
            
            // Đặt lại biến toàn cục thành null ngay lập tức
            this.processingToast = null;

            // Sử dụng biến tạm thời cho các thao tác tiếp theo
            toastToRemove.classList.remove('show');
            toastToRemove.addEventListener('transitionend', () => toastToRemove.remove());
        }
    }

    const rect = buttonElement.getBoundingClientRect();
    const particles = [];
    const particleCount = 20; // Số lượng hạt

    // Tạo các hạt bụi
    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.style.position = 'absolute';
        particle.style.left = `${rect.left + rect.width / 2}px`;
        particle.style.top = `${rect.top + rect.height / 2}px`;
        particle.style.width = `${anime.random(3, 8)}px`;
        particle.style.height = particle.style.width;
        // Màu xám giống nút release
        particle.style.backgroundColor = `hsl(220, 10%, ${anime.random(40, 70)}%)`; 
        particle.style.borderRadius = '50%';
        document.body.appendChild(particle);
        particles.push(particle);
    }

    // Ẩn nút gốc đi
    buttonElement.style.opacity = '0';

    // Dùng anime.js để di chuyển các hạt
    anime({
        targets: particles,
        translateX: () => anime.random(-40, 40),
        translateY: () => anime.random(-40, 40),
        scale: [1, 0],
        opacity: [1, 0],
        duration: anime.random(600, 1200),
        easing: 'easeOutExpo',
        delay: anime.stagger(20),
        complete: () => {
            particles.forEach(p => p.remove()); // Dọn dẹp các hạt sau khi xong
        }
    });
}
/**
 * Hàm định dạng ngày giờ chuẩn cho giao diện người dùng.
 * @param {string | Date} dateValue - Giá trị ngày tháng cần định dạng.
 * @returns {string} - Chuỗi có định dạng HH:mm DD/MM/YYYY hoặc 'N/A'.
 */
function formatCustomDateTime(dateValue) {
    if (!dateValue) return 'N/A';
    try {
        const date = new Date(dateValue);
        // Kiểm tra xem date có hợp lệ không
        if (isNaN(date.getTime())) return 'N/A';

        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        
        // Trả về định dạng thân thiện với người dùng
        return `${hours}:${minutes} ${day}/${month}/${year}`;
    } catch (e) {
        // Trả về N/A nếu có lỗi xảy ra
        return 'N/A';
    }
}
        App.init();

    });
