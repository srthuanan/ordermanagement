<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Xe - VinFast Thuận An</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #f5f6f5; 
            color: #2c3e50; 
            min-height: 100vh; 
            overflow-x: hidden; 
            transition: background 0.3s, color 0.3s; 
            width: 100vw; 
        }
        body.dark-mode { 
            background: #1a1a1a; 
            color: #d9e1e8; 
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #003087;
            color: #FFFFFF;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            z-index: 999;
            box-shadow: 4px 4px 8px rgba(0, 48, 135, 0.6), -4px -4px 8px rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        body.dark-mode header {
            background: #00205B;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.4), -4px -4px 8px rgba(255, 255, 255, 0.5);
        }

        /* Slidebar */
        .slidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 150px;
            height: 100vh;
            background: #003087;
            padding: 15px;
            padding-top: 40px;
            transition: width 0.3s ease;
            z-index: 1000;
            box-shadow: 4px 0 8px rgba(0, 48, 135, 0.6), -2px 0 8px rgba(255, 255, 255, 0.1);
        }
        .slidebar.collapsed { width: 50px; }
        body.dark-mode .slidebar {
            background: #00205B;
            box-shadow: 4px 0 8px rgba(0, 0, 0, 0.4), -2px 0 8px rgba(255, 255, 255, 0.5);
        }
        .slidebar .logo h1 { 
            font-size: 16px; 
            color: #FFFFFF; 
            font-weight: 600; 
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 20px; 
            transition: opacity 0.3s ease; 
        }
        .slidebar.collapsed .logo h1 { opacity: 0; }
        .toggle-btn { 
            position: absolute; 
            top: 15px; 
            right: -12px; 
            width: 24px; 
            height: 24px; 
            background: #003087; 
            border: none; 
            border-radius: 50%; 
            color: #FFFFFF; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
        }
        .toggle-btn:hover { 
            box-shadow: inset 3px 3px 6px rgba(0, 48, 135, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.2); 
        }
        body.dark-mode .toggle-btn { 
            background: #00205B; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }

        /* Navbar controls */
        .navbar-controls { 
            position: fixed; 
            top: 15px; 
            right: 15px; 
            display: flex; 
            gap: 8px; 
            z-index: 1001; 
        }
        .nav-btn, .theme-toggle { 
            padding: 6px; 
            border: none; 
            border-radius: 50%; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 14px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .nav-btn:hover, .theme-toggle:hover { 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .nav-btn, body.dark-mode .theme-toggle { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }

        /* Main container */
        .main-container { 
            background: #f5f6f5; 
            margin-left: 150px; 
            padding: 15px; 
            margin-top: 40px; 
            height: calc(100vh - 60px); 
            transition: margin-left 0.3s ease; 
            display: flex; 
            gap: 10px; 
            width: calc(100vw - 160px); 
        }
        .main-container.collapsed { 
            margin-left: 50px; 
            width: calc(100vw - 50px); 
        }
        .grid-container { 
            flex: 1; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 100%; 
        }
        body.dark-mode .grid-container { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }

        /* Filter section */
        .filter-section { 
            display: flex; 
            flex-wrap: nowrap; 
            gap: 6px; 
            align-items: center; 
            justify-content: space-between; 
            padding-bottom: 6px; 
            width: 100%; 
        }
        .filter-group { 
            display: flex; 
            flex-wrap: nowrap; 
            gap: 6px; 
            align-items: center; 
        }
        .filter-section input, .filter-section select { 
            padding: 4px 6px; 
            border: none; 
            border-radius: 5px; 
            font-size: 10px; 
            background: #FFFFFF; 
            box-shadow: inset 2px 2px 3px rgba(163, 177, 198, 0.6), inset -2px -2px 3px rgba(255, 255, 255, 0.5); 
            width: 120px; 
            height: 26px; 
            color: #2c3e50; 
        }
        .filter-section input:focus, .filter-section select:focus { outline: none; }
        body.dark-mode .filter-section input, body.dark-mode .filter-section select { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: inset 2px 2px 3px rgba(0, 0, 0, 0.4), inset -2px -2px 3px rgba(255, 255, 255, 0.5); 
        }
        .filter-section .button-group { 
            display: flex; 
            gap: 5px; 
            align-items: center; 
        }
        .export-btn { 
            padding: 3px; 
            border: none; 
            border-radius: 50%; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 26px; 
            height: 26px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 2px 2px 3px rgba(163, 177, 198, 0.6), -2px -2px 3px rgba(255, 255, 255, 0.5); 
        }
        .export-btn:hover { 
            box-shadow: inset 2px 2px 3px rgba(163, 177, 198, 0.6), inset -2px -2px 3px rgba(255, 255, 255, 0.5); 
        }
        .refresh-btn { 
            background: #FFFFFF; 
            color: #00a550; 
        }
        body.dark-mode .export-btn, body.dark-mode .refresh-btn { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 2px 2px 3px rgba(0, 0, 0, 0.4), -2px -2px 3px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .refresh-btn { color: #00a550; }
        .total-vehicles { 
            padding: 4px 8px; 
            font-size: 10px; 
            color: #2c3e50; 
            background: #f5f6f5; 
            border-radius: 5px; 
            box-shadow: 2px 2px 3px rgba(163, 177, 198, 0.6), -2px -2px 3px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .total-vehicles { 
            color: #d9e1e8; 
            background: #2c2c2c; 
            box-shadow: 2px 2px 3px rgba(0, 0, 0, 0.4), -2px -2px 3px rgba(255, 255, 255, 0.5); 
        }

        /* Tables section */
        .tables-section { 
            display: flex; 
            gap: 10px; 
            flex: 1; 
            min-height: 360px; 
            width: 100%; 
        }
        .table-container { 
            flex: 0 0 75%; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            overflow-x: auto; 
            overflow-y: auto; 
            max-height: calc(100vh - 150px); 
            position: relative; 
        }
        body.dark-mode .table-container { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #f5f6f5; }
        .table-container::-webkit-scrollbar-thumb { 
            background: #d9e1e8; 
            border-radius: 3px; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .table-container::-webkit-scrollbar-track { background: #1a1a1a; }
        body.dark-mode .table-container::-webkit-scrollbar-thumb { 
            background: #555; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 11px; 
            table-layout: fixed; 
        }
        th, td { 
            padding: 8px 10px; 
            text-align: left; 
            border-bottom: 1px solid rgba(163, 177, 198, 0.3); 
            white-space: normal; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        th { 
            font-weight: 600; 
            background: #003087; 
            color: #FFFFFF; 
            position: sticky; 
            top: 0; 
            z-index: 2; 
            box-shadow: 3px 3px 6px rgba(0, 48, 135, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.1); 
        }
        body.dark-mode th { 
            background: #00205B; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        td { color: #2c3e50; }
        body.dark-mode td { color: #d9e1e8; border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        tbody tr:hover { 
            background: #f0f0f0; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode tbody tr:hover { background: #3a3a3a; box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); }
        .highlight { font-weight: 600; color: #00a550; }

        /* Column widths */
        col:nth-child(1) { width: 8%; }
        col:nth-child(2) { width: 11%; }
        col:nth-child(3) { width: 13%; }
        col:nth-child(4) { width: 18%; }
        col:nth-child(5) { width: 10%; }
        col:nth-child(6) { width: 16%; }
        col:nth-child(7) { width: 12%; }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #003087;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        body.dark-mode .loading-spinner {
            border-top: 4px solid #00205B;
        }

        /* Detail panel */
        .detail-panel { 
            flex: 0 0 29%; 
            min-width: 200px; 
            background: #FFFFFF; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); 
            overflow-y: auto; 
        }
        body.dark-mode .detail-panel { 
            background: #2c2c2c; 
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.1); 
        }
        .detail-panel::-webkit-scrollbar { width: 6px; }
        .detail-panel::-webkit-scrollbar-track { background: #f5f6f5; }
        .detail-panel::-webkit-scrollbar-thumb { 
            background: #d9e1e8; 
            border-radius: 3px; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .detail-panel::-webkit-scrollbar-track { background: #1a1a1a; }
        body.dark-mode .detail-panel::-webkit-scrollbar-thumb { 
            background: #555; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        .detail-panel h3 { 
            font-size: 14px; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            font-weight: 600; 
        }
        body.dark-mode .detail-panel h3 { color: #d9e1e8; }
        .detail-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 11px; 
        }
        .detail-table th, .detail-table td { 
            padding: 8px 10px; 
            text-align: left; 
            border-bottom: 1px solid rgba(163, 177, 198, 0.3); 
            white-space: normal; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }
        .detail-table th { 
            color: #2c3e50; 
            font-weight: 400; 
            width: 50%; 
            background: #f0f0f0; 
            box-shadow: inset 2px 2px 4px rgba(163, 177, 198, 0.6), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .detail-table th { 
            color: #d9e1e8; 
            background: #3a3a3a; 
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.5); 
        }
        .detail-table td { color: #2c3e50; }
        body.dark-mode .detail-table td { color: #d9e1e8; border-bottom: 1px solid rgba(255, 255, 255, 0.5); }

        /* Pagination */
        .pagination { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 10px; 
            width: 100%; 
        }
        .pagination button { 
            padding: 6px 12px; 
            border: none; 
            border-radius: 8px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .pagination button:hover { 
            box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode .pagination button { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        .pagination span { 
            padding: 6px 12px; 
            font-size: 12px; 
            color: #2c3e50; 
        }
        body.dark-mode .pagination span { color: #d9e1e8; }

        /* Footer */
        footer { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #003087; 
            color: #FFFFFF; 
            text-align: center; 
            padding: 8px 0; 
            font-size: 10px; 
            box-shadow: 4px -4px 8px rgba(0, 48, 135, 0.6), -4px 4px 8px rgba(255, 255, 255, 0.1); 
        }
        body.dark-mode footer { 
            background: #00205B; 
            box-shadow: 4px -4px 8px rgba(0, 0, 0, 0.4), -4px 4px 8px rgba(255, 255, 255, 0.5); 
        }

        /* Notification */
        #notification { 
            position: fixed; 
            top: 50px; 
            right: 80px; 
            padding: 8px 15px; 
            background: #FFFFFF; 
            color: #2c3e50; 
            border-radius: 8px; 
            display: none; 
            z-index: 10001; 
            font-size: 12px; 
            box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }
        body.dark-mode #notification { 
            background: #3a3a3a; 
            color: #d9e1e8; 
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), -3px -3px 6px rgba(255, 255, 255, 0.5); 
        }

        /* Responsive for mobile */
        @media (max-width: 768px) {
            .slidebar {
                width: 50px;
                padding: 10px;
            }
            .slidebar .logo h1 { opacity: 0; }
            .main-container {
                margin-left: 50px;
                width: calc(100vw - 50px);
                padding: 10px;
            }
            .navbar-controls {
                top: 10px;
                right: 10px;
                gap: 5px;
            }
            .nav-btn, .theme-toggle {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .filter-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .filter-group {
                flex-direction: column;
                width: 100%;
                gap: 5px;
            }
            .filter-section input, .filter-section select {
                width: 100%;
                margin-bottom: 3px;
            }
            .filter-section .button-group {
                width: 100%;
                justify-content: flex-start;
            }
            .filter-section .total-vehicles {
                width: 100%;
                text-align: right;
                padding: 3px 6px;
                font-size: 9px;
            }
            .tables-section {
                flex-direction: column;
                width: 100%;
            }
            .table-container {
                flex: 1;
                width: 100%;
                max-height: 50vh;
            }
            .detail-panel {
                flex: 1;
                width: 100%;
                min-width: 0;
                max-height: 30vh;
            }
            #notification {
                top: 60px;
                right: 10px;
                font-size: 10px;
                padding: 6px 10px;
            }
            header, footer {
                font-size: 12px;
                padding: 8px 0;
            }
            col:nth-child(1) { width: 10%; }
            col:nth-child(2) { width: 20%; }
            col:nth-child(3) { width: 15%; }
            col:nth-child(4) { width: 15%; }
            col:nth-child(5) { width: 20%; }
            col:nth-child(6) { width: 20%; }
            col:nth-child(7) { width: 20%; }
        }
    </style>
</head>
<body>
    <header>KHO XE VINFAST THUẬN AN</header>
    <div class="slidebar" id="slidebar">
        <div class="logo">
            <h1>VinFast Thuận An</h1>
        </div>
        <button class="toggle-btn" onclick="toggleSlidebar()"><i class="fas fa-bars"></i></button>
    </div>
    <div class="navbar-controls">
        <button class="theme-toggle" onclick="toggleTheme()" data-tooltip="Chuyển đổi giao diện"><i class="fas fa-moon"></i></button>
        <button class="nav-btn" onclick="goBack()" data-tooltip="Quay lại"><i class="fas fa-arrow-left"></i></button>
        <button class="nav-btn" onclick="logout()" data-tooltip="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
    </div>
    <div class="main-container" id="main-container">
        <div class="grid-container">
            <div class="filter-section">
                <div class="filter-group">
                    <input type="text" id="search-input" placeholder="Tìm kiếm...">
                    <select id="filter-line" onchange="applyFilters()">
                        <option value="">Tất cả dòng xe</option>
                    </select>
                    <select id="filter-version" onchange="applyFilters()">
                        <option value="">Tất cả phiên bản</option>
                    </select>
                    <select id="filter-exterior" onchange="applyFilters()">
                        <option value="">Tất cả ngoại thất</option>
                    </select>
                    <select id="filter-status" onchange="applyFilters()">
                        <option value="">Tất cả trạng thái</option>
                    </select>
                </div>
                <div class="button-group">
                    <button class="export-btn refresh-btn" onclick="refreshData()" data-tooltip="Làm mới"><i class="fas fa-sync-alt"></i></button>
                    <button class="export-btn" onclick="exportToExcel()" data-tooltip="Xuất Excel"><i class="fas fa-file-excel"></i></button>
                    <button class="export-btn" onclick="printTable()" data-tooltip="In"><i class="fas fa-print"></i></button>
                    <span class="total-vehicles" id="total-vehicles">Tổng số xe: 0</span>
                </div>
            </div>
            <div class="tables-section">
                <div class="table-container">
                    <div class="loading-overlay" id="loading-overlay">
                        <div class="loading-spinner"></div>
                        <span style="margin-left: 10px; font-size: 14px; color: #2c3e50;">Đang tải dữ liệu...</span>
                    </div>
                    <table id="data-table">
                        <colgroup>
                            <col><col><col><col><col><col><col>
                        </colgroup>
                        <thead>
                            <tr>
                                <th>SỐ TT</th>
                                <th>DÒNG XE</th>
                                <th>PHIÊN BẢN</th>
                                <th>NGOẠI THẤT</th>
                                <th>NỘI THẤT</th>
                                <th>SỐ VIN</th>
                                <th>TRẠNG THÁI</th>
                                <th>NGÀY NHẬP</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div class="detail-panel" id="detail-panel">
                    <h3>Chi Tiết Xe</h3>
                    <table id="detail-body" class="detail-table">
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="pagination" id="pagination">
                <button onclick="changePage(-1)" id="prev-btn">Trước</button>
                <span id="page-info">Trang 1</span>
                <button onclick="changePage(1)" id="next-btn">Sau</button>
            </div>
        </div>
    </div>
    <footer>© 2025 VinFast Thuận An</footer>
    <div id="notification"></div>

    <script>
        let isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
        let tableData = [];
        let filteredData = [];
        let currentPage = 1;
        const rowsPerPage = 20;
        let language = localStorage.getItem('language') || 'vi';

        const translations = {
            vi: {
                "vehicle-line": "Dòng xe",
                "vehicle-version": "Phiên bản",
                "vehicle-exterior": "Ngoại thất",
                "vehicle-interior": "Nội thất",
                "vehicle-vin": "Số VIN",
                "vehicle-status": "Trạng thái",
                "import-date": "Ngày nhập",
                "inventory-detail": "Chi Tiết Xe Trong Kho"
            },
            en: {
                "vehicle-line": "Vehicle Line",
                "vehicle-version": "Version",
                "vehicle-exterior": "Exterior",
                "vehicle-interior": "Interior",
                "vehicle-vin": "VIN Number",
                "vehicle-status": "Status",
                "import-date": "Import Date",
                "inventory-detail": "Vehicle Inventory Details"
            }
        };

        document.addEventListener("DOMContentLoaded", function () {
            if (!isLoggedIn) {
                window.location.href = "index.html";
            } else {
                loadInitialData();
                setupSearch();
                if (localStorage.getItem('theme') === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
                }
            }
        });

        function showLoading() {
            document.getElementById("loading-overlay").classList.add("active");
        }

        function hideLoading() {
            document.getElementById("loading-overlay").classList.remove("active");
        }

        async function loadInitialData() {
            showLoading();
            const apiURL = "https://script.google.com/macros/s/AKfycbwVmfihNIMYfheBH1QIJDDB3iqfFwAJaKDyo2rzW4XX5k3fHtV71b5DFT4R3-C7Va_tSg/exec";
            try {
                const response = await axios.get(apiURL);
                if (!response.data || !Array.isArray(response.data.khoxe)) throw new Error("Invalid data");
                tableData = response.data.khoxe.map(row => [
                    row["Dòng xe"] || "",
                    row["Phiên bản"] || "",
                    row["Ngoại thất"] || "",
                    row["Nội thất"] || "",
                    row["VIN"] || "",
                    row["Trạng thái"] || "",
                    row["Ngày nhập"] ? new Date(row["Ngày nhập"]).toLocaleDateString('vi-VN') : ""
                ]);
                sessionStorage.setItem('KhoXe', JSON.stringify(tableData));
                filteredData = [...tableData];
                renderTable();
                populateFilters();
                showNotification(language === 'vi' ? "Dữ liệu đã được tải!" : "Data loaded!", 2000);
            } catch (error) {
                console.error(error);
                document.getElementById("table-body").innerHTML = `<tr><td colspan="8">⚠️ Lỗi tải dữ liệu: ${error.message}</td></tr>`;
                showNotification(language === 'vi' ? "Lỗi tải dữ liệu!" : "Error loading data!", 3000);
            } finally {
                hideLoading();
            }
        }

        function renderTable() {
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedData = filteredData.slice(start, end);

            paginatedData.forEach((row, index) => {
                const globalIndex = start + index + 1;
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${globalIndex}</td>
                    <td>${row[0]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                    <td class="highlight">${row[4]}</td>
                    <td>${row[5]}</td>
                    <td>${row[6]}</td>
                `;
                tr.onclick = () => showDetail(row, globalIndex);
                tbody.appendChild(tr);
            });

            updatePagination();
            updateTotalVehicles();
            if (paginatedData.length > 0) {
                showDetail(paginatedData[0], start + 1);
            } else {
                document.querySelector("#detail-body tbody").innerHTML = "<tr><td colspan='2'>Không có dữ liệu để hiển thị.</td></tr>";
            }
        }

        function updatePagination() {
            document.getElementById("page-info").textContent = `Trang ${currentPage} / ${Math.ceil(filteredData.length / rowsPerPage) || 1}`;
            document.getElementById("prev-btn").disabled = currentPage === 1;
            document.getElementById("next-btn").disabled = currentPage === Math.ceil(filteredData.length / rowsPerPage) || filteredData.length === 0;
        }

        function updateTotalVehicles() {
            document.getElementById("total-vehicles").textContent = `Tổng số xe: ${filteredData.length}`;
        }

        function changePage(delta) {
            currentPage = Math.min(Math.max(1, currentPage + delta), Math.ceil(filteredData.length / rowsPerPage));
            renderTable();
            document.querySelector('.table-container').scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById("detail-panel").scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showDetail(row, index) {
            const detailBody = document.querySelector("#detail-body tbody");
            const headers = [
                translations[language]["vehicle-line"],
                translations[language]["vehicle-version"],
                translations[language]["vehicle-exterior"],
                translations[language]["vehicle-interior"],
                translations[language]["vehicle-vin"],
                translations[language]["vehicle-status"],
                translations[language]["import-date"]
            ];
            let html = "";
            headers.forEach((header, i) => {
                let value = row[i] || "";
                if (i === 4 && value) {
                    html += `<tr><th>${header}</th><td class="highlight">${value}</td></tr>`;
                } else {
                    html += `<tr><th>${header}</th><td>${value}</td></tr>`;
                }
            });
            detailBody.innerHTML = html;
        }

        async function refreshData() {
            showLoading();
            const apiURL = "https://script.google.com/macros/s/AKfycbyCCE6Q9g3Go2rjsJ0en-7OhfKcWEssPOA_n7cEFTD7ShDA9WV-5VmkWyEtkWR3oUIU/exec";
            try {
                const response = await axios.get(apiURL);
                if (!response.data || !Array.isArray(response.data.khoxe)) throw new Error("Invalid data");
                tableData = response.data.khoxe.map(row => [
                    row["Dòng xe"] || "",
                    row["Phiên bản"] || "",
                    row["Ngoại thất"] || "",
                    row["Nội thất"] || "",
                    row["VIN"] || "",
                    row["Trạng thái"] || "",
                    row["Ngày nhập"] ? new Date(row["Ngày nhập"]).toLocaleDateString('vi-VN') : ""
                ]);
                sessionStorage.setItem('KhoXe', JSON.stringify(tableData));
                filteredData = [...tableData];
                document.getElementById("search-input").value = "";
                document.getElementById("filter-line").value = "";
                document.getElementById("filter-version").value = "";
                document.getElementById("filter-exterior").value = "";
                document.getElementById("filter-status").value = "";
                renderTable();
                populateFilters();
                showNotification(language === 'vi' ? "Dữ liệu đã được làm mới!" : "Data refreshed!", 2000);
            } catch (error) {
                console.error(error);
                document.getElementById("table-body").innerHTML = `<tr><td colspan="8">⚠️ Lỗi làm mới dữ liệu: ${error.message}</td></tr>`;
                showNotification(language === 'vi' ? "Lỗi làm mới dữ liệu!" : "Error refreshing data!", 3000);
            } finally {
                hideLoading();
            }
        }

        function populateFilters() {
            const lineSelect = document.getElementById("filter-line");
            const versionSelect = document.getElementById("filter-version");
            const exteriorSelect = document.getElementById("filter-exterior");
            const statusSelect = document.getElementById("filter-status");
            const lines = [...new Set(tableData.map(row => row[0]))];
            const versions = [...new Set(tableData.map(row => row[1]))];
            const exteriors = [...new Set(tableData.map(row => row[2]))];
            const statuses = [...new Set(tableData.map(row => row[5]))];
            lineSelect.innerHTML = '<option value="">Tất cả dòng xe</option>' + lines.map(line => `<option value="${line}">${line}</option>`).join('');
            versionSelect.innerHTML = '<option value="">Tất cả phiên bản</option>' + versions.map(version => `<option value="${version}">${version}</option>`).join('');
            exteriorSelect.innerHTML = '<option value="">Tất cả ngoại thất</option>' + exteriors.map(exterior => `<option value="${exterior}">${exterior}</option>`).join('');
            statusSelect.innerHTML = '<option value="">Tất cả trạng thái</option>' + statuses.map(status => `<option value="${status}">${status}</option>`).join('');
        }

        function applyFilters() {
            const lineFilter = document.getElementById("filter-line").value;
            const versionFilter = document.getElementById("filter-version").value;
            const exteriorFilter = document.getElementById("filter-exterior").value;
            const statusFilter = document.getElementById("filter-status").value;
            const searchValue = document.getElementById("search-input").value.trim().toLowerCase();

            filteredData = tableData.filter(row => {
                return (!lineFilter || row[0] === lineFilter) &&
                       (!versionFilter || row[1] === versionFilter) &&
                       (!exteriorFilter || row[2] === exteriorFilter) &&
                       (!statusFilter || row[5] === statusFilter) &&
                       (!searchValue || row.some(cell => cell?.toString().toLowerCase().includes(searchValue)));
            });
            currentPage = 1;
            renderTable();
        }

        function exportToExcel() {
            if (confirm(language === 'vi' ? "Bạn có muốn xuất danh sách này sang Excel không?" : "Do you want to export this list to Excel?")) {
                const headers = [
                    "SỐ TT",
                    translations[language]["vehicle-line"],
                    translations[language]["vehicle-version"],
                    translations[language]["vehicle-exterior"],
                    translations[language]["vehicle-interior"],
                    translations[language]["vehicle-vin"],
                    translations[language]["vehicle-status"],
                    translations[language]["import-date"]
                ];
                const exportData = filteredData.map((row, index) => {
                    const rowData = { "SỐ TT": index + 1 };
                    headers.slice(1).forEach((header, i) => rowData[header] = row[i] || "");
                    return rowData;
                });
                const ws = XLSX.utils.json_to_sheet(exportData, { header: headers });
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "KhoXe");
                XLSX.writeFile(wb, `KhoXe_VinFast_ThuanAn_${new Date().toLocaleDateString('vi-VN')}.xlsx`);
                showNotification(language === 'vi' ? "Đã xuất file thành công!" : "File exported successfully!", 2000);
            }
        }

        function printTable() {
            const now = new Date().toLocaleString('vi-VN');
            let tableContent = `
                <table>
                    <colgroup>
                        <col style="width: 50px;">
                        <col style="width: 100px;">
                        <col style="width: 80px;">
                        <col style="width: 80px;">
                        <col style="width: 100px;">
                        <col style="width: 120px;">
                        <col style="width: 80px;">
                        <col style="width: 80px;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>SỐ TT</th>
                            <th>DÒNG XE</th>
                            <th>PHIÊN BẢN</th>
                            <th>NGOẠI THẤT</th>
                            <th>NỘI THẤT</th>
                            <th>SỐ VIN</th>
                            <th>TRẠNG THÁI</th>
                            <th>NGÀY NHẬP</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            filteredData.forEach((row, index) => {
                tableContent += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${row[0]}</td>
                        <td>${row[1]}</td>
                        <td>${row[2]}</td>
                        <td>${row[3]}</td>
                        <td class="highlight">${row[4]}</td>
                        <td>${row[5]}</td>
                        <td>${row[6]}</td>
                    </tr>
                `;
            });
            tableContent += `
                    </tbody>
                </table>
            `;
            const printContent = `
                <h2 style="color: #2c3e50;">KHO XE VINFAST THUẬN AN</h2>
                <p>Hotline: 1900 232389</p>
                <p>In lúc: ${now}</p>
                <p>Tổng số xe: ${filteredData.length}</p>
                ${tableContent}
            `;
            const win = window.open('', '', 'width=800,height=600');
            win.document.write(`
                <html>
                <head>
                    <title>In danh sách kho xe VinFast</title>
                    <style>
                        body { font-family: 'Roboto', sans-serif; margin: 20px; }
                        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
                        th, td { border: 1px solid #ddd; padding: 8px 10px; font-size: 11px; white-space: normal; word-wrap: break-word; overflow-wrap: break-word; }
                        th { background: #003087; color: #FFFFFF; }
                        .highlight { font-weight: 600; color: #00a550; }
                    </style>
                </head>
                <body>${printContent}</body>
                </html>
            `);
            win.document.close();
            win.print();
        }

        function setupSearch() {
            const searchInput = document.getElementById("search-input");
            searchInput.addEventListener("input", debounce(function () {
                applyFilters();
            }, 300));
        }

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const themeIcon = document.querySelector('.theme-toggle i');
            if (body.classList.contains('dark-mode')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleSlidebar() {
            document.getElementById("slidebar").classList.toggle("collapsed");
            document.getElementById("main-container").classList.toggle("collapsed");
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
            showNotification(language === 'vi' ? "Đã đăng xuất!" : "Logged out!", 2000);
        }

        function goBack() {
            window.location.href = "index.html";
            showNotification(language === 'vi' ? "Đã quay lại trang chủ!" : "Returned to homepage!", 2000);
        }

        function showNotification(message, duration = 2000) {
            const notif = document.getElementById("notification");
            notif.textContent = message;
            notif.style.display = "block";
            clearTimeout(notif.timeout);
            notif.timeout = setTimeout(() => notif.style.display = "none", duration);
        }
    </script>
</body>
</html>
