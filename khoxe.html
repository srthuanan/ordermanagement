<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Xe - VinFast Thuận An</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <style>
        :root {
    /* === FONT CHỦ ĐẠO === */
    --font-main: 'Plus Jakarta Sans', sans-serif;

    /* === BẢNG MÀU CHUNG === */
    --gradient-start: #4f46e5; /* Indigo */
    --gradient-end: #14b8a6; /* Teal */
    --gradient: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
    
    /* === BẢNG MÀU GIAO DIỆN SÁNG (LIGHT MODE) === */
    --background-light: #f8f9fa;
    --card-bg-light: #ffffff;
    --text-light: #212529;
    --text-muted-light: #6c757d;
    --border-light: #e9ecef;

    /* === BẢNG MÀU GIAO DIỆN TỐI (DARK MODE) === */
    --background-dark: #121212;
    --card-bg-dark: #1e1e1e;
    --text-dark: #e9ecef;
    --text-muted-dark: #adb5bd;
    --border-dark: #343a40;
    
    /* === MÀU CHỮ CHO NGOẠI THẤT (LIGHT MODE) === */
    --exterior-orange-text: #f39c12;
    --exterior-blue-text: #2980b9;
    --exterior-yellow-text: #b8860b;
    --exterior-pink-text: #d354aa;
    --exterior-green-text: #27ae60;
    --exterior-grey-text: #7f8c8d;
    --exterior-white-text: #2c3e50; /* Dùng cho xe màu trắng để có độ tương phản */
    --exterior-red-text: #c0392b; /* Thêm màu đỏ cho đầy đủ */
    --exterior-bronze-text: #a1794b; /* Thêm màu đồng */

    /* === MÀU CHO TRẠNG THÁI (LIGHT MODE) === */
    --status-san-sang-bg-light: #e0f2f1;
    --status-san-sang-text-light: #00796b;
    --status-da-ghep-bg-light: #e3f2fd;
    --status-da-ghep-text-light: #1e88e5;
    --status-chua-ghep-bg-light: #fff8e1;
    --status-chua-ghep-text-light: #f57c00;
    --status-da-ban-bg-light: #f1f2f6;
    --status-da-ban-text-light: #57606f;
    --status-cho-vbc-bg-light: #e8eaf6;
    --status-cho-vbc-text-light: #3f51b5;
    --status-default-bg-light: #eceff1;
    --status-default-text-light: #546e7a;

    /* === MÀU CHO TRẠNG THÁI (DARK MODE) === */
    --status-san-sang-bg-dark: #1a3c3a;
    --status-san-sang-text-dark: #80cbc4;
    --status-da-ghep-bg-dark: #1c3a56;
    --status-da-ghep-text-dark: #90caf9;
    --status-chua-ghep-bg-dark: #4b3c1c;
    --status-chua-ghep-text-dark: #ffe082;
    --status-da-ban-bg-dark: #393e46;
    --status-da-ban-text-dark: #a6acb3;
    --status-cho-vbc-bg-dark: #2c304d;
    --status-cho-vbc-text-dark: #b3bcf5;
    --status-default-bg-dark: #37474f;
    --status-default-text-dark: #b0bec5;

    /* === BÓNG ĐỔ & HIỆU ỨNG === */
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    --shadow-glow-light: 0 0 0 4px rgb(79 70 229 / 0.1);
    --shadow-glow-dark: 0 0 0 4px rgb(20 184 166 / 0.2);

    /* === TỐC ĐỘ CHUYỂN ĐỘNG === */
    --transition-fast: 0.2s;
    --transition-medium: 0.3s;
    --transition-slow: 0.5s;
}

        /* === THIẾT LẬP CƠ BẢN & THANH CUỘN === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background: var(--background-light);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition-medium) ease, color var(--transition-medium) ease;
        }
        body.dark-mode {
    background: var(--background-dark);
    color: var(--text-dark);

    /* === MÀU CHỮ CHO NGOẠI THẤT (DARK MODE) === */
    --exterior-orange-text: #f5b041;
    --exterior-blue-text: #5dade2;
    --exterior-yellow-text: #f4d03f;
    --exterior-pink-text: #e573e0;
    --exterior-green-text: #2ecc71;
    --exterior-grey-text: #bdc3c7;
    --exterior-white-text: #ecf0f1;
    --exterior-red-text: #e74c3c;
    --exterior-bronze-text: #c5a37f;
}

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 4px;
            transition: background var(--transition-medium) ease;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted-light); }
        body.dark-mode ::-webkit-scrollbar-thumb { background: var(--border-dark); }
        body.dark-mode ::-webkit-scrollbar-thumb:hover { background: var(--text-muted-dark); }
        
        /* === HEADER & FOOTER - ĐỒNG BỘ VỚI INDEX === */
    
       /* === NAVBAR (HEADER) ĐỒNG BỘ === */
.navbar {
    position: fixed;
    top: 0;
    width: 100%; /* Sẽ được điều chỉnh bởi JS */
    height: 50px;
    background-color: rgba(255, 255, 255, 0.75);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    padding: 0 20px;
    z-index: 1000;
    box-shadow: var(--shadow-sm);
    border-bottom: 1px solid var(--border-light);
    transition: all var(--transition-medium) ease;
    display: flex;
    align-items: center;
    gap: 10px;
}
body.dark-mode .navbar {
    background-color: rgba(30, 30, 30, 0.75);
    border-color: var(--border-dark);
}

.navbar .logo-title {
    font-size: 16px;          /* Trả lại kích thước to hơn một chút */
    font-weight: 700;         /* Đậm hơn cho rõ ràng */
    color: var(--text-light); /* Màu chữ chính */

    /* Căn giữa tuyệt đối cho đẹp */
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
}

body.dark-mode .navbar .logo-title {
    color: var(--text-dark); /* Màu chữ chính cho dark mode */
}

/* Ẩn tiêu đề trên màn hình quá nhỏ để nhường chỗ cho nút */
@media (max-width: 420px) {
    .navbar .logo-title {
        display: none;
    }
}

.navbar .tabs {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
}
.navbar .tabs::-webkit-scrollbar { display: none; }
.navbar .tabs a {
    padding: 8px 12px;
    text-decoration: none;
    color: var(--text-muted-light);
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    transition: all var(--transition-fast) ease-out;
    white-space: nowrap;
    position: relative;
}
.navbar .tabs a:hover {
    color: var(--text-light);
    background: var(--background-light);
}
.navbar .tabs a.active {
    background: var(--gradient);
    color: white;
    box-shadow: var(--shadow-md);
}
body.dark-mode .navbar .tabs a { color: var(--text-muted-dark); }
body.dark-mode .navbar .tabs a:hover {
    color: var(--text-dark);
    background: var(--background-dark);
}
body.dark-mode .navbar .tabs a.active { color: white; }

.navbar-controls { display: flex; align-items: center; gap: 10px; }
.nav-btn, .theme-toggle-btn {
    border: none;
    border-radius: 50%;
    background: var(--card-bg-light);
    color: var(--text-muted-light);
    transition: all var(--transition-medium) ease;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid var(--border-light);
    font-size: 16px;
}
.nav-btn:hover, .theme-toggle-btn:hover {
    color: var(--text-light);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}
body.dark-mode .nav-btn, body.dark-mode .theme-toggle-btn {
    background: var(--card-bg-dark);
    color: var(--text-muted-dark);
    border-color: var(--border-dark);
}
body.dark-mode .nav-btn:hover, body.dark-mode .theme-toggle-btn:hover {
    color: var(--text-dark);
}

/* === FOOTER ĐỒNG BỘ (ĐÃ CỐ ĐỊNH) === */
footer {
    position: fixed;
    bottom: 0;
    z-index: 998; /* Nằm dưới sidebar nhưng trên nội dung chính */

    /* Các thuộc tính cũ được giữ lại và thêm mới */
    padding: 10px 0; /* Giảm padding một chút cho gọn hơn */
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted-light);
    border-top: 1px solid var(--border-light);
    background: var(--background-light); /* Thêm nền để không bị trong suốt */

    /* Các thuộc tính sẽ được JS điều khiển */
    left: 220px; /* Vị trí mặc định */
    width: calc(100% - 220px); /* Chiều rộng mặc định */
    transition: all var(--transition-medium) ease; /* Thêm hiệu ứng chuyển động */
}

body.dark-mode footer {
    color: var(--text-muted-dark);
    border-top-color: var(--border-dark);
    background: var(--background-dark);
}

/* === CSS bổ sung cho nút menu mobile === */
.mobile-menu-btn {
    display: none; /* Hiển thị qua media query */
    background: var(--card-bg-light); color: var(--text-light); border: 1px solid var(--border-light);
    border-radius: 50%; width: 38px; height: 38px; font-size: 16px; cursor: pointer;
    box-shadow: var(--shadow-sm); align-items: center; justify-content: center; transition: all var(--transition-medium) ease;
}
body.dark-mode .mobile-menu-btn { background: var(--card-bg-dark); color: var(--text-dark); border-color: var(--border-dark); }

        /* === SIDEBAR - GIAO DIỆN MỚI, ĐỒNG BỘ VỚI INDEX === */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            height: 100vh;
            background-color: rgba(248, 249, 250, 0.75);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            padding: 15px;
            padding-top: 80px; 
            transition: width var(--transition-medium) ease, transform var(--transition-medium) ease, background-color var(--transition-medium) ease;
            z-index: 1000;
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed { width: 70px; }
        body.dark-mode .sidebar {
            background-color: rgba(30, 30, 30, 0.75);
            border-right: 1px solid var(--border-dark);
        }
        .sidebar .logo { text-align: center; margin-bottom: 30px; }
        .sidebar .logo h1 {
            font-size: 18px;
            font-weight: 800;
            background: var(--gradient);
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            transition: opacity var(--transition-medium) ease;
        }
        .sidebar.collapsed .logo h1 { opacity: 0; }
        .sidebar .menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }
        .sidebar .menu a {
            padding: 10px 12px;
            text-decoration: none;
            color: var(--text-muted-light);
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            transition: all var(--transition-fast) ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar .menu a i {
            font-size: 16px;
            width: 24px;
            text-align: center;
            transition: transform var(--transition-medium) ease;
        }
        .sidebar .menu a span {
            transition: opacity 0.2s ease, max-width var(--transition-medium) ease;
            white-space: nowrap;
            overflow: hidden;
            max-width: 100px;
        }
        .sidebar.collapsed .menu a { justify-content: center; }
        .sidebar.collapsed .menu a span { opacity: 0; max-width: 0; }
        .sidebar .menu a:hover {
            color: var(--text-light);
            background: var(--background-light);
        }
        body.dark-mode .sidebar .menu a { color: var(--text-muted-dark); }
        body.dark-mode .sidebar .menu a:hover {
            color: var(--text-dark);
            background: var(--background-dark);
        }
        .sidebar .menu a.active {
            background: var(--gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }
        .sidebar .menu a.active i { transform: scale(1.1); }
        body.dark-mode .sidebar .menu a.active { color: white; }

        /* === NÚT TOGGLE SIDEBAR - ĐỒNG BỘ === */
        .toggle-btn {
            margin-top: auto; /* Đẩy nút xuống cuối */
            width: calc(100% - 10px);
            margin-left: 5px;
            height: 40px;
            background: var(--background-light);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-muted-light);
            font-size: 16px;
            cursor: pointer;
            transition: all var(--transition-medium) ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar.collapsed .toggle-btn { width: 40px; margin-left: 0;}
        .toggle-btn:hover {
            border-color: var(--gradient-start);
            color: var(--gradient-start);
            transform: scale(1.05);
        }
        body.dark-mode .toggle-btn {
            background: var(--background-dark);
            border-color: var(--border-dark);
            color: var(--text-muted-dark);
        }
         body.dark-mode .toggle-btn:hover {
            border-color: var(--gradient-end);
            color: var(--gradient-end);
        }
        .toggle-btn i { transition: transform var(--transition-slow) cubic-bezier(0.19, 1, 0.22, 1); }
        .sidebar.collapsed .toggle-btn i { transform: rotate(180deg); }

        /* === NÚT ĐIỀU KHIỂN HEADER - ĐỒNG BỘ === */
        .navbar-controls {
            position: fixed;
            top: 10px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 1001;
        }
        .nav-btn, .theme-toggle {
            border: none;
            border-radius: 50%;
            background: var(--card-bg-light);
            color: var(--text-muted-light);
            transition: all var(--transition-medium) ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border-light);
        }
        .nav-btn:hover, .theme-toggle:hover {
            color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        body.dark-mode .nav-btn, body.dark-mode .theme-toggle {
            background: var(--card-bg-dark);
            color: var(--text-muted-dark);
            border-color: var(--border-dark);
        }
        body.dark-mode .nav-btn:hover, body.dark-mode .theme-toggle:hover {
             color: var(--text-dark);
        }

        /* === NỘI DUNG CHÍNH (MAIN CONTENT) === */
        .main-content {
            margin-left: 220px;
            margin-top: 35px;
            margin-bottom: 30px;
            padding: 25px;
            transition: margin-left var(--transition-medium) ease;
        }
        .main-content.collapsed {
            margin-left: 70px;
        }

       /* === KHU VỰC BỘ LỌC (FILTER SECTION) - BỐ CỤC MỚI CÓ THỂ THU GỌN === */
        .filter-section {
            padding: 20px;
            margin-bottom: 25px;
            background: var(--card-bg-light);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: all var(--transition-medium) ease;
        }
        body.dark-mode .filter-section {
            background: var(--card-bg-dark);
            border-color: var(--border-dark);
        }

        .filter-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-container {
            flex: 1 1 300px; /* Linh hoạt co giãn, chiều rộng cơ bản 300px */
            position: relative;
        }
        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted-light);
        }
        body.dark-mode .search-container i {
            color: var(--text-muted-dark);
        }

        #search-input {
            width: 100%;
            padding: 10px 15px 10px 40px; /* Thêm padding trái cho icon */
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 14px;
            background: var(--background-light);
            color: var(--text-light);
            transition: all var(--transition-medium) ease;
        }
        body.dark-mode #search-input {
            background: var(--background-dark);
            color: var(--text-dark);
            border-color: var(--border-dark);
        }
        #search-input:focus {
            outline: none;
            border-color: var(--gradient-start);
            box-shadow: var(--shadow-glow-light);
        }
        body.dark-mode #search-input:focus {
            border-color: var(--gradient-end);
            box-shadow: var(--shadow-glow-dark);
        }

        .filter-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto; /* Đẩy nhóm này về bên phải */
        }
        
        .total-vehicles {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted-light);
            background-color: var(--background-light);
            border: 1px solid var(--border-light);
            padding: 8px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }
        body.dark-mode .total-vehicles {
            color: var(--text-muted-dark);
            background-color: var(--background-dark);
            border-color: var(--border-dark);
        }
        .total-vehicles strong {
            font-weight: 700;
            color: var(--text-light);
        }
        body.dark-mode .total-vehicles strong {
             color: var(--text-dark);
        }


        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            background-color: var(--card-bg-light);
            cursor: pointer;
            transition: all var(--transition-fast) ease;
            white-space: nowrap;
        }
        body.dark-mode .action-btn {
            background-color: var(--card-bg-dark);
            color: var(--text-dark);
            border-color: var(--border-dark);
        }
        .action-btn:hover {
            border-color: var(--gradient-start);
            color: var(--gradient-start);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        body.dark-mode .action-btn:hover {
            border-color: var(--gradient-end);
            color: var(--gradient-end);
        }
        .action-btn .btn-text {
            display: inline;
        }
        .action-btn i {
             transition: transform var(--transition-medium) ease;
        }
        .action-btn.toggle-filter-btn.active i {
            transform: rotate(180deg);
        }

        .collapsible-filters {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--transition-medium) ease-out;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding-top: 0;
            margin-top: 0;
            border-top: 1px solid transparent;
        }

        .collapsible-filters.open {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }
        body.dark-mode .collapsible-filters.open {
            border-top-color: var(--border-dark);
        }

        .collapsible-filters select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 14px;
            background: var(--background-light);
            color: var(--text-light);
            transition: all var(--transition-medium) ease;
             -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236c757d' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.7rem center;
            background-repeat: no-repeat;
            background-size: 1.2em 1.2em;
            padding-right: 2.5rem;
        }
        body.dark-mode .collapsible-filters select {
            background-color: var(--background-dark);
            color: var(--text-dark);
            border-color: var(--border-dark);
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23adb5bd' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        }
         .collapsible-filters select:focus {
            outline: none;
            border-color: var(--gradient-start);
            box-shadow: var(--shadow-glow-light);
        }
        body.dark-mode  .collapsible-filters select:focus {
            border-color: var(--gradient-end);

    <script>
        // --- KHAI BÁO BIẾN TOÀN CỤC ---
        let isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
        let tableData = [];
        let filteredData = [];
        let currentPage = 1;
        const rowsPerPage = 20; // Increased rows per page
        let sortColumn = 8;

        // --- CÁC HÀM XỬ LÝ GIAO DIỆN (SIDEBAR, THEME, v.v.) ---
        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const themeIcon = document.querySelector('.theme-toggle i');
            if (body.classList.contains('dark-mode')) {
                if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                if (themeIcon) themeIcon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleSidebarDesktop() {
            if (window.innerWidth > 900) {
                const sidebar = document.getElementById("sidebar");
                const mainContent = document.getElementById("main-content");
                sidebar.classList.toggle("collapsed");
                mainContent.classList.toggle("collapsed");
                localStorage.setItem('sidebarState', sidebar.classList.contains("collapsed") ? 'collapsed' : 'expanded');
            }
        }
        
        function toggleMobileSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
        }

        function setActiveSidebarLink() {
            document.querySelectorAll("#navMenu a").forEach(link => {
                link.classList.remove("active");
                if (link.getAttribute('href') === (window.location.pathname.split("/").pop() || "index.html")) {
                    link.classList.add("active");
                }
            });
        }
        
        function updateUIOnLoad() {
            // Theme
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                const themeIcon = document.querySelector('.theme-toggle i');
                if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
            // Sidebar state for desktop
            if (window.innerWidth > 900 && localStorage.getItem('sidebarState') === 'collapsed') {
                document.getElementById("sidebar").classList.add("collapsed");
                document.getElementById("main-content").classList.add("collapsed");
            }
            AOS.init({ duration: 600, once: true });
            setActiveSidebarLink();
        }

        // --- BỘ LỌC CÓ THỂ THU GỌN ---
        function setupCollapsibleFilters() {
            const toggleBtn = document.getElementById('toggle-filters-btn');
            const panel = document.getElementById('collapsible-filters-panel');

            if (toggleBtn && panel) {
                toggleBtn.addEventListener('click', () => {
                    toggleBtn.classList.toggle('active');
                    panel.classList.toggle('open');
                    if (panel.style.maxHeight) {
                        panel.style.maxHeight = null;
                    } else {
                        panel.style.maxHeight = panel.scrollHeight + "px";
                    }
                });
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            if (!isLoggedIn) {
                window.location.href = "index.html";
                return;
            }
            loadInitialData();
            setupSearch();
            setupCollapsibleFilters(); // Kích hoạt bộ lọc mới
            updateUIOnLoad();
            
            // Close mobile sidebar when clicking outside
            document.addEventListener('click', function(event) {
                const sidebar = document.getElementById('sidebar');
                const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
                if (window.innerWidth <= 900 && sidebar && sidebar.classList.contains('open')) {
                    if (!sidebar.contains(event.target) && (!mobileMenuBtn || !mobileMenuBtn.contains(event.target))) {
                        toggleMobileSidebar();
                    }
                }
            });
        });

        window.addEventListener('resize', debounce(() => {
            if (window.innerWidth > 900) {
                document.getElementById('sidebar').classList.remove('open');
                if (localStorage.getItem('sidebarState') === 'collapsed') {
                    document.getElementById("sidebar").classList.add("collapsed");
                    document.getElementById("main-content").classList.add("collapsed");
                } else {
                    document.getElementById("sidebar").classList.remove("collapsed");
                    document.getElementById("main-content").classList.remove("collapsed");
                }
            }
        }, 200));

    if (lowerExteriorValue.includes("iris berry (ce1x)")) return `color: var(--exterior-pink-text); ${specificFontWeight}`;

        function getStatusClassForKhoXe(statusText) {
            if (!statusText) return 'status-default';
            const lowerStatus = statusText.toLowerCase();
            if (lowerStatus.includes('sẵn sàng')) return 'status-san-sang';
            if (lowerStatus.includes('đã ghép')) return 'status-da-ghep';
            if (lowerStatus.includes('chưa ghép')) return 'status-chua-ghep';
            if (lowerStatus.includes('đã bán')) return 'status-da-ban';
            if (lowerStatus.includes('chờ vbc') || lowerStatus.includes('chờ vb c')) return 'status-cho-vbc';
            return 'status-default';
        }
        
        function showLoading() {
            document.getElementById("loading-overlay")?.classList.add("active");
        }

        function hideLoading() {
            document.getElementById("loading-overlay")?.classList.remove("active");
        }

        async function loadInitialData() {
            showLoading();
            const apiURL = "https://script.google.com/macros/s/AKfycbzvpU_xD38IiwMWgHdq6-pL7VwgsoaEnKek1JEXvtsiQig4tFZtp0N8ig-nCc3HZv7q2g/exec";
            try {
                const response = await axios.get(apiURL);
                if (!response.data || !Array.isArray(response.data.khoxe)) {
                    throw new Error("Dữ liệu không hợp lệ từ API");
                }
                tableData = response.data.khoxe.map(row => [
                    row["Dòng xe"] || "", row["Phiên bản"] || "", row["Ngoại thất"] || "",
                    row["Nội thất"] || "", row["VIN"] || "", row["Mã DMS"] || "",
                    row["Trạng thái"] || "",
                    row["Ngày nhập"] ? new Date(row["Ngày nhập"]).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' }) : ""
                ]);
                sessionStorage.setItem('KhoXe', JSON.stringify(tableData));
                applyFilters();
                populateFilters();
                showNewUnpairedCarSuggestions();
            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
                const tableBody = document.getElementById("table-body");
                if(tableBody) tableBody.innerHTML = `<tr class="table-placeholder"><td colspan="9">⚠️ Lỗi tải dữ liệu. Vui lòng thử lại.</td></tr>`;
            } finally {
                hideLoading();
            }
        }

        // === HÀM RENDER ĐÃ NÂNG CẤP VỚI GIAO DIỆN THẺ TỰ ĐỘNG ===
function renderTable() {
    const tbody = document.getElementById("table-body");
    if (!tbody) return;

    // Lấy dữ liệu cho trang hiện tại
    const paginatedData = filteredData.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

    // Kiểm tra kích thước màn hình
    const isMobileView = window.innerWidth <= 768;

    if (isMobileView) {
        // --- GIAO DIỆN THẺ (CARD VIEW) CHO DI ĐỘNG ---
        tbody.className = 'card-view-container'; // Áp dụng class để CSS hoạt động
        tbody.innerHTML = ""; 

        if (paginatedData.length === 0) {
            // Hiển thị thông báo khi không có dữ liệu
            const emptyCard = document.createElement('div');
            emptyCard.className = 'vehicle-card';
            emptyCard.innerHTML = 'Không tìm thấy xe nào.';
            tbody.appendChild(emptyCard);
        } else {
            paginatedData.forEach(row => {
                const card = document.createElement('div');
                card.className = 'vehicle-card';

                // Dữ liệu từ mảng `row`:
                // 0: Dòng xe, 1: Phiên bản, 2: Ngoại thất, 3: Nội thất,
                // 4: VIN, 5: Mã DMS, 6: Trạng thái, 7: Ngày nhập
                
                const carModel = `${row[0] || ''} ${row[1] || ''}`;
                const statusContent = row[6] || 'N/A';
                const exteriorContent = row[2] || 'N/A';

                card.innerHTML = `
                    <div class="card-header">
                        <span class="car-model">${carModel}</span>
                        <span class="status-badge ${getStatusClassForKhoXe(statusContent)}">${statusContent}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-row">
                            <span class="card-label">Ngoại thất</span>
                            <span class="card-value" style="${getExteriorColorStyle(exteriorContent)}">${exteriorContent}</span>
                        </div>
                        <div class="card-row">
                            <span class="card-label">Nội thất</span>
                            <span class="card-value">${row[3] || 'N/A'}</span>
                        </div>
                        <div class="card-row full-width">
                            <span class="card-label">Số VIN</span>
                            <span class="card-value">${row[4] || 'N/A'}</span>
                        </div>
                        <div class="card-row full-width">
                            <span class="card-label">Mã DMS</span>
                            <span class="card-value">${row[5] || 'N/A'}</span>
                        </div>
                         <div class="card-row full-width">
                            <span class="card-label">Ngày nhập kho</span>
                            <span class="card-value">${row[7] || 'N/A'}</span>
                        </div>
                    </div>
                `;
                tbody.appendChild(card);
            });
        }

    } else {
        // --- GIAO DIỆN BẢNG TRUYỀN THỐNG CHO DESKTOP ---
        tbody.className = ''; // Xóa class của card view
        
        // Cập nhật tiêu đề bảng với icon sắp xếp
        const headers = document.querySelectorAll("#data-table th");
        headers.forEach((th, index) => {
            th.innerHTML = th.textContent.replace(/▲|▼/g, '').trim();
            if (sortColumn === index) {
                th.innerHTML += ` <span style="font-size: 10px;">${sortDirection === 'asc' ? '▲' : '▼'}</span>`;
            }
        });
        
        tbody.innerHTML = ""; // Xóa nội dung cũ
        if (paginatedData.length === 0) {
            tbody.innerHTML = `<tr class="table-placeholder" style="display: table-row;"><td colspan="9">Không tìm thấy xe nào.</td></tr>`;
        } else {
            paginatedData.forEach((row, index) => {
                const tr = document.createElement("tr");
                tr.style.display = 'table-row';

                let cellHtml = `<td>${(currentPage - 1) * rowsPerPage + index + 1}</td>`;
                row.forEach((cellData, cellIndex) => {
                    let content = cellData || 'N/A';
                    if (cellIndex === 2) { // Ngoại thất
                        content = `<span style="${getExteriorColorStyle(content)}">${content}</span>`;
                    } else if (cellIndex === 6) { // Trạng thái
                        content = `<span class="status-badge ${getStatusClassForKhoXe(content)}">${content}</span>`;
                    }
                    cellHtml += `<td>${content}</td>`;
                });
                tr.innerHTML = cellHtml;
                tbody.appendChild(tr);
            });
        }
    }

    // Cập nhật phân trang và tổng số xe (dùng chung cho cả 2 giao diện)
    updatePagination();
    updateTotalVehicles();
}
        
        function sortTable(columnIndex) {
            sortDirection = sortColumn === columnIndex && sortDirection === 'asc' ? 'desc' : 'asc';
            sortColumn = columnIndex;
            performSort();
            currentPage = 1;
            renderTable();
        }

        function performSort() {
             filteredData.sort((a, b) => {
                let valA = a[sortColumn - 1] || '';
                let valB = b[sortColumn - 1] || '';
                if(sortColumn === 0) { // STT
                     valA = filteredData.indexOf(a);
                     valB = filteredData.indexOf(b);
                }
                if (sortColumn === 8) { // Date sorting
                    const parseDate = str => str ? new Date(str.split('/').reverse().join('-')) : new Date(0);
                    valA = parseDate(a[7]);
                    valB = parseDate(b[7]);
                }
                let comparison = valA > valB ? 1 : (valA < valB ? -1 : 0);
                return sortDirection === 'asc' ? comparison : -comparison;
            });
        }
        
        function applyFilters() {
            const filters = {
                search: document.getElementById("search-input")?.value.trim().toLowerCase() || "",
                line: document.getElementById("filter-line")?.value || "",
                version: document.getElementById("filter-version")?.value || "",
                exterior: document.getElementById("filter-exterior")?.value || "",
                status: document.getElementById("filter-status")?.value || ""
            };
            filteredData = tableData.filter(row => 
                (filters.line === "" || row[0] === filters.line) &&
                (filters.version === "" || row[1] === filters.version) &&
                (filters.exterior === "" || row[2] === filters.exterior) &&
                (filters.status === "" || row[6] === filters.status) &&
                (filters.search === "" || row.some(cell => cell.toString().toLowerCase().includes(filters.search)))
            );
            performSort();
            currentPage = 1;
            renderTable();
        }

        function populateFilters() {
    // TẠO BẢN ĐỒ DỊCH: Ánh xạ từ khóa Tiếng Anh sang Tiếng Việt
    const translationMap = {
        line: "dòng xe",
        version: "phiên bản",
        exterior: "ngoại thất",
        status: "trạng thái"
    };

    const selects = {
        line: document.getElementById("filter-line"),
        version: document.getElementById("filter-version"),
        exterior: document.getElementById("filter-exterior"),
        status: document.getElementById("filter-status")
    };
    
    const uniqueValues = {
        line: [...new Set(tableData.map(row => row[0]))].filter(Boolean).sort(),
        version: [...new Set(tableData.map(row => row[1]))].filter(Boolean).sort(),
        exterior: [...new Set(tableData.map(row => row[2]))].filter(Boolean).sort(),
        status: [...new Set(tableData.map(row => row[6]))].filter(Boolean).sort()
    };

    for (const key in selects) {
        if (selects[key]) {
            const currentVal = selects[key].value;
            // SỬA LỖI: Sử dụng translationMap để lấy đúng tên Tiếng Việt
            const translatedKey = translationMap[key] || key;
            selects[key].innerHTML = `<option value="">Tất cả ${translatedKey}</option>` +
                uniqueValues[key].map(val => `<option value="${val}" ${val === currentVal ? 'selected' : ''}>${val}</option>`).join('');
        }
    }
}
        
        function updatePagination() {
            const pageInfo = document.getElementById("page-info");
            const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
            pageInfo.textContent = `Trang ${currentPage} / ${totalPages}`;
            document.getElementById("prev-btn").disabled = currentPage === 1;
            document.getElementById("next-btn").disabled = currentPage === totalPages;
        }

        function updateTotalVehicles() {
            const totalEl = document.getElementById("total-vehicles");
            if (totalEl) {
                totalEl.innerHTML = `Tổng: <strong>${filteredData.length}</strong>`;
            }
        }
        
        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        async function refreshData() {
            ['search-input', 'filter-line', 'filter-version', 'filter-exterior', 'filter-status'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = "";
            });
            currentPage = 1;
            sortColumn = 8;
            sortDirection = 'desc';
            await loadInitialData(); 
        }

        // --- UTILITY & NAVIGATION ---
        function debounce(func, wait) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => func.apply(this, a), wait) } }
        function goBack() { window.location.href = "index.html"; }
        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }
        function setupSearch() {
            document.getElementById("search-input")?.addEventListener("input", debounce(applyFilters, 300));
        }
        
        // --- MODAL & AI CHAT ---
        function showNewUnpairedCarSuggestions() {
             const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
             const newCars = tableData.filter(row => {
                const status = (row[6] || "").toLowerCase();
                const dateAdded = row[7] ? new Date(row[7].split('/').reverse().join('-')) : null;
                return dateAdded && dateAdded >= sevenDaysAgo && status.includes("sẵn sàng");
            });
            const modal = document.getElementById('suggestionModal');
            if (newCars.length > 0 && modal) {
                document.getElementById('suggestionList').innerHTML = newCars.slice(0, 5).map(car => `
                    <div class="suggestion-item">
                        <div><strong>Dòng xe:</strong><span>${car[0]}</span></div>
                        <div><strong>Ngoại thất:</strong><span style="${getExteriorColorStyle(car[2])}">${car[2]}</span></div>
                        <div><strong>VIN:</strong><span>${car[4]}</span></div>
                    </div>`).join('');
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('show'), 10);
            }
        }
        function closeSuggestionModal() {
            const modal = document.getElementById('suggestionModal');
            if (modal) {
                modal.classList.remove('show');
                setTimeout(() => modal.style.display = 'none', 300);
            }
        }
        
        const chatToggleButton = document.getElementById('ai-chat-toggle');
        const chatWindow = document.getElementById('ai-chat-window');
        const chatCloseButton = document.getElementById('ai-chat-close');
        const chatSendButton = document.getElementById('ai-chat-send');
        const chatInput = document.getElementById('ai-chat-input');
        
        if (chatToggleButton) chatToggleButton.addEventListener('click', () => chatWindow.classList.toggle('visible'));
        if (chatCloseButton) chatCloseButton.addEventListener('click', () => chatWindow.classList.remove('visible'));
        if (chatSendButton) chatSendButton.addEventListener('click', () => sendGlobalAIChatMessage());
        if (chatInput) chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) {e.preventDefault(); sendGlobalAIChatMessage()}; });
        
        function sendGlobalAIChatMessage(){ /* Logic for AI chat would go here */ }
        function exportToExcel() { /* Logic for excel export */ }
        function printTable() { /* Logic for printing */ }
    </script>
