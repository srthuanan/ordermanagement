    return matched;
  }

  advisorInput.addEventListener("blur", validateAdvisorInput);
  advisorInput.addEventListener("input", validateAdvisorInput);
});

      if (!matched && value !== "") {
        advisorWarning.classList.remove("opacity-0");

<script>
    let formData = {};
    let orderId = "";

    const labelMap = {
      ten_ban_hang: "Tên tư vấn bán hàng",
      ten_khach_hang: "Tên khách hàng",
      dong_xe: "Dòng xe",
      phien_ban: "Phiên bản",
      ngoai_that: "Ngoại thất",
      noi_that: "Nội thất",
      so_don_hang: "Số đơn hàng",
      ngay_coc: "Ngày cọc"
    };

    function formatDateTime(dtString) {
      const d = new Date(dtString);
      return d.toLocaleString("vi-VN", { dateStyle: "full", timeStyle: "short" });
    }

    
    const validAdvisors = ["Trần Thị Nguyệt Bạch", "Bùi Anh Tài", "Lê Quốc Thịnh", "Lê Mai Anh", "Võ Minh Tuấn", "Lương Thế Ngọc", "Thành Ngọc Vinh", "Nguyễn Thiện Thảo", "Nguyễn Anh Tuấn", "Đinh Trọng Nhân", "Nguyễn Trần Hoàng Thanh", "Nguyễn Hoàng Phúc", "Trần Danh Phương", "Phạm Thành Nhân", "Nguyễn Hoàng Thạch", "Tất Bách Tường", "Vũ Thị Trang", "Phạm Trọng Huy"]; // <-- bạn có thể thay danh sách này

    function previewForm(e) {
      const advisorInput = document.querySelector('input[name="ten_ban_hang"]');
      const advisorName = advisorInput.value.trim().toLowerCase();
      const matched = validAdvisors.some(n => n.toLowerCase() === advisorName);

      if (!matched) {
        alert("⚠️ Vui lòng nhập đúng tên Tư Vấn Bán Hàng đã đăng ký để hệ thống ghi nhận yêu cầu.");
        advisorInput.focus();
        return;
      }

      e.preventDefault();
      const form = document.getElementById("vinfast-form");
      const inputs = form.querySelectorAll("input");
      formData = {}; orderId = "";
      let html = "";

      inputs.forEach(input => {
        if (input.name) {
          formData[input.name] = input.value;
          if (input.name === "so_don_hang") orderId = input.value;
          const label = labelMap[input.name] || input.name;
          const value = input.type === "datetime-local" ? formatDateTime(input.value) : input.value;
          html += `<div class='border-b border-white/20 pb-2'><span class='text-cyan-400 font-semibold'>${label}:</span> ${value || "<i>Chưa nhập</i>"}</div>`;
        }
      });

      document.getElementById("preview-content").innerHTML = html;
      document.getElementById("preview-modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("preview-modal").classList.add("hidden");
    }

    function confirmSubmit() {
      closeModal();
      document.getElementById("loading").classList.remove("hidden");

      if (formData["ngay_coc"]) {
        formData["ngay_coc"] = new Date(formData["ngay_coc"]).toISOString();
      }
      formData["thoi_gian_nhap"] = new Date().toISOString();

      fetch("https://script.google.com/macros/s/AKfycbxC8MGkO4dWYNhg4GYDWs_uPr_DFuqhLjztrXpzgvYhdINHF1Rxwpx7vZHoixd3nOmZ6w/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      }).then(() => {
        document.getElementById("loading").classList.add("hidden");

        const snackbar = document.getElementById("snackbar");
        snackbar.innerHTML = `<div class="flex items-center gap-3 justify-center">
          <lottie-player src='https://assets10.lottiefiles.com/packages/lf20_jbrw3hcz.json' background="transparent" speed="1" style="width: 40px; height: 40px;" loop autoplay></lottie-player>
          
<lottie-player src='https://assets10.lottiefiles.com/packages/lf20_oGlWy5.json' background="transparent" speed="1" style="width: 60px; height: 60px;" autoplay></lottie-player>
<div class='text-left'>
            <div class='text-white font-semibold'>🚀 Hệ thống đã ghi nhận yêu cầu ghép xe!</div>
            <div class='text-sm text-white/80'>Mã đơn hàng: <strong>${orderId || "Không rõ"}</strong></div>
          </div>
        </div>`;
        snackbar.classList.remove("hidden");
        snackbar.style.opacity = 1;

        setTimeout(() => {
          snackbar.style.opacity = 0;
          setTimeout(() => {
            snackbar.classList.add("hidden");
          }, 500);
          document.getElementById("vinfast-form").reset();
        }, 4000);
      });
    }

<script>
const historyURL = "https://script.google.com/macros/s/AKfycbxgsToUHNrfRHQJFq36DjDwXLWrVnMO1IH23LuMmbiAghczh74pHL5_zusgsR7SOhQEqw/exec";

function fetchHistory() {
  fetch(historyURL)
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("history-table");
      if (!data.length) {
        table.innerHTML = "<div class='text-red-300'>❌ Không có dữ liệu lịch sử.</div>";
        return;
      }

      let headers = Object.keys(data[0]);
      let html = `<table class="table-auto w-full text-left border-collapse">
        <thead class="sticky top-0 bg-slate-800 z-10"><tr>${headers.map(h => `<th class="border-b p-2">${h}</th>`).join("")}</tr></thead>
        <tbody>${data.map(row =>
          `<tr>${headers.map(h => `<td class="border-b p-2">${row[h] || ""}</td>`).join("")}</tr>`
        ).join("")}</tbody>
      </table>`;
      table.innerHTML = html;
    })
    .catch(err => {
      document.getElementById("history-table").innerHTML = "<div class='text-red-300'>⚠️ Lỗi khi tải dữ liệu.</div>";
      console.error(err);
    });
}


</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let historyData = [];

function renderHistory(data) {
  const table = document.getElementById("history-table");
  const total = document.getElementById("total-count");
  if (!data.length) {
    table.innerHTML = "<div class='text-red-300'>❌ Không có dữ liệu phù hợp.</div>";
    total.innerText = "";
    return;
  }

  const headers = ["STT", ...Object.keys(data[0])];
  const html = `<table id="export-table" class="table-auto w-full text-left border-collapse">
    <thead class="sticky top-0 bg-slate-800 z-10"><tr>${headers.map(h => `<th class="border-b p-2">${h}</th>`).join("")}</tr></thead>
    <tbody>${data.map((row, i) =>
      `<tr><td class="border-b p-2">${i + 1}</td>${Object.keys(row).map(h => `<td class="border-b p-2">${row[h] || ""}</td>`).join("")}</tr>`
    ).join("")}</tbody>
  </table>`;
  table.innerHTML = html;
  total.innerText = `📊 Tổng số yêu cầu: ${data.length}`;
}

function filterHistory(keyword) {
  const lowerKeyword = keyword.toLowerCase();
  const filtered = historyData.filter(row =>
    Object.values(row).some(val => (val || "").toString().toLowerCase().includes(lowerKeyword))
  );
  renderHistory(filtered);
}

function exportToExcel() {
  const table = document.getElementById("export-table");
  const wb = XLSX.utils.table_to_book(table, { sheet: "Lịch sử ghép xe" });
  XLSX.writeFile(wb, "lich_su_ghep_xe.xlsx");
}

function fetchHistory() {
  fetch("https://script.google.com/macros/s/AKfycbxgsToUHNrfRHQJFq36DjDwXLWrVnMO1IH23LuMmbiAghczh74pHL5_zusgsR7SOhQEqw/exec")
    .then(res => res.json())
    .then(data => {
      historyData = data;
      renderHistory(historyData);
    })
    .catch(err => {
      const table = document.getElementById("history-table");
      if (table) table.innerHTML = "<div class='text-red-300'>⚠️ Lỗi khi tải dữ liệu.</div>";
    });
}

document.addEventListener("DOMContentLoaded", fetchHistory);
</script>
