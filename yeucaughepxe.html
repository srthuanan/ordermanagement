<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập Liệu Ghép Xe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            margin-right: 30px;
        }

        .form-container h2 {
            font-size: 28px;
            color: #007BFF;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-item {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 14px;
            width: 100%;
            background-color: #f9f9f9;
            color: #333;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #007BFF;
            outline: none;
        }

        .btn-submit {
            background: #007BFF;
            color: white;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            width: 100%;
            transition: background 0.3s ease;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: #0056b3;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: rgba(0, 51, 102, 0.9);
            color: white;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, bottom 0.3s ease-in-out;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                align-items: center;
            }

            .form-container {
                width: 90%;
            }

            .form-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Nhập Liệu Ghép Xe</h2>
        <form id="ghex-form" onsubmit="submitForm(event)">
            <div class="form-group">
                <div class="form-item">
                    <label>📌 Tư Vấn BH</label>
                    <select name="ten_ban_hang" required>
                        <option value="">Chọn Tư Vấn BH</option>
                        <option value="Đinh Trọng Nhân">Đinh Trọng Nhân</option>
                        <option value="Lê Mai Anh">Lê Mai Anh</option>
                        <option value="Lê Quốc Thịnh">Lê Quốc Thịnh</option>
                        <option value="Phạm Thành Nhân">Phạm Thành Nhân</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>👤 Tên Khách Hàng</label>
                    <input type="text" name="ten_khach_hang" required>
                </div>
            </div>

            <div class="form-group">
                <div class="form-item">
                    <label>🚗 Dòng Xe</label>
                    <select name="dong_xe" required>
                        <option value="">Chọn Dòng Xe</option>
                        <option value="VF5">VF5</option>
                        <option value="VF6">VF6</option>
                        <option value="VF7">VF7</option>
                        <option value="VF8">VF8</option>
                        <option value="VF9">VF9</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>🏷️ Phiên Bản</label>
                    <select name="phien_ban" required>
                        <option value="">Chọn Phiên Bản</option>
                        <option value="BASE">BASE</option>
                        <option value="Plus">Plus</option>
                        <option value="ECO">ECO</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="form-item">
                    <label>🎨 Ngoại Thất</label>
                    <select name="ngoai_that" required>
                        <option value="">Chọn Màu Ngoại Thất</option>
                        <option value="Roof Jet black - Neptune Grey">Roof Jet black - Neptune Grey</option>
                        <option value="Roof Jet Black - Sunset Orange">Roof Jet Black - Sunset Orange</option>
                        <option value="Infinity Blanc - Silky White">Infinity Blanc - Silky White</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>🎨 Nội Thất</label>
                    <select name="noi_that" required>
                        <option value="">Chọn Màu Nội Thất</option>
                        <option value="CI11_BLACK">CI11_BLACK</option>
                        <option value="CI12_BROWN">CI12_BROWN</option>
                        <option value="CI13_BEIGE">CI13_BEIGE</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="form-item">
                    <label>📌 Số Đơn Hàng</label>
                    <input type="text" name="so_don_hang" required>
                </div>
                <div class="form-item">
                    <label>📅 Thời Gian Cọc</label>
                    <input type="datetime-local" name="ngay_coc" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">TẠO YÊU CẦU</button>
        </form>
    </div>

    <div id="toast" class="toast">✅ Đơn hàng đã được thêm thành công!</div>
<script>
  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2500);
  }

async function sendDataToGoogleSheet(data) {
  try {
    await fetch("https://script.google.com/macros/s/AKfycbz7qfcp-3_2Yd8aqajUOZxmkEGTGB4EYOd5MPyhJgSKZ9uyGzbDW9iZaMCXqWjaG1u7Aw/exec", {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    showToast("✅ Đã gửi yêu cầu! (không chờ phản hồi)");
  } catch (error) {
    console.error(error);
    showToast("❌ Không thể gửi yêu cầu.");
  }
}


  function submitForm(event) {
    event.preventDefault();

    const form = new FormData(event.target);
    const data = Object.fromEntries(form.entries());

    const depositDate = new Date(data.ngay_coc);
    data.ngay_coc = depositDate.toISOString(); // Gửi chuẩn ISO
    data.thoi_gian_nhap = new Date().toISOString();

    sendDataToGoogleSheet(data);
    event.target.reset();
  }
</script>

</body>
</html>
