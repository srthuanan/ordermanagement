function showRowModal(data) {
  const modal = document.getElementById("row-modal");
  const content = document.getElementById("row-modal-content");
  content.innerHTML = Object.entries(data).map(([k, v]) =>
    `<div><strong>${k}:</strong> ${v || "<i>Không có</i>"}</div>`
  ).join("");
  modal.classList.remove("hidden");
  window._modalData = content;
}

function closeRowModal() {
  document.getElementById("row-modal").classList.add("hidden");
}


async 
async function captureRow() {
  const contentElement = document.getElementById("row-modal-content");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const canvas = await html2canvas(contentElement);
  const imgData = canvas.toDataURL("image/png");
  const imgProps = doc.getImageProperties(imgData);
  const pdfWidth = doc.internal.pageSize.getWidth();
  const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

  doc.addImage(imgData, "PNG", 0, 10, pdfWidth, pdfHeight);
  doc.save("chi_tiet_don.pdf");
}



</script>

<script>
    let formData = {};
    let orderId = "";

    const labelMap = {
      ten_ban_hang: "Tên tư vấn bán hàng",
      ten_khach_hang: "Tên khách hàng",
      dong_xe: "Dòng xe",
      phien_ban: "Phiên bản",
      ngoai_that: "Ngoại thất",
      noi_that: "Nội thất",
      so_don_hang: "Số đơn hàng",
      ngay_coc: "Ngày cọc"
    };

    function formatDateTime(dtString) {
      const d = new Date(dtString);
      return d.toLocaleString("vi-VN", { dateStyle: "full", timeStyle: "short" });
    }

    
    const validAdvisors = ["Trần Thị Nguyệt Bạch", "Bùi Anh Tài", "Lê Quốc Thịnh", "Lê Mai Anh", "Võ Minh Tuấn", "Lương Thế Ngọc", "Thành Ngọc Vinh", "Nguyễn Thiện Thảo", "Nguyễn Anh Tuấn", "Đinh Trọng Nhân", "Nguyễn Trần Hoàng Thanh", "Nguyễn Hoàng Phúc", "Trần Danh Phương", "Phạm Thành Nhân", "Nguyễn Hoàng Thạch", "Tất Bách Tường", "Vũ Thị Trang", "Phạm Trọng Huy"]; // <-- bạn có thể thay danh sách này

    function previewForm(e) {
      const advisorInput = document.querySelector('input[name="ten_ban_hang"]');
      const advisorName = advisorInput.value.trim().toLowerCase();
      const matched = validAdvisors.some(n => n.toLowerCase() === advisorName);

      if (!matched) {
        alert("⚠️ Vui lòng nhập đúng tên Tư Vấn Bán Hàng đã đăng ký để hệ thống ghi nhận yêu cầu.");
        advisorInput.focus();
        return;
      }

      e.preventDefault();
      const form = document.getElementById("vinfast-form");
      const inputs = form.querySelectorAll("input");
      formData = {}; orderId = "";
      let html = "";

      inputs.forEach(input => {
        if (input.name) {
          formData[input.name] = input.value;
          if (input.name === "so_don_hang") orderId = input.value;
          const label = labelMap[input.name] || input.name;
          const value = input.type === "datetime-local" ? formatDateTime(input.value) : input.value;
          html += `<div class='border-b border-white/20 pb-2'><span class='text-cyan-400 font-semibold'>${label}:</span> ${value || "<i>Chưa nhập</i>"}</div>`;
        }
      });

      document.getElementById("preview-content").innerHTML = html;
      document.getElementById("preview-modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("preview-modal").classList.add("hidden");
    }

    function confirmSubmit() {
      closeModal();
      document.getElementById("loading").classList.remove("hidden");

      if (formData["ngay_coc"]) {
        formData["ngay_coc"] = new Date(formData["ngay_coc"]).toISOString();
      }
      formData["thoi_gian_nhap"] = new Date().toISOString();

      fetch("https://script.google.com/macros/s/AKfycbxC8MGkO4dWYNhg4GYDWs_uPr_DFuqhLjztrXpzgvYhdINHF1Rxwpx7vZHoixd3nOmZ6w/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      }).then(() => {
        document.getElementById("loading").classList.add("hidden");

        const snackbar = document.getElementById("snackbar");
        
snackbar.innerHTML = `
  <div class="flex flex-col items-center gap-2">
    <lottie-player src='https://assets10.lottiefiles.com/packages/lf20_jbrw3hcz.json' background="transparent" speed="1" style="width: 60px; height: 60px;" autoplay></lottie-player>
    <div class="text-xl font-bold tracking-wide text-sky-700">🚀 HỆ THỐNG ĐÃ GHI NHẬN YÊU CẦU GHÉP XE CỦA BẠN</div>
    <div class="text-sm text-sky-600">Chúng tôi sẽ xử lý và liên hệ bạn sớm nhất</div>
  </div>`;

        snackbar.classList.remove("hidden");
        snackbar.style.opacity = 1;

        setTimeout(() => {
          snackbar.style.opacity = 0;
          setTimeout(() => {
            snackbar.classList.add("hidden");
          }, 500);
          document.getElementById("vinfast-form").reset();
        }, 4000);
      });
    }

<script>
const historyURL = "https://script.google.com/macros/s/AKfycbxgsToUHNrfRHQJFq36DjDwXLWrVnMO1IH23LuMmbiAghczh74pHL5_zusgsR7SOhQEqw/exec";
let historyData = [];

function fetchHistory() {
  document.getElementById("history-loading").classList.remove("hidden");
  fetch(historyURL)
    .then(res => res.text())
    .then(txt => {
      try {
        const json = JSON.parse(txt);
        historyData = json;
        renderHistory(json);
        document.getElementById('history-loading').classList.add('hidden');
      } catch (err) {
        console.error("❌ JSON parse error:", err);
        document.getElementById("history-loading").classList.add("hidden");
        document.getElementById("history-table").innerHTML = "<div class='text-red-500 p-4'>⚠️ Không đọc được dữ liệu từ Google Sheet.</div>";
      }
    })
    .catch(err => {
      console.error("❌ Fetch failed:", err);
      document.getElementById("history-loading").classList.add("hidden");
        document.getElementById("history-table").innerHTML = "<div class='text-red-500 p-4'>⚠️ Không thể kết nối đến API.</div>";
    });
}

function renderHistory(data) {
  const table = document.getElementById("history-table");
  if (!data.length) {
    table.innerHTML = "<div class='text-red-400 p-4'>❌ Không có dữ liệu.</div>";
    return;
  }

  const headers = ["STT", ...Object.keys(data[0])];
  let html = "<table class='w-full border-collapse text-gray-800 table-auto'><thead><tr>" +
    headers.map((h, i) => `<th class='p-2 border-b border-sky-200 text-base font-bold text-left sticky top-0 bg-sky-100 z-10'>${h}</th>
`).join("") +
    "</tr></thead><tbody>" +
    data.map((row, i) => {
      const rowHtml = headers.map((h, idx) =>
        `<td class='p-2 border-b border-gray-100 break-words max-w-[180px]'>${idx === 0 ? i + 1 : (row[h] || "")}</td>`
      ).join("");
      return `<tr class='hover:bg-sky-50 cursor-pointer' onclick='showRowModal(historyData[${i}])'>${rowHtml}</tr>`;
    }).join("") +
    "</tbody></table>";

  table.innerHTML = html;
  
  document.getElementById("total-count").textContent = "Tổng số dòng: " + data.length;
  document.getElementById("total-don-count").textContent = data.length;
}

function normalizeVN(str) {
  return str.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase();
}

function filterHistory() {
  const keyword = normalizeVN(document.getElementById("search-box").value);
  const filtered = historyData.filter(row =>
    Object.values(row).some(val => normalizeVN(String(val)).includes(keyword))
  );
  renderHistory(filtered);
}

  const byCar = {}, byAdvisor = {};

    const car = row["Dòng xe"];

    if (car) byCar[car] = (byCar[car] || 0) + 1;

  });

  new Chart(document.getElementById("chart-by-car"), {

      labels: Object.keys(byCar),

  new Chart(document.getElementById("chart-by-advisor"), {
    type: "bar",
    data: {
      labels: Object.keys(byAdvisor),
      datasets: [{
        label: "Tư vấn viên",
        data: Object.values(byAdvisor),
        backgroundColor: "#34d399"
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } }
    }
  });
}

const originalRenderHistory = renderHistory;
renderHistory = function(data) {
  originalRenderHistory(data);
  renderCharts(data);
}

let trendChartInstance;

function filterByDate() {
  const from = new Date(document.getElementById('filter-from').value);
  const to = new Date(document.getElementById('filter-to').value);

  if (!from || !to || from > to) {
    alert("⚠️ Vui lòng chọn khoảng thời gian hợp lệ!");
    return;
  }

  const filtered = historyData.filter(row => {
    const date = new Date(row["Ngày cọc"]);
    return !isNaN(date) && date >= from && date <= to;
  });

  renderTrendChart(filtered);
}

function renderTrendChart(data) {
  const trendData = {};

  data.forEach(row => {
    const date = new Date(row["Ngày cọc"]);
    if (isNaN(date)) return;
    const key = date.toISOString().slice(0, 10);
    trendData[key] = (trendData[key] || 0) + 1;
  });

  const labels = Object.keys(trendData).sort();
  const values = labels.map(key => trendData[key]);

  const ctx = document.getElementById("chart-trend").getContext("2d");
  if (trendChartInstance) trendChartInstance.destroy();

  trendChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Số lượng đơn theo ngày",
        data: values,
        borderColor: "#0ea5e9",
        backgroundColor: "rgba(14,165,233,0.2)",
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointHoverRadius: 5
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          title: { display: true, text: "Ngày", color: "#475569" },
          ticks: { color: "#475569" }
        },
        y: {
          title: { display: true, text: "Số đơn", color: "#475569" },
          ticks: { precision: 0, color: "#475569" },
          beginAtZero: true
        }
      },
      plugins: {
        legend: { labels: { color: "#475569" } }
      }
    }
  });
}


function renderCharts(data) {
  const chartContainer = document.getElementById("chart-loading");
  chartContainer.classList.remove("hidden");

  setTimeout(() => {
    const byCar = {}, byAdvisor = {};
    data.forEach(row => {
      const car = row["Dòng xe"];
      const advisor = row["Tên tư vấn bán hàng"];
      if (car) byCar[car] = (byCar[car] || 0) + 1;
      if (advisor) byAdvisor[advisor] = (byAdvisor[advisor] || 0) + 1;
    });

    new Chart(document.getElementById("chart-by-car"), {
      type: "pie",
      data: {
        labels: Object.keys(byCar),
        datasets: [{
          data: Object.values(byCar),
          label: "Dòng xe"
        }]
      },
      options: {
        plugins: {
          tooltip: {
            callbacks: {
              label: ctx => `📦 Số đơn: ${ctx.raw}`,
              title: ctx => `🚘 ${ctx[0].label}`
            }
          }
        }
      }
    });

    new Chart(document.getElementById("chart-by-advisor"), {
      type: "bar",
      data: {
        labels: Object.keys(byAdvisor),
        datasets: [{
          label: "Tư vấn viên",
          data: Object.values(byAdvisor),
          backgroundColor: "#34d399"
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `📦 Số đơn: ${ctx.raw}`,
              title: ctx => `🧑‍💼 ${ctx[0].label}`
            }
          }
        }
      }
    });

    chartContainer.classList.add("hidden");
  }, 300);
}
