<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yêu Cầu Ghép Xe</title>
</head>
<body>
  <h2>Yêu Cầu Ghép Xe</h2>

  <form id="requestForm">
    <label for="ten_ban_hang">Tên Bán Hàng:</label>
    <input type="text" id="ten_ban_hang" name="ten_ban_hang" required><br><br>

    <label for="dong_xe">Dòng Xe:</label>
    <input type="text" id="dong_xe" name="dong_xe" required><br><br>

    <label for="phien_ban">Phiên Bản:</label>
    <input type="text" id="phien_ban" name="phien_ban" required><br><br>

    <label for="ngoai_that">Ngoại Thất:</label>
    <input type="text" id="ngoai_that" name="ngoai_that" required><br><br>

    <label for="noi_that">Nội Thất:</label>
    <input type="text" id="noi_that" name="noi_that" required><br><br>

    <label for="so_don_hang">Số Đơn Hàng:</label>
    <input type="text" id="so_don_hang" name="so_don_hang" required><br><br>

    <label for="ten_khach_hang">Tên Khách Hàng:</label>
    <input type="text" id="ten_khach_hang" name="ten_khach_hang" required><br><br>

    <label for="ngay_coc">Ngày Cọc:</label>
    <input type="date" id="ngay_coc" name="ngay_coc" required><br><br>

    <label for="thoi_gian_nhap">Thời Gian Nhập:</label>
    <input type="datetime-local" id="thoi_gian_nhap" name="thoi_gian_nhap" required><br><br>

    <button type="submit">Gửi Yêu Cầu</button>
  </form>

  <script>
    document.getElementById('requestForm').addEventListener('submit', function(event) {
      event.preventDefault();

      // Get form data
      var formData = new FormData(this);
      var data = {};

      formData.forEach((value, key) => {
        data[key] = value;
      });

      // Send the data to the Google Apps Script via POST request
      fetch('https://script.google.com/macros/s/AKfycbwIgGITu2Shfdy75er20z_JAXe1M7leSyI45yQw3KZ-DXyMgCvWMRkONKcLXoDtLfsn/exec', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
      })
      .then(response => response.text())
      .then(result => {
        alert('Dữ liệu đã được gửi thành công!');
        console.log(result);
      })
      .catch(error => {
        alert('Có lỗi xảy ra. Vui lòng thử lại!');
        console.error(error);
      });
    });
  </script>
</body>
</html>
