<!-- Thêm thông báo nổi -->
<div id="toast" class="toast">✅ Đơn hàng đã được thêm thành công!</div>

<style>
/* Toast notification */
.toast {
    visibility: hidden;
    min-width: 250px;
    background-color: rgba(0, 51, 102, 0.9);
    color: white;
    text-align: center;
    border-radius: 8px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease-in-out, bottom 0.3s ease-in-out;
}

.toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}

</style>
    <script>
 if (sessionStorage.getItem('loggedIn') !== 'true') {
        window.location.href = "dang-nhap.html";
    }
document.addEventListener("DOMContentLoaded", function () {
    loadData(); // Tải dữ liệu từ localStorage khi trang mở lại
});

// Hiển thị thông báo nhẹ nhàng
function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);
}

// Kiểm tra số đơn hàng có trùng không
function isDuplicateOrder(orderNumber) {
    const storedData = JSON.parse(localStorage.getItem("orders")) || [];
    return storedData.some(order => order.so_don_hang === orderNumber);
}

// Xử lý nhập liệu
function submitForm(event) {
    event.preventDefault();
    const form = new FormData(event.target);
    const data = Object.fromEntries(form.entries());

    if (!validateForm(data)) return;

    // Kiểm tra số đơn hàng trùng lặp
    if (isDuplicateOrder(data.so_don_hang)) {
        showToast("⚠️ Số đơn hàng đã tồn tại!");
        return;
    }

    // Ghi nhận thời gian nhập liệu
    data.thoi_gian_nhap = new Date().toLocaleString();

    // Lưu vào LocalStorage
    const storedData = JSON.parse(localStorage.getItem("orders")) || [];
    storedData.unshift(data);
    localStorage.setItem("orders", JSON.stringify(storedData));

    // Thêm vào bảng hiển thị
    addRowToTable(data, true);

    // Reset form
    event.target.reset();
    showToast("✅ Đơn hàng đã được thêm!");

    // Gửi dữ liệu lên Google Sheets (nếu cần)
    sendDataToGoogleSheet(data);
}

// Gửi dữ liệu lên Google Sheets
async function sendDataToGoogleSheet(data) {
    try {
        await fetch("https://script.google.com/macros/s/AKfycbzi2O-yVJyp0gyWchknyN1FdHfcOSJt-tn3GH1w8MOQ0YFL8fBU-nwmTYLgWfbLuTobJQ/exec", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data),
            headers: { "Content-Type": "application/json" }
        });
        showToast("✅ Đơn hàng đã được gửi!");
    } catch (error) {
        showToast("❌ Lỗi khi gửi đơn hàng!");
        console.error(error);
    }
}

// Thêm hàng vào bảng
function addRowToTable(data, isNew = true) {
    const orderList = document.getElementById("order-list");
    const row = document.createElement("tr");

    Object.values(data).forEach(value => {
        const cell = document.createElement("td");
        cell.textContent = value;
        row.appendChild(cell);
    });

    // Thêm nút xóa đơn hàng
    const deleteCell = document.createElement("td");
    const deleteButton = document.createElement("button");
    deleteButton.textContent = "❌ Xóa";
    deleteButton.style.background = "red";
    deleteButton.style.color = "white";
    deleteButton.style.border = "none";
    deleteButton.style.padding = "5px 10px";
    deleteButton.style.borderRadius = "5px";
    deleteButton.style.cursor = "pointer";
    deleteButton.onclick = function () {
        deleteOrder(data.so_don_hang, row);
    };
    deleteCell.appendChild(deleteButton);
    row.appendChild(deleteCell);

    if (isNew) {
        orderList.prepend(row);
    } else {
        orderList.appendChild(row);
    }
}

// Xóa đơn hàng
function deleteOrder(orderNumber, row) {
    let storedData = JSON.parse(localStorage.getItem("orders")) || [];
    storedData = storedData.filter(order => order.so_don_hang !== orderNumber);
    localStorage.setItem("orders", JSON.stringify(storedData));

    row.remove();
    showToast("🗑️ Đã xóa đơn hàng!");
}

// Tải dữ liệu từ localStorage và hiển thị lên bảng
function loadData() {
    const storedData = JSON.parse(localStorage.getItem("orders")) || [];
    const orderList = document.getElementById("order-list");
    orderList.innerHTML = ""; // Xóa bảng trước khi tải lại dữ liệu
    storedData.forEach(data => addRowToTable(data, false));
}

// Kiểm tra form nhập liệu
function validateForm(formData) {
    let isValid = true;
    document.querySelectorAll("input, select").forEach(input => {
        let value = formData[input.name]?.trim();
        if (!value) {
            input.style.border = "2px solid red";
            isValid = false;
        } else {
            input.style.border = "1px solid #ccc";
        }
    });
    if (!isValid) showToast("⚠️ Vui lòng nhập đầy đủ thông tin!");
    return isValid;
}


// Tải dữ liệu từ localStorage khi trang được tải lại
window.onload = loadData;

    </script>
