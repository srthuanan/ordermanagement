<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉ Tiêu Hoàn Thành</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

    <style>
        /* ==========================================================================
           1. Biến màu và thiết lập cơ bản (CSS Variables & Root)
           ========================================================================== */
        :root {
            /* Font */
            --font-main: 'Plus Jakarta Sans', sans-serif;

            /* Colors */
            --gradient-start: #4f46e5;
            --gradient-end: #14b8a6;
            --gradient: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            
            /* Light Mode Palette */
            --bg-light: #f8f9fa;
            --card-bg-light: #ffffff;
            --text-light: #212529;
            --text-muted-light: #6c757d;
            --border-light: #e9ecef;
            
            /* Status & Chart Colors */
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --skeleton-bg-light: #e0e0e0;
            
            /* Shadows & Effects */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-glow-light: 0 0 0 4px rgb(79 70 229 / 0.1);

            /* Transitions */
            --transition-fast: 0.2s;
            --transition-medium: 0.3s;
            --transition-slow: 0.5s;
        }

        /* ==========================================================================
           2. Layout & Global Styles (Đồng bộ từ khoxe.html)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition-medium) ease, color var(--transition-medium) ease;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted-light); }

        .navbar {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 50px;
            padding: 0 20px;
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--border-light);
            transition: all var(--transition-medium) ease;
            display: flex;
            align-items: center;
            z-index: 999;
            gap: 15px;
        }

        .navbar .logo-title {
            font-size: 18px; font-weight: 800;
            color: var(--text-light);
            position: absolute; left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .navbar-controls {
            margin-left: auto;
            display: flex; align-items: center; gap: 10px;
        }

        .nav-btn {
            border: 1px solid var(--border-light);
            border-radius: 50%;
            background: var(--card-bg-light);
            color: var(--text-muted-light);
            transition: all var(--transition-medium) ease;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
        }
        .nav-btn:hover {
            color: var(--text-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .mobile-menu-btn {
            display: none;
            z-index: 1002;
            background: transparent;
            color: var(--text-light);
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-medium) ease;
        }
        .mobile-menu-btn:hover { background-color: var(--border-light); }

        .sidebar {
            position: fixed; top: 0; left: 0;
            width: 240px; height: 100vh;
            background-color: rgba(248, 249, 250, 0.85);
            backdrop-filter: blur(8px);
            padding: 15px; padding-top: 80px; 
            transition: width var(--transition-medium) ease, transform var(--transition-medium) ease, background-color var(--transition-medium) ease;
            z-index: 999;
            border-right: 1px solid var(--border-light);
            display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: 80px; }

        .sidebar .logo { text-align: center; margin-bottom: 30px; }
        .sidebar .logo h1 {
            font-size: 18px; font-weight: 800;
            background: var(--gradient); color: transparent;
            -webkit-background-clip: text; background-clip: text;
            transition: opacity var(--transition-medium) ease;
        }
        .sidebar.collapsed .logo h1 { opacity: 0; }

        .sidebar .menu {
            display: flex; flex-direction: column; gap: 8px; flex-grow: 1;
        }
        .sidebar .menu a {
            padding: 12px 15px; text-decoration: none;
            color: var(--text-muted-light); font-size: 14px; font-weight: 600;
            border-radius: 10px; transition: all var(--transition-fast) ease-out;
            display: flex; align-items: center; gap: 15px;
        }
        .sidebar .menu a i {
            font-size: 18px;
            width: 24px;
            text-align: center;
            transition: transform var(--transition-medium) ease;
        }
        .sidebar .menu a span { transition: opacity 0.2s ease, max-width var(--transition-medium) ease; white-space: nowrap; overflow: hidden; max-width: 120px; }
        .sidebar.collapsed .menu a { justify-content: center; }
        .sidebar.collapsed .menu a span { opacity: 0; max-width: 0; }
        .sidebar .menu a:hover { color: var(--text-light); background: var(--bg-light); }
        .sidebar .menu a.active { background: var(--gradient); color: white; box-shadow: var(--shadow-md); }
        .sidebar .menu a.active i { transform: scale(1.1); }
        
        .toggle-btn {
            margin-top: auto;
            width: 100%; height: 44px;
            background: var(--bg-light); border: 1px solid var(--border-light);
            border-radius: 12px; color: var(--text-muted-light);
            font-size: 16px; cursor: pointer;
            transition: all var(--transition-medium) ease;
            display: flex; align-items: center; justify-content: center;
        }
        .sidebar.collapsed .toggle-btn { width: 44px; margin: auto auto 0; }
        .toggle-btn:hover { border-color: var(--gradient-start); color: var(--gradient-start); transform: scale(1.05); }
        .toggle-btn i { transition: transform var(--transition-slow) cubic-bezier(0.19, 1, 0.22, 1); }
        .sidebar.collapsed .toggle-btn i { transform: rotate(180deg); }

        .main-content {
            margin-left: 240px; padding-top: 80px; padding-bottom: 60px;
            transition: margin-left var(--transition-medium) ease;
            display: flex; flex-direction: column;
            gap: 20px;
            padding-left: 20px;
            padding-right: 20px;
        }
        .main-content.collapsed { margin-left: 80px; }

        footer {
            position: fixed; bottom: 0;
            height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 500;
            color: var(--text-muted-light);
            border-top: 1px solid var(--border-light);
            background: var(--bg-light);
            z-index: 998;
            left: 240px; width: calc(100% - 240px);
            transition: all var(--transition-medium) ease;
        }
        .main-content.collapsed + footer { left: 80px; width: calc(100% - 80px); }
        
        /* ==========================================================================
           3. Components (Filter, Cards, Table, etc. for KPI Page)
           ========================================================================== */

        .filter-section {
            padding: 25px;
            background: var(--card-bg-light);
            border-radius: 16px; box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: all var(--transition-medium) ease;
            flex-shrink: 0;
        }

        .filter-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 15px; }
        .filter-group { flex: 1 1 200px; display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-weight: 600; font-size: 13px; color: var(--text-muted-light); }
        .filter-bar select, .filter-bar input[type="month"] {
            width: 100%; padding: 12px 15px;
            border: 1px solid var(--border-light); border-radius: 10px;
            font-size: 14px; background: var(--bg-light); color: var(--text-light);
            transition: all var(--transition-medium) ease;
        }
        .filter-bar select:focus, .filter-bar input[type="month"]:focus {
            outline: none; border-color: var(--gradient-start); box-shadow: var(--shadow-glow-light);
        }
        .filter-actions { margin-left: auto; }
        .action-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 20px; border: none;
            border-radius: 10px; font-size: 14px; font-weight: 600;
            color: white; background: var(--gradient);
            cursor: pointer; transition: all var(--transition-fast) ease;
            box-shadow: var(--shadow-sm);
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .action-btn:disabled { background: var(--border-light); color: var(--text-muted-light); cursor: not-allowed; transform: none; box-shadow: none; }
        
        .kpi-consultant-grid {
            position: relative;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            min-height: 150px;
        }
        .kpi-consultant-card {
            background: var(--card-bg-light);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
            display: flex;
            flex-direction: column;
        }
        .kpi-consultant-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .kpi-consultant-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 10px;
        }
        .kpi-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
        .kpi-item strong { font-weight: 500; color: var(--text-muted-light); }
        .kpi-item .value { font-weight: 700; color: var(--text-light); }
        .kpi-item .value.positive { color: var(--success-color) !important; }
        .kpi-item .value.negative { color: var(--danger-color) !important; }
        .kpi-item .value.neutral { color: var(--info-color) !important; }

        .donut-chart-kpi-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-top: 10px;
        }
        .donut-chart-kpi-container strong { font-size: 14px; font-weight: 500; color: var(--text-muted-light); }
        .donut-canvas-wrapper { width: 100px; height: 100px; position: relative; }
        .donut-canvas-wrapper canvas { max-width: 100%; max-height: 100%; }

        .content-card {
            background: var(--card-bg-light);
            border-radius: 16px; padding: 25px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }
        .content-card h2 {
            font-size: 20px; color: var(--text-light);
            margin-bottom: 20px; font-weight: 700;
        }
        .summary-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        .summary-table th, .summary-table td {
            padding: 12px 15px; text-align: left;
            border-bottom: 1px solid var(--border-light);
        }
        .summary-table th {
            background-color: var(--bg-light); color: var(--text-light);
            border-bottom: 2px solid var(--border-light);
            text-align: center; text-transform: uppercase;
            font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
        }
        .summary-table tbody tr:hover { background-color: var(--bg-light); }
        .summary-table td.positive { color: var(--success-color); font-weight: bold; }
        .summary-table td.negative { color: var(--danger-color); font-weight: bold; }
        .summary-table td.neutral { color: var(--info-color); font-weight: bold; }

        .chart-container { height: 350px; }
        
        .loading-overlay {
            position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none; justify-content: center; align-items: center;
            z-index: 100; border-radius: 16px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            border: 4px solid var(--border-light); border-top: 4px solid var(--gradient-start); 
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #notification {
            position: fixed;
            bottom: 60px; right: 20px;
            padding: 12px 18px;
            background: var(--text-light);
            color: var(--card-bg-light);
            border-radius: 8px;
            z-index: 10001; font-size: 14px;
            box-shadow: var(--shadow-lg);
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0; visibility: hidden;
            transform: translateY(20px);
        }
        #notification.show { opacity: 1; visibility: visible; transform: translateY(0); }

        /* ==========================================================================
           4. Responsive Design (Đồng bộ từ khoxe.html)
           ========================================================================== */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 260px; z-index: 1001; }
            .sidebar.open { transform: translateX(0); }
            .sidebar.collapsed { transform: translateX(-100%); }
            .main-content, .main-content.collapsed { margin-left: 0; padding-left: 15px; padding-right: 15px; padding-top: 80px; }
            footer, .main-content.collapsed + footer { left: 0; width: 100%; }
            .toggle-btn { display: none; }
            .mobile-menu-btn { display: flex; }
            .navbar .logo-title { display: none; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-actions { margin-left: 0; width: 100%; }
            .action-btn { justify-content: center; }
        }
    </style>
</head>
<body>

        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Mở menu">

    <aside class="sidebar" id="sidebar">
        <div class="logo">

        <nav class="menu" id="nav-menu">

    <footer id="footer"><p>VinFast Thuận An - Dĩ An</p></footer>
    <div id="notification"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    if (sessionStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "index.html";
        return;
    }

    // URLs and Global State
    const API_KPI_TARGET_URL = "https://script.google.com/macros/s/AKfycbzX83aFslavgB3nNOTMQqwN--hHOOECP2m5VnGDEaTz2KiWTBqf1GJBCUIvBWyuboJ21w/exec?sheet=ALL_KPI";
    const API_ANNUAL_SALES_URL = "https://script.google.com/macros/s/AKfycbzJkMDpnMvKTOQ0dN1QMyjoBHLkZw0yyr_8Al0KlAx0HEPTABTDxhrXo6Vquu7MEWel0w/exec?action=getannualinvoicecounts";
    const MONTH_ENGLISH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    let kpiTargetsData = null;
    let annualSalesData = null;
    let consultantProgressChartInstance = null;
    let activeDonutCharts = {};

    // DOM Element References
    const DOMElements = {
        sidebar: document.getElementById('sidebar'),
        mainContent: document.getElementById('main-content'),
        footer: document.getElementById('footer'),
        kpiLoader: document.getElementById('kpi-loader-overlay'),
        viewKpiBtn: document.getElementById('view-kpi-btn'),
        monthFilter: document.getElementById('month-filter'),
        consultantFilter: document.getElementById('consultant-filter'),
        kpiGrid: document.getElementById('kpi-consultant-grid'),
        summaryTableContainer: document.getElementById('summary-table-container'),
        summaryTableBody: document.getElementById('summary-table-body'),
        summaryMonthYear: document.getElementById('summary-month-year'),
        chartContainer: document.getElementById('consultant-progress-chart-container'),
        notification: document.getElementById('notification')
    };
    
    // Doughnut Chart Center Label Plugin
    const doughnutLabelPlugin = {
        id: 'doughnutLabel',
        afterDraw: (chart) => {
            const { ctx, chartArea: { top, bottom, left, right }, data } = chart;
            if (data.datasets[0].data.length === 0) return;
            ctx.save();
            const text = chart.options.plugins.doughnutLabel.text || '';
            ctx.font = 'bold 16px ' + getComputedStyle(document.documentElement).getPropertyValue('--font-main').trim();
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-light').trim();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, (left + right) / 2, (top + bottom) / 2);
            ctx.restore();
        }
    };
    Chart.register(doughnutLabelPlugin);

    // UI Manager
    const UIManager = {
        init: function() {
            this.setupEventListeners();
            this.applyInitialSettings();
            AOS.init({ duration: 600, once: true });
        },
        setupEventListeners: function() {
            document.getElementById('sidebar-toggle-btn')?.addEventListener('click', () => this.toggleSidebarDesktop());
            document.getElementById('mobile-menu-btn')?.addEventListener('click', () => this.toggleMobileSidebar());
            document.getElementById('back-btn')?.addEventListener('click', () => window.location.href = "index.html");
            document.getElementById('logout-btn')?.addEventListener('click', () => {
                sessionStorage.clear();
                window.location.href = "index.html";
            });
            window.addEventListener('resize', debounce(this.handleResize.bind(this), 200));
            document.addEventListener('click', (event) => {
                if (window.innerWidth <= 768 && DOMElements.sidebar?.classList.contains('open')) {
                    if (!DOMElements.sidebar.contains(event.target) && !document.getElementById('mobile-menu-btn').contains(event.target)) {
                        this.toggleMobileSidebar();
                    }
                }
            });
            DOMElements.viewKpiBtn.addEventListener('click', () => App.loadKpiData());
        },
        applyInitialSettings: function() {
            if (window.innerWidth > 768 && localStorage.getItem('sidebarState') === 'collapsed') {
                this.toggleSidebarDesktop(true); // Force collapse without toggling
            }
            const currentPageFile = window.location.pathname.split("/").pop() || "index.html";
            document.querySelectorAll("#nav-menu a").forEach(link => {
                link.classList.remove("active");
                if (link.getAttribute('href') === currentPageFile) {
                    link.classList.add("active");
                }
            });
        },
        toggleSidebarDesktop: function(forceCollapse = false) {
            if (window.innerWidth > 768) {
                const isCollapsed = forceCollapse || DOMElements.sidebar.classList.toggle("collapsed");
                DOMElements.mainContent.classList.toggle("collapsed", isCollapsed);
                DOMElements.footer.classList.toggle("collapsed", isCollapsed);
                if (!forceCollapse) {
                    localStorage.setItem('sidebarState', isCollapsed ? 'collapsed' : 'expanded');
                }
                setTimeout(() => App.resizeCharts(), 300); // Resize chart after transition
            }
        },
        toggleMobileSidebar: function() {
            DOMElements.sidebar.classList.toggle("open");
        },
        handleResize: function() {
            if (window.innerWidth > 768) {
                DOMElements.sidebar.classList.remove('open');
            }
            App.resizeCharts();
        },
        showLoader: function(show) {
            DOMElements.kpiLoader?.classList.toggle('active', show);
            DOMElements.viewKpiBtn.disabled = show;
        },
        showNotification: function(message, type = "info", duration = 3000) {
            if (!DOMElements.notification) return;
            DOMElements.notification.textContent = message;
            DOMElements.notification.className = 'show';
            let bgColor;
            switch(type) {
                case 'success': bgColor = 'var(--success-color)'; break;
                case 'error': bgColor = 'var(--danger-color)'; break;
                case 'warning': bgColor = 'var(--warning-color)'; break;
                default: bgColor = 'var(--text-light)'; break;
            }
            DOMElements.notification.style.backgroundColor = bgColor;
            DOMElements.notification.style.color = (type === 'warning' ? 'var(--text-light)' : 'var(--card-bg-light)');
            
            if (DOMElements.notification.timeout) clearTimeout(DOMElements.notification.timeout);
            DOMElements.notification.timeout = setTimeout(() => {
                DOMElements.notification.classList.remove("show");
            }, duration);
        }
    };

    // Main App Logic
    const App = {
        init: async function() {
            UIManager.init();
            this.setDefaultFilters();
            UIManager.showLoader(true);
            await this.fetchInitialData();
            await this.loadKpiData(); // Load data for default month
            UIManager.showLoader(false);
        },
        setDefaultFilters: function() {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            DOMElements.monthFilter.value = `${year}-${month}`;
            DOMElements.consultantFilter.value = 'all';
        },
        fetchInitialData: async function() {
            try {
                const [targetsResponse, salesResponse] = await Promise.all([
                    fetch(API_KPI_TARGET_URL),
                    fetch(API_ANNUAL_SALES_URL)
                ]);
                if (!targetsResponse.ok || !salesResponse.ok) throw new Error('Network response was not ok.');
                
                kpiTargetsData = await targetsResponse.json();
                annualSalesData = await salesResponse.json();

                this.populateConsultantFilter();
            } catch (error) {
                console.error("Error fetching initial data:", error);
                UIManager.showNotification('Lỗi tải dữ liệu ban đầu. Vui lòng thử lại.', 'error');
            }
        },
        populateConsultantFilter: function() {
            if (!kpiTargetsData) return;
            let consultants = new Set();
            Object.values(kpiTargetsData).forEach(monthArray => {
                if (Array.isArray(monthArray)) {
                    monthArray.forEach(item => {
                        if (Array.isArray(item) && item[0]) consultants.add(item[0].trim());
                    });
                }
            });
            const sortedConsultants = Array.from(consultants).sort();
            DOMElements.consultantFilter.innerHTML = '<option value="all">Tất cả TVBH</option>';
            sortedConsultants.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                DOMElements.consultantFilter.appendChild(option);
            });
        },
        loadKpiData: async function() {
            const yearMonth = DOMElements.monthFilter.value;
            if (!yearMonth) {
                UIManager.showNotification("Vui lòng chọn tháng để xem KPI.", "warning");
                return;
            }
            if (!kpiTargetsData || !annualSalesData) {
                UIManager.showNotification("Dữ liệu chưa sẵn sàng, vui lòng đợi.", "warning");
                return;
            }

            UIManager.showLoader(true);
            this.clearPreviousData();
            
            const consultantFilterValue = DOMElements.consultantFilter.value;
            const monthNumber = parseInt(yearMonth.split('-')[1], 10);
            const kpiMonthKey = `KPI ${monthNumber}`;

            let consultantsInMonth = [];
            if (kpiTargetsData[kpiMonthKey] && Array.isArray(kpiTargetsData[kpiMonthKey])) {
                consultantsInMonth = kpiTargetsData[kpiMonthKey]
                    .map(entry => (Array.isArray(entry) && entry[0] ? entry[0].trim() : null))
                    .filter(Boolean);
            }
            
            let displayConsultants = (consultantFilterValue === 'all') 
                ? consultantsInMonth 
                : (consultantsInMonth.includes(consultantFilterValue) ? [consultantFilterValue] : []);
            
            if (displayConsultants.length === 0) {
                this.renderNoDataMessage(yearMonth, consultantFilterValue);
                UIManager.showLoader(false);
                return;
            }
            
            const kpiData = displayConsultants.map(name => {
                const target = this.getConsultantTarget(name, yearMonth);
                const actual = this.getActualSales(name, yearMonth);
                const achievement = target > 0 ? (actual / target) * 100 : (actual > 0 ? 100 : 0);
                const difference = actual - target;
                return { name, target, actual, achievement, difference };
            });
            
            this.renderKpiCards(kpiData);
            this.renderSummaryTable(kpiData, yearMonth);
            this.renderMainChart(kpiData);

            DOMElements.summaryTableContainer.classList.remove('hidden');
            DOMElements.chartContainer.classList.remove('hidden');
            
            UIManager.showLoader(false);
        },
        clearPreviousData: function() {
            DOMElements.kpiGrid.innerHTML = '';
            DOMElements.summaryTableBody.innerHTML = '';
            Object.values(activeDonutCharts).forEach(chart => chart.destroy());
            activeDonutCharts = {};
            DOMElements.summaryTableContainer.classList.add('hidden');
            DOMElements.chartContainer.classList.add('hidden');
        },
        renderNoDataMessage: function(yearMonth, consultant) {
            const [year, month] = yearMonth.split('-');
            const msg = consultant === 'all'
                ? `Không có TVBH nào được gán chỉ tiêu trong tháng ${month}/${year}.`
                : `TVBH "${consultant}" không có chỉ tiêu trong tháng ${month}/${year}.`;
            DOMElements.kpiGrid.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted-light);">${msg}</p>`;
        },
        renderKpiCards: function(data) {
            const fragment = document.createDocumentFragment();
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'kpi-consultant-card';
                const canvasId = `donut-${item.name.replace(/[^a-zA-Z0-9]/g, '')}`;
                card.innerHTML = `
                    <h3>${item.name}</h3>
                    <div class="kpi-item"><strong>Chỉ Tiêu Tháng:</strong><span class="value">${item.target}</span></div>
                    <div class="kpi-item"><strong>Số Xe Bán Được:</strong><span class="value">${item.actual}</span></div>
                    <div class="donut-chart-kpi-container">
                        <strong>Tiến Độ Hoàn Thành</strong>
                        <div class="donut-canvas-wrapper"><canvas id="${canvasId}"></canvas></div>
                    </div>
                    <div class="kpi-item" style="margin-top: 10px;"><strong>Chênh Lệch:</strong><span class="value ${item.difference >= 0 ? 'positive' : 'negative'}">${item.difference} xe</span></div>
                `;
                fragment.appendChild(card);
                // Defer chart rendering to avoid blocking UI
                setTimeout(() => this.renderDonutChart(canvasId, item.achievement), 0);
            });
            DOMElements.kpiGrid.appendChild(fragment);
        },
        renderSummaryTable: function(data, yearMonth) {
            const [year, month] = yearMonth.split('-');
            DOMElements.summaryMonthYear.textContent = `${month}/${year}`;
            const fragment = document.createDocumentFragment();
            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.name}</td>
                    <td style="text-align: center;">${item.target}</td>
                    <td style="text-align: center;">${item.actual}</td>
                    <td class="${item.achievement >= 100 ? 'positive' : (item.achievement >= 70 ? 'neutral' : 'negative')}" style="text-align: center;">${item.achievement.toFixed(1)}%</td>
                    <td class="${item.difference >= 0 ? 'positive' : 'negative'}" style="text-align: center;">${item.difference}</td>
                `;
                fragment.appendChild(row);
            });
            DOMElements.summaryTableBody.appendChild(fragment);
        },
        renderMainChart: function(kpiData) {
            const ctx = document.getElementById('consultantProgressChart').getContext('2d');
            const dataForChart = [...kpiData].sort((a, b) => b.achievement - a.achievement).slice(0, 5);
            
            const labels = dataForChart.map(item => item.name);
            const targetData = dataForChart.map(item => item.target);
            const actualData = dataForChart.map(item => item.actual);
            
            if (consultantProgressChartInstance) consultantProgressChartInstance.destroy();
            
            consultantProgressChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Chỉ Tiêu', data: targetData, backgroundColor: 'rgba(108, 117, 125, 0.7)', borderRadius: 4 },
                        { label: 'Thực Đạt', data: actualData, backgroundColor: 'var(--success-color)', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { color: 'var(--text-light)', stepSize: 1, precision: 0 }, grid: { color: 'var(--border-light)' }, title: { display: true, text: 'Số Lượng Xe', color: 'var(--text-light)' } },
                        x: { ticks: { color: 'var(--text-light)' }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { color: 'var(--text-light)' } },
                        tooltip: { mode: 'index', intersect: false }
                    }
                }
            });
        },
        renderDonutChart: function(canvasId, achievement) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            let achievedColor = (achievement < 50) ? 'var(--danger-color)' : (achievement < 80) ? 'var(--warning-color)' : 'var(--success-color)';
            const achievedValue = Math.min(achievement, 100);
            
            if (activeDonutCharts[canvasId]) activeDonutCharts[canvasId].destroy();

            activeDonutCharts[canvasId] = new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [achievedValue, Math.max(0, 100 - achievedValue)],
                        backgroundColor: [getComputedStyle(document.documentElement).getPropertyValue(achievedColor.substring(4, achievedColor.length - 1)), 'var(--skeleton-bg-light)'],
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '70%',
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false },
                        doughnutLabel: { text: `${achievement.toFixed(0)}%` }
                    }
                }
            });
        },
        getConsultantTarget: function(name, yearMonth) {
            const monthNumber = parseInt(yearMonth.split('-')[1], 10);
            const kpiMonthKey = `KPI ${monthNumber}`;
            const monthData = kpiTargetsData[kpiMonthKey];
            if (monthData && Array.isArray(monthData)) {
                const entry = monthData.find(e => Array.isArray(e) && e[0] && e[0].trim() === name.trim());
                return (entry && typeof entry[1] === 'number') ? entry[1] : 0;
            }
            return 0;
        },
        getActualSales: function(name, yearMonth) {
            const monthNumber = parseInt(yearMonth.split('-')[1], 10);
            const monthNameKey = MONTH_ENGLISH_NAMES[monthNumber - 1];
            const monthData = annualSalesData[monthNameKey];
            if (monthData && monthData.data) {
                const normalizedName = name.trim().toUpperCase();
                for (const [apiName, count] of Object.entries(monthData.data)) {
                    if (apiName.trim().toUpperCase() === normalizedName) {
                        return typeof count === 'number' ? count : 0;
                    }
                }
            }
            return 0;
        },
        resizeCharts: function() {
            if (consultantProgressChartInstance) consultantProgressChartInstance.resize();
        }
    };
    
    // Helper functions
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    // Initialize the application
    App.init();
});
</script>

</body>
</html>
