<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VinFast - Danh Sách Xe Đã Xuất Hóa Đơn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, #003087, #005eb8);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .navbar .logo img {
            height: 50px;
        }

        .navbar .logo h1 {
            font-size: 24px;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        .navbar .tabs {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            flex-grow: 1;
            margin-left: 20px;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .navbar .tabs::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .navbar .tabs a {
            position: relative;
            padding: 14px 20px;
            text-decoration: none;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .navbar .tabs a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 94, 184, 0.5); /* Màu xanh nhạt hơn */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
            z-index: -1;
        }

        .navbar .tabs a:hover::before, .navbar .tabs a.active::before {
            width: 300px;
            height: 300px;
        }

        .navbar .tabs a:hover {
            background: #005eb8; /* Màu xanh của VinFast */
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 94, 184, 0.8);
        }

        .navbar .tabs a.active {
            background: #005eb8;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(0, 94, 184, 1);
            animation: glowPulse 2s infinite ease-in-out;
        }

        .navbar .tabs a.total-tab {
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: #1a1a1a;
            font-size: 16px;
            padding: 14px 30px;
        }

        .navbar .tabs a.total-tab:hover, .navbar .tabs a.total-tab.active {
            background: linear-gradient(135deg, #ffd700, #d4af37);
            box-shadow: 0 0 25px rgba(212, 175, 55, 1);
            animation: glowPulseGold 2s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 94, 184, 0.8); }
            50% { box-shadow: 0 0 30px rgba(0, 94, 184, 1); }
        }

        @keyframes glowPulseGold {
            0%, 100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.8); }
            50% { box-shadow: 0 0 30px rgba(212, 175, 55, 1); }
        }

        .main-container {
            display: flex;
            margin-top: 100px;
            padding: 20px 40px;
            gap: 20px;
            height: calc(100vh - 120px);
        }

        .grid-container {
            flex: 2;
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow-y: auto;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-container input {
            padding: 12px 20px;
            width: 100%;
            max-width: 300px;
            border: 1px solid #a9a9a9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: #005eb8;
            box-shadow: 0 0 10px rgba(0, 94, 184, 0.3);
            outline: none;
        }

        .export-btn-container {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .export-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #005eb8;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .export-btn:hover {
            background: #003087;
            box-shadow: 0 0 15px rgba(0, 94, 184, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-bottom: 20px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #003087;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            background: #ffffff;
            color: #1a1a1a;
        }

        .vin-highlight {
            background: #e6f0ff;
            font-weight: 700;
            color: #003087;
        }

        tbody tr:hover {
            background: #f0f8ff;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        tbody tr.selected {
            background: #cce5ff;
            font-weight: 700;
        }

        .table-title {
            font-size: 18px;
            font-weight: 700;
            color: #003087;
            margin-bottom: 10px;
        }

        .detail-panel {
            flex: 1;
            background: #ffffff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow-y: auto;
            border-left: 4px solid #005eb8;
            transition: all 0.3s ease;
        }

        .detail-panel h3 {
            font-size: 20px;
            color: #003087;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .detail-table th {
            background: #f9f9f9;
            color: #1a1a1a;
            text-align: left;
            padding: 12px;
            font-weight: 400;
        }

        .detail-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 12px 25px;
            border: 1px solid #a9a9a9;
            border-radius: 10px;
            background: #ffffff;
            color: #1a1a1a;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            background: #005eb8;
            color: #ffffff;
            border-color: #005eb8;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            padding: 12px 25px;
            font-size: 14px;
            color: #003087;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #003087;
            color: #ffffff;
            text-align: center;
            padding: 10px 0;
            font-size: 12px;
        }

        .loading-spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .loading-spinner .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #a9a9a9;
            border-top: 5px solid #005eb8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #005eb8;
            color: #ffffff;
            border-radius: 10px;
            display: none;
            z-index: 10001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }
            .navbar .logo h1 {
                font-size: 18px;
            }
            .navbar .tabs a {
                padding: 10px 15px;
                font-size: 12px;
            }
            .main-container {
                flex-direction: column;
                padding: 20px;
                margin-top: 80px;
            }
            .detail-panel {
                margin-top: 20px;
                border-left: none;
                border-top: 4px solid #005eb8;
            }
            .controls {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
          
            <h1>VinFast MĐ An Phú</h1>
        </div>
        <div class="tabs">
            <a href="#" onclick="fetchSheetData('January', this)">Tháng 1</a>
            <a href="#" onclick="fetchSheetData('February', this)">Tháng 2</a>
            <a href="#" onclick="fetchSheetData('March', this)">Tháng 3</a>
            <a href="#" onclick="fetchSheetData('April', this)">Tháng 4</a>
            <a href="#" onclick="fetchSheetData('May', this)">Tháng 5</a>
            <a href="#" onclick="fetchSheetData('June', this)">Tháng 6</a>
            <a href="#" onclick="fetchSheetData('July', this)">Tháng 7</a>
            <a href="#" onclick="fetchSheetData('August', this)">Tháng 8</a>
            <a href="#" onclick="fetchSheetData('September', this)">Tháng 9</a>
            <a href="#" onclick="fetchSheetData('October', this)">Tháng 10</a>
            <a href="#" onclick="fetchSheetData('November', this)">Tháng 11</a>
            <a href="#" onclick="fetchSheetData('December', this)">Tháng 12</a>
            <a href="#" onclick="fetchTotalData(this)" class="total-tab active">Tổng</a>
        </div>
    </div>

    <div class="main-container">
        <div class="grid-container">
            <div class="controls">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Tìm kiếm...">
                </div>
                <div class="export-btn-container">
                    <span>Tổng số lượng: <span id="total-count">0</span></span>
                    <button class="export-btn" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Xuất Excel</button>
                    <button class="export-btn" onclick="printTable()"><i class="fas fa-print"></i> In</button>
                </div>
            </div>
            <div id="total-tables" style="display: none;">
                <div class="table-title">Tổng Hợp Theo Dòng Xe</div>
                <table id="total-car-table">
                    <thead id="total-car-header"></thead>
                    <tbody id="total-car-body"></tbody>
                </table>
                <div class="table-title">Tổng Hợp Theo TVBH</div>
                <table id="total-tvbh-table">
                    <thead id="total-tvbh-header"></thead>
                    <tbody id="total-tvbh-body"></tbody>
                </table>
            </div>
            <table id="data-table">
                <thead id="table-header"></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="pagination">
                <button onclick="changePage(-1)" id="prev-btn">Trước</button>
                <span id="page-info">Trang 1</span>
                <button onclick="changePage(1)" id="next-btn">Sau</button>
            </div>
        </div>

        <div class="detail-panel" id="detail-panel">
            <h3>Chi Tiết Đơn Hàng</h3>
            <div id="detail-body"></div>
        </div>
    </div>

    <footer>
        © 2025 VinFast Auto. All rights reserved. Hotline: 1900 232389
    </footer>

    <div class="loading-spinner">
        <div class="spinner"></div>
    </div>

    <div id="notification"></div>

    <script>
        let currentPage = 1;
        const rowsPerPage = 15;
        let fullData = [];
        let fullTvbhData = [];
        let currentSheet = "Total";
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        document.addEventListener("DOMContentLoaded", () => {
            fetchTotalData(document.querySelector('.tabs a.total-tab'));
            setupEventListeners();
            setInterval(() => {
                if (currentSheet === "Total") {
                    fetchTotalData(document.querySelector('.tabs a.active'));
                } else {
                    fetchSheetData(currentSheet, document.querySelector('.tabs a.active'));
                }
            }, 60000);
        });

        function setupEventListeners() {
            document.getElementById("search-input").addEventListener("input", filterTable);
        }

        let cachedData = {};

        async function fetchSheetData(sheetName, element) {
            currentSheet = sheetName;
            document.querySelectorAll('.tabs a').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById("total-tables").style.display = "none";
            document.getElementById("data-table").style.display = "table";

            if (!cachedData[sheetName]) {
                document.querySelector('.loading-spinner').style.display = 'block';
            }

            let storedData = sessionStorage.getItem(sheetName);
            if (storedData) {
                fullData = JSON.parse(storedData);
                renderTable(fullData);
                document.querySelector('.loading-spinner').style.display = 'none';
                return;
            }

            try {
                let response = await fetch(`https://script.google.com/macros/s/AKfycbxOA5IJ8VYSM5WfA_eTbFm0oXmmRSFrn9HL-Gtf71uLqX4BPUambHzxmwLLW7U3dWN_Pw/exec?sheet=${sheetName}`);
                if (!response.ok) throw new Error(`Server error: ${response.status}`);
                let data = await response.json();
                sessionStorage.setItem(sheetName, JSON.stringify(data));
                cachedData[sheetName] = data;
                fullData = data;
                renderTable(fullData);
                showNotification("Dữ liệu đã được cập nhật!", 2000);
            } catch (error) {
                document.getElementById("table-body").innerHTML = `<tr><td colspan="7">Lỗi: ${error.message}. Vui lòng thử lại sau!</td></tr>`;
                showNotification("Lỗi tải dữ liệu!", 3000);
            }

            document.querySelector('.loading-spinner').style.display = 'none';
        }

        async function fetchTotalData(element) {
            currentSheet = "Total";
            document.querySelectorAll('.tabs a').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById("data-table").style.display = "none";
            document.getElementById("total-tables").style.display = "block";
            document.querySelector('.loading-spinner').style.display = 'block';

            let totalCarData = [];
            let totalTvbhData = [];
            let fetchPromises = months.map(async (month) => {
                if (cachedData[month]) {
                    return cachedData[month];
                } else {
                    let storedData = sessionStorage.getItem(month);
                    if (storedData) {
                        cachedData[month] = JSON.parse(storedData);
                        return cachedData[month];
                    } else {
                        try {
                            let response = await fetch(`https://script.google.com/macros/s/AKfycbxOA5IJ8VYSM5WfA_eTbFm0oXmmRSFrn9HL-Gtf71uLqX4BPUambHzxmwLLW7U3dWN_Pw/exec?sheet=${month}`);
                            if (!response.ok) throw new Error(`Server error: ${response.status}`);
                            let data = await response.json();
                            sessionStorage.setItem(month, JSON.stringify(data));
                            cachedData[month] = data;
                            return data;
                        } catch (error) {
                            console.error(`Lỗi tải dữ liệu ${month}: ${error.message}`);
                            return [];
                        }
                    }
                }
            });

            try {
                let results = await Promise.all(fetchPromises);
                let allData = results.flat(); // Gộp tất cả dữ liệu từ 12 tháng

                // Tổng hợp theo dòng xe
                let carStats = {};
                allData.forEach(row => {
                    let carModel = row[3]; // Cột "Dòng Xe"
                    if (carModel) {
                        carStats[carModel] = (carStats[carModel] || 0) + 1;
                    }
                });
                totalCarData = Object.entries(carStats).map(([model, count], index) => ({
                    index: index + 1,
                    model: model,
                    count: count
                }));

                // Tổng hợp theo TVBH
                let tvbhStats = {};
                allData.forEach(row => {
                    let tvbh = row[7]; // Cột "TVBH"
                    if (tvbh) {
                        tvbhStats[tvbh] = (tvbhStats[tvbh] || 0) + 1;
                    }
                });
                totalTvbhData = Object.entries(tvbhStats).map(([tvbh, count], index) => ({
                    index: index + 1,
                    tvbh: tvbh,
                    count: count
                }));

                fullData = totalCarData;
                fullTvbhData = totalTvbhData;
                renderTotalTables(totalCarData, totalTvbhData);
                showNotification("Dữ liệu tổng đã được cập nhật!", 2000);
            } catch (error) {
                document.getElementById("total-car-body").innerHTML = `<tr><td colspan="2">Lỗi: ${error.message}. Vui lòng thử lại sau!</td></tr>`;
                document.getElementById("total-tvbh-body").innerHTML = `<tr><td colspan="2">Lỗi: ${error.message}. Vui lòng thử lại sau!</td></tr>`;
                showNotification("Lỗi tải dữ liệu tổng!", 3000);
            }

            document.querySelector('.loading-spinner').style.display = 'none';
        }

        function renderTable(data) {
            document.getElementById("table-header").innerHTML = `
                <tr>
                    <th>STT</th>
                    <th>Tên KH</th>
                    <th>Số Đơn Hàng</th>
                    <th>Dòng Xe</th>
                    <th>Phiên Bản</th>
                    <th>Ngoại Thất</th>
                    <th>Nội Thất</th>
                </tr>
            `;

            let start = (currentPage - 1) * rowsPerPage;
            let end = start + rowsPerPage;
            let paginatedData = data.slice(start, end);

            let content = paginatedData.map((row, index) => {
                let note = row[11]?.toLowerCase() || "";
                let policy = row[10]?.toLowerCase() || "";
                let isHighlight = note.includes("ưu tiên") || policy.includes("đặc biệt");
                let rowClass = isHighlight ? ' class="selected"' : '';
                return `
                    <tr${rowClass} onclick="showDetail([${start + index + 1}, '${row.slice(0, 1).concat(row.slice(2)).join("','")}'])">
                        <td>${start + index + 1}</td>
                        <td>${row[0]}</td>
                        <td>${row[2]}</td>
                        <td>${row[3]}</td>
                        <td>${row[4]}</td>
                        <td>${row[5]}</td>
                        <td>${row[6]}</td>
                    </tr>
                `;
            }).join("");

            document.getElementById("table-body").innerHTML = content;
            document.getElementById("total-count").textContent = data.length;
            document.getElementById("page-info").textContent = `Trang ${currentPage} / ${Math.ceil(data.length / rowsPerPage)}`;
            document.getElementById("prev-btn").disabled = currentPage === 1;
            document.getElementById("next-btn").disabled = end >= data.length;
        }

        function renderTotalTables(carData, tvbhData) {
            // Bảng tổng hợp theo dòng xe
            document.getElementById("total-car-header").innerHTML = `
                <tr>
                    <th>Dòng Xe</th>
                    <th>Tổng Số Lượng</th>
                </tr>
            `;
            let carStart = (currentPage - 1) * rowsPerPage;
            let carEnd = carStart + rowsPerPage;
            let paginatedCarData = carData.slice(carStart, carEnd);
            let carContent = paginatedCarData.map(row => `
                <tr>
                    <td>${row.model}</td>
                    <td>${row.count}</td>
                </tr>
            `).join("");
            document.getElementById("total-car-body").innerHTML = carContent;

            // Bảng tổng hợp theo TVBH
            document.getElementById("total-tvbh-header").innerHTML = `
                <tr>
                    <th>TVBH</th>
                    <th>Tổng Số Lượng Xe</th>
                </tr>
            `;
            let tvbhStart = (currentPage - 1) * rowsPerPage;
            let tvbhEnd = tvbhStart + rowsPerPage;
            let paginatedTvbhData = tvbhData.slice(tvbhStart, tvbhEnd);
            let tvbhContent = paginatedTvbhData.map(row => `
                <tr>
                    <td>${row.tvbh}</td>
                    <td>${row.count}</td>
                </tr>
            `).join("");
            document.getElementById("total-tvbh-body").innerHTML = tvbhContent;

            document.getElementById("total-count").textContent = carData.reduce((sum, row) => sum + row.count, 0);
            document.getElementById("page-info").textContent = `Trang ${currentPage} / ${Math.max(Math.ceil(carData.length / rowsPerPage), Math.ceil(tvbhData.length / rowsPerPage))}`;
            document.getElementById("prev-btn").disabled = currentPage === 1;
            document.getElementById("next-btn").disabled = carEnd >= carData.length && tvbhEnd >= tvbhData.length;
        }

        function changePage(delta) {
            currentPage += delta;
            if (currentSheet === "Total") {
                renderTotalTables(fullData, fullTvbhData);
            } else {
                renderTable(fullData);
            }
            document.querySelector('.grid-container').scrollTop = 0;
        }

        function filterTable(e) {
            const searchTerm = e.target.value.toLowerCase();
            let filteredData, filteredTvbhData;
            if (currentSheet === "Total") {
                filteredData = fullData.filter(row => 
                    row.model.toLowerCase().includes(searchTerm)
                );
                filteredTvbhData = fullTvbhData.filter(row => 
                    row.tvbh.toLowerCase().includes(searchTerm)
                );
                renderTotalTables(filteredData, filteredTvbhData);
            } else {
                filteredData = fullData.filter(row => 
                    row.some(cell => cell?.toString().toLowerCase().includes(searchTerm))
                );
                renderTable(filteredData);
            }
            currentPage = 1;
        }

        function exportToExcel() {
            if (confirm("Bạn có muốn xuất danh sách này sang Excel không?")) {
                let tableHTML;
                if (currentSheet === "Total") {
                    let carTable = document.getElementById("total-car-table").outerHTML;
                    let tvbhTable = document.getElementById("total-tvbh-table").outerHTML;
                    tableHTML = `<h3>Tổng Hợp Theo Dòng Xe</h3>${carTable}<h3>Tổng Hợp Theo TVBH</h3>${tvbhTable}`.replace(/ /g, '%20');
                } else {
                    let table = document.getElementById("data-table");
                    tableHTML = table.outerHTML.replace(/ /g, '%20');
                }
                let dataType = 'application/vnd.ms-excel';
                let downloadLink = document.createElement("a");
                document.body.appendChild(downloadLink);
                let filename = `VinFast_data_${currentSheet}.xls`;
                if (navigator.msSaveOrOpenBlob) {
                    let blob = new Blob(['\ufeff', tableHTML], { type: dataType });
                    navigator.msSaveOrOpenBlob(blob, filename);
                } else {
                    downloadLink.href = 'data:' + dataType + ', ' + tableHTML;
                    downloadLink.download = filename;
                    downloadLink.click();
                }
                document.body.removeChild(downloadLink);
                showNotification("Đã xuất file thành công!", 2000);
            }
        }

        function printTable() {
            let printContent;
            if (currentSheet === "Total") {
                printContent = `
                    <h3>Tổng Hợp Theo Dòng Xe</h3>${document.getElementById("total-car-table").outerHTML}
                    <h3>Tổng Hợp Theo TVBH</h3>${document.getElementById("total-tvbh-table").outerHTML}
                `;
            } else {
                // Tạo bảng in đầy đủ thông tin
                const columnNames = ["STT", "Tên KH", "Ngày", "Số Đơn Hàng", "Dòng xe", "Phiên bản", "Ngoại thất", "Nội thất", "TVBH", "Vin", "Chính sách", "Ghi chú"];
                let tableContent = "<table><thead><tr>";
                columnNames.forEach(col => {
                    tableContent += `<th>${col}</th>`;
                });
                tableContent += "</tr></thead><tbody>";

                fullData.forEach((row, index) => {
                    let note = row[11]?.toLowerCase() || "";
                    let policy = row[10]?.toLowerCase() || "";
                    let isHighlight = note.includes("ưu tiên") || policy.includes("đặc biệt");
                    let rowClass = isHighlight ? ' class="selected"' : '';
                    tableContent += `<tr${rowClass}>`;
                    tableContent += `<td>${index + 1}</td>`; // STT
                    tableContent += `<td>${row[0] ?? ""}</td>`; // Tên KH
                    tableContent += `<td>${row[1] ?? ""}</td>`; // Ngày
                    tableContent += `<td>${row[2] ?? ""}</td>`; // Số Đơn Hàng
                    tableContent += `<td>${row[3] ?? ""}</td>`; // Dòng xe
                    tableContent += `<td>${row[4] ?? ""}</td>`; // Phiên bản
                    tableContent += `<td>${row[5] ?? ""}</td>`; // Ngoại thất
                    tableContent += `<td>${row[6] ?? ""}</td>`; // Nội thất
                    tableContent += `<td>${row[7] ?? ""}</td>`; // TVBH
                    tableContent += `<td class="vin-highlight">${row[8] ?? ""}</td>`; // Vin
                    tableContent += `<td>${row[10] ?? ""}</td>`; // Chính sách
                    tableContent += `<td>${row[11] ?? ""}</td>`; // Ghi chú
                    tableContent += "</tr>";
                });
                tableContent += "</tbody></table>";
                printContent = tableContent;
            }

            const win = window.open('', '', 'width=800,height=600');
            win.document.write(`
                <html>
                <head><title>In danh sách VinFast - ${currentSheet}</title><style>table { width: 100%; border-collapse: collapse; margin-bottom: 20px; } th, td { border: 1px solid #000; padding: 8px; } th { background: #003087; color: #fff; } h3 { color: #003087; } .vin-highlight { background: #e6f0ff; font-weight: 700; color: #003087; } .selected { background: #cce5ff; font-weight: 700; }</style></head>
                <body>${printContent}</body>
                </html>
            `);
            win.document.close();
            win.print();
        }

        function showDetail(data) {
            if (currentSheet === "Total") return;
            const panel = document.getElementById("detail-panel");
            const body = document.getElementById("detail-body");
            const columnNames = ["Tên KH", "Số Đơn Hàng", "Dòng xe", "Phiên bản", "Ngoại thất", "Nội thất", "TVBH", "Vin", "Chính sách"];
            let html = "<table class='detail-table'>";
            for (let i = 0; i < columnNames.length; i++) {
                let cellClass = i === 7 ? ' class="vin-highlight"' : '';
                html += `<tr><th>${columnNames[i]}</th><td${cellClass}>${data[i + 1] ?? ""}</td></tr>`;
            }
            html += "</table>";
            body.innerHTML = html;
            panel.style.transform = "translateX(0)";
        }

        function showNotification(message, duration = 3000) {
            const notif = document.getElementById("notification");
            notif.textContent = message;
            notif.style.display = "block";
            setTimeout(() => notif.style.display = "none", duration);
        }
    </script>
</body>
</html>
